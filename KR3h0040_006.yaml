front:
  text: 法書攷卷之六
  hash: sha256:82a10b63fdce52f7107db2871c8062ac03e262b35316fb19b77c13ea9956a421
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_006-1a}
body:
  text: 元盛熈明著風神翰墨之妙通扵神明故必積學累功心手相忘當其揮運之際自有成書扵胸中乃能精神融會悉寓扵書或遲或速動合規矩變化無常而風神超速似非高明之資孰克然耶情性禁經云有功無性神彩不生有性無功神彩不變又云九生法一生筆純毫為心軟而復徤二生𥿄𥿄新出篋笥潤滑易書即受其墨乃乆露風日枯燥難用三生研用貯水畢則乾之司馬云研石不可乆浸潤四生水義在新汲不可乆停停不堪用五生墨隨要旋研墨光為上多則泥鈍六生手適携執勞腕則無凖八生目寝息適寤光朗分眀九生景天氣清明人心舒悦乃可言書虞世南云收視返聼絶慮凝神心正氣和則契扵妙心神不正書則欹斜志氣不和字則顛仆故知字雖有質迹本無為禀隂陽而動静體萬物以成形書道玄微必資神遇不可以力求也必湏心悟不可以力取也孫過庭云一時有書有乖有合各有其五神怡務閒一合也感恵狥知二合也時和氣潤三合也𥿄墨相發四合也偶然欲書五合也心遽體留一乖也意違勢屈二乖也風燥日炎三乖也𥿄墨不佳四乖也情怠手䦨五乖也乖合之際優劣互差得時不如得器得器不如得志若五乖同萃思遏手䝉五合交臻神融筆暢暢無不適䝉無所從右軍之書寫樂毅則情拂欝書方朔則意渉環竒黄庭經則怡懌虗無太師箴則縱横曲折暨乎蘭亭興集思逸神超私門戒誓情拘意懆所謂渉樂方笑言哀巳歎情會扵中取會風騷之意陽舒隂懆本乎天地之心右軍之書末年多妙當縁思慮通志氣和平不激不厲而風規自逺子敬以下莫不鼓弩為力􅍾置成體豈獨工用不亦乃神情懸隔也消息多方性情不一乍剛柔以合體忽勞逸以分軀或怡淡雍容内合筋骨或折挫槎枿外耀鋒芒假令收歸務存骨氣骨既存矣而遒勁加之亦猶枝幹扶疎凌霜雪而彌勁花葉鮮茂與雲月而相輝如其筋骨偏多遒麗盖少則若枯槎架險巨石當路雖妍妙云闕而體質存焉若遒麗居優骨氣将劣譬如芳林落蕋空照灼而無依蘭沼漂萍徒青翠而奚托是知偏工易就盡善難求雖宗一家而變多體莫不隨其性欲便以為姿質直者則勁挺不遒剛狠者又屈強無潤矜歛者弊扵拘束脱易者失扵規矩温柔者傷扵軟緩躁勇者過扵剽廹狐疑者溺重者終扵蹇鈍輕瑣者染扵吏斯皆獨行之士偏玩所乖張懷瓘云古人妙跡用思沉欝自非冥搜不可而見固大巧若拙明道若昧汎覧則混扵愚智研味則駭扵心神百靈􅌂其如前萬象森其在瞩雷電興㓕光隂紏分考無說而䆒情察無形而得相隨變恍忽最深杳冥金山玉林殷乎其内何竒不有何怪不儲無物之象蔵之扵密静而求之或失雖眀目諦察而不見長䇿審廹而不知豈徒倒薤懸針偃波垂露而巳哉訣曰彩色者字之神也神馭氣氣馭形形全骨骨全神色歐陽脩曰作字要熟熟則神氣完全姜尭章云風神一湏人品高二湏師法古三湏𥿄墨佳四湏險勁五湏高明六湏潤澤七湏向背得宜八湏時出新意則自然長者如秀整之士短者如精悍之徒瘦者如山澤之癯肥者如貴㳺之士勁者如武夫媚者如羙女欹斜如醉仙端楷如賢士運筆訣云遺跡古法事理昭然用舍變通誠難定執神彩風姿隨宜自立書畫譜云情之喜怒哀樂各有分數氣之清和肅壯竒麗古淡互有出入遲速虞安吉云太緩無筋太急無骨筆勢論云意在筆前字居筆後未作之始結思成矣仍下筆不用急故湏遲何也筆為将軍故湏持重心欲急不欲遲何也心為箭鋒不欲遲遲則中物不入每字欲十遲五急十曲五直十蔵五出十起五伏方可謂書若直筆急牽裹此蹔視書乆味無力又云初業書要類乎本緩筆定其形勢忙則失其規矩但取形質快徤手腕輕便方圓大小各不相犯莫以字小勇而忙行筆勢莫以字大難而慢緩展毫端筆髓論云遲速虗實若輪扁斵輪不疾不徐得之扵心而應之扵手心口不能言也歐陽詢云最不可忙忙則失勢次不可緩緩則骨痴孫過庭云至有未悟淹留偏追勁速不能迅速翻效持重夫勁速者超逸之機遲留者賞會之致将反其速行臻會羙之方專溺扵遲終爽絶倫之妙能速不速所謂淹留因遲就遲詎名賞會非其心閒手敏難以兼通者焉訣曰速則神在其中遲則妙在其内能速而速謂之入神能速而不速謂之賞會未能速而速謂之狂馳不當遲而遲謂之淹滯狂馳則形勢不全淹留則骨肉重濁又云能縱横斜直不速而行不止而緩腕不停筆筆不離𥿄實按而和意在筆前心不速而神氣短筆不遲而形色枯一速一遲乃得剛柔相濟表裏相資姜堯章云遲以取妍速以取勁必先能速而後為遲若素不能速而專事遲則無神氣若專事速又多失勢密法曰遲筆發扵疾疾筆發扵遲逆入倒出取勢如功診候調停偏宜寂静方圓翰林隠術云崔子玉云觀其法象俯仰有儀方不中矩圓不中規抑左掦右望之若欹虞世南云字形者如目之視也為目有止限眀執字體既有質滯為目所視逺近不同如水在方圓豈由乎水且筆喻水方圓喻字所視則同逺近則異變通異訣曰方以圓成圓由方得舍方求圓則骨氣莫全舍圓求方則神氣不潤方不變謂之斗圓不變謂之環此書之大病也張懷瓘曰盖欲方而有規圓而不失矩亦猶人之指腕促則如指之卷賖則如指之屈理從裹之以皮肉若露筋骨是乃病也豈曰壮哉書亦湏圓轉順其天理若成稜角是乃病也豈曰力哉姜堯章云方圓者真草之體用真貴方草貴圓方者參之以圓圓者叅之以方斯為羙矣若方圓曲直不可顯露直湏涵泳一出自然真多用折草多用轉折欲少駐駐則有力轉不欲滯滯則不遒然而真以轉而後遒草以折而後勁方長為體圓轉輕徤為用法書攷卷之六
