front:
  text: 法書考卷之六
  hash: sha256:10a0a1f5879effb57a8d1dde35867714a65f78df80ab6bd43eb2decd4979c011
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_006-1a}
body:
  text: 元盛熙明著風神翰墨之妙通于神明故必積學纍功心手相忘當其揮運之際自有成書于胸中乃能精神融會悉寓于書或遲或速動合規矩變化無常而風神超速似非高明之資孰克然耶情性禁經云有功無性神彩不生有性無功神彩不變又云九生法一生筆純毫為心軟而復健二生𥿄𥿄新出篋笥潤滑易書即受其墨乃久露風日枯燥難用三生研用貯水畢則乾之司馬云研石不可久浸潤四生水義在新汲不可久停停不堪用五生墨隨要旋研墨光為上多則泥鈍六生手適携執勞腕則無凖八生目寢息適寤光朗分眀九生景天氣清明人心舒悅乃可言書虞世南云收視返聼絶慮凝神心正氣和則契于妙心神不正書則欹斜志氣不和字則顛仆故知字雖有質迹本無為稟隂陽而動靜體萬物以成形書道玄微必資神遇不可以力求也必須心悟不可以力取也孫過庭云一時有書有乖有合各有其五神怡務間一合也感惠徇知二合也時和氣潤三合也𥿄墨相發四合也偶然欲書五合也心遽體留一乖也意違勢屈二乖也風燥日炎三乖也𥿄墨不佳四乖也情怠手闌五乖也乖合之際優劣互差得時不如得器得器不如得志若五乖同萃思遏手蒙五合交臻神融筆暢暢無不適蒙無所從右軍之書寫樂毅則情拂鬱書方朔則意涉環竒黃庭經則怡懌虗無太師針則縱橫曲折暨乎蘭亭興集思逸神超私門戒誓情拘意懆所謂涉樂方笑言哀巳歎情會于中取會風騷之意陽舒隂懆本乎天地之心右軍之書末年多妙當緣思慮通志氣和平不激不厲而風規自逺子敬以下莫不鼓弩為力􅍾置成體豈獨工用不亦乃神情懸隔也消息多方性情不一乍剛柔以合體忽勞逸以分軀或怡淡雍容內合筋骨或折挫槎枿外耀鋒芒假令收歸務存骨氣骨既存矣而遒徑加之亦猶枝幹扶疏凌霜雪而彌徑花葉鮮茂與雲月而相輝如其筋骨偏多遒麗蓋少則若枯槎架險巨石當路雖妍妙云闕而體質存焉若遒麗居優骨氣將劣譬如芳林落蕊空照灼而無依蘭沼漂萍徒青翠而奚托是知偏工易就盡善難求雖宗一家而變多體莫不隨其性欲便以為姿質直者則徑挺不遒剛狠者又屈強無潤矜斂者弊于拘束脫易者失于規矩溫柔者傷于軟緩躁勇者過于剽迫狐疑者溺重者終于蹇鈍輕瑣者染于吏斯皆獨行之士偏玩所乖張懷瓘云古人妙迹用思沉鬱自非冥搜不可而見固大巧若拙明道若昧泛覽則混于愚智研味則駭于心神百靈􅌂其如前萬象森其在矚雷電興滅光隂紏分考無説而究情察無形而得相隨變恍忽最深杳冥金山玉林殷乎其內何竒不有何怪不儲無物之象藏之于密靜而求之或失雖眀目諦察而不見長䇿審迫而不知豈徒倒薤懸針偃波垂露而巳哉訣曰彩色者字之神也神馭氣氣馭形形全骨骨全神色歐陽修曰作字要熟熟則神氣完全薑堯章云風神一須人品高二須師法古三須𥿄墨佳四須險徑五須高明六須潤澤七須向背得宜八須時出新意則自然長者如秀整之士短者如精悍之徒瘦者如山澤之癯肥者如貴遊之士徑者如武夫媚者如美女欹斜如醉仙端楷如賢士運筆訣云遺迹古法事理昭然用舍變通誠難定執神彩風姿隨宜自立書畫譜云情之喜怒哀樂各有分數氣之清和肅壯竒麗古淡互有出入遲速虞安吉云太緩無筋太急無骨筆勢論云意在筆前字居筆後未作之始結思成矣仍下筆不用急故須遲何也筆為將軍故須持重心欲急不欲遲何也心為箭鋒不欲遲遲則中物不入每字欲十遲五急十曲五直十藏五出十起五伏方可謂書若直筆急牽裹此暫視書久味無力又云初業書要類乎本緩筆定其形勢忙則失其規矩但取形質快健手腕輕便方圓大小各不相犯莫以字小勇而忙行筆勢莫以字大難而慢緩展毫端筆髓論云遲速虗實若輪扁斫輪不疾不徐得之于心而應之于手心口不能言也歐陽詢云最不可忙忙則失勢次不可緩緩則骨癡孫過庭云至有未悟淹留偏追徑速不能迅速翻效持重夫徑速者超逸之機遲留者賞會之致將反其速行臻會美之方專溺于遲終爽絶倫之妙能速不速所謂淹留因遲就遲詎名賞會非其心間手敏難以兼通者焉訣曰速則神在其中遲則妙在其內能速而速謂之入神能速而不速謂之賞會未能速而速謂之狂馳不當遲而遲謂之淹滯狂馳則形勢不全淹留則骨肉重濁又云能縱橫斜直不速而行不止而緩腕不停筆筆不離𥿄實按而和意在筆前心不速而神氣短筆不遲而形色枯一速一遲乃得剛柔相濟表裏相資薑堯章云遲以取妍速以取徑必先能速而後為遲若素不能速而專事遲則無神氣若專事速又多失勢密法曰遲筆發于疾疾筆發于遲逆入倒出取勢如功診候調停偏宜寂靜方圓翰林隱術云崔子玉云觀其法象俯仰有儀方不中矩圓不中規抑左掦右望之若欹虞世南云字形者如目之視也為目有止限眀執字體既有質滯為目所視逺近不同如水在方圓豈由乎水且筆喻水方圓喻字所視則同逺近則異變通異訣曰方以圓成圓由方得舍方求圓則骨氣莫全舍圓求方則神氣不潤方不變謂之斗圓不變謂之環此書之大病也張懷瓘曰蓋欲方而有規圓而不失矩亦猶人之指腕促則如指之卷賖則如指之屈理從裹之以皮肉若露筋骨是乃病也豈曰壯哉書亦須圓轉順其天理若成稜角是乃病也豈曰力哉薑堯章云方圓者真草之體用真貴方草貴圓方者參之以圓圓者參之以方斯為美矣若方圓曲直不可顯露直須涵泳一出自然真多用折草多用轉折欲少駐駐則有力轉不欲滯滯則不遒然而真以轉而後遒草以折而後徑方長為體圓轉輕健為用法書考卷之六
