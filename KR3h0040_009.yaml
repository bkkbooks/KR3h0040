body:
  text: 跋法書考八卷元盛熙明著舊寫本字迹精雅十一行二十字有西齋居士朱文印延陵村吳暻字元朗白文印小重山館藏朱文長印今歸上海涵芬樓所藏曹楝亭任兩淮鹽政時於揚州詩局刊書十二種寫刻精湛為世所重其書多屬孤本祕笈向未刊行者然披覽之餘奪訛迭見惜無別本可資參證余發憤從事校讎頻歲以來十獲八九獨法書考訪求舊本苦不可得今春南遊觀書涵芬樓獲覩此册重其為梅村祭酒令子所藏當有佳勝因從張菊生前輩假得攜歸亟取詩局本一校開卷首葉書譜小引傳於後者句下即脫皆可歷數至於謬當虛名庸亦有之其餘泯滅無聞者凡二十一字其評論上中下三品吳本橫排為表式三格刊本改為直行順下諸人評論吳本作小字注人名下刊本改為大字別行次序偶有凌亂脫誤尤難悉舉卷一勘畢已改訂三百餘字欣喜過望因欲奮筆終篇及校至卷二以下則荆棘橫生榛蕪滿目正訛補逸腕脫不休卒至閣筆輟校而後已然後歎刊是書者其鹵莽滅裂殆非意想所及讀者舍取吳本重抄固別無救正之良策也茲舉其錯簡脫文刪節三端粗述於左其小小差違不暇及焉卷七宗學章薑堯章説追蹤鍾王句下錯簡又孫過庭説但求平正句下錯簡又臨摹章薑堯章説易於成就句下錯簡卷八印章類軍曲侯丞章注引懶真録今印文榜額有之句下錯簡又押署跋尾類當時鑒識藝人押署跋尾句下錯簡又印法類別為一體摹印屈曲句下錯簡卷二十體書斷小篆下八分隸書章草行書飛白草書凡六類皆脫失僅存草書後薑堯章説二十行卷二刪節者二條卷三刪節者八條卷四刪節者二十二條卷五刪節者六條卷六刪節者五條辛未六月朔日晨起坐水廊校畢記江安傅增湘
