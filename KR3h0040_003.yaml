front:
  text: 法書攷卷之三
  hash: sha256:f3c70390f5d950c124e4e69b6e1a7f638082bab001bcd97efccebb6eafb0ec0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_003-1a}
body:
  text: 元盛熈明著筆法夫書者心之跡也故有諸中而形諸外得扵心而應扵手然揮運之妙必由神悟而操執之要尤爲先務也操執衛夫人曰學書先學執筆真書去筆頭一寸二分行草去筆頭三寸一分下筆點墨芟波屈曲皆湏盡一身之力而送之執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能緊者心手不齊意後筆前者敗若執筆逺而急意前筆後者勝唐太宗云腕䜿則鋒正鋒正則四靣鋒全次實指指實則節力均平次虗掌掌虗則運用便易虞世南云筆長不過六寸真一行二草三指實掌虗韓方明云以雙指包管亦當五指共執要在實指虗掌鈎擫干送亦曰抵送若以单指包之則力不足而無神氣撮管法以五指撮管末可大草書張敬玄云楷書把筆妙在掌虗運腕不可太緊緊則腕不能轉而字體粗細上下不均不可懸臂氣力有限其行草湏懸腕筆勢無限也盧進士用筆之法拓大指擫中指歛第二指抵無名指令掌心虗如握弹丸此大要也而以大指節外置筆令轉動自在無名指抵中指小指抵名指此細要也張懷瓘云若執筆淺則堅掣打勁三寸而一寸着𥿄勢則有餘若執筆深而束緊三寸而一寸着𥿄勢已盡矣其故何也筆在指端則掌虗運動適意騰躍頓挫生意在焉筆居半則掌實如樞不轉制豈自由轉動回旋乃成稜角筆既死矣寜望字之生動李華云予有二字之訣至神之方曰截拽是也虗掌而實指緩衂而急送黄魯直云湏雙鉤回腕以無名指抵筆則有力姜尭章云淺其筆牢其執實其指虗其掌真書小密執宜近頭行書寛送執宜稍逺草書流逸執宜更逺逺取點畫長太易扵分布齊均韋榮宗云搦破筆畫破𥿄蔵鋒結體大要執之欲緊運之欲活不可以指運筆常以腕運筆執之在手手不主運運之在腕腕不知執故孫氏有執使轉用之法執謂淺深長短使謂縱横牽制轉謂鉤環盤紆用謂點畫向背揮運李斯云用筆先急回後疾下如鷹望鵰逝信之自然不得重改送脚若逰魚得水舞筆如景山興雲蕭何云夫書勢法猶若登陳變通並在踠前文武遺扵筆下出沒湏有倚伏𨳩闔籍扵隂陽每欲書字喻如下營穏思審之方可用筆筆者心也墨者手也書者意也依此臻妙矣蔡邕入嵩山學書扵石室内得素書八角垂芒頗似篆籀寫史籀李斯等用筆勢邕得之不食三日唯大呌歡喜若對千人邕遂讀三年妙逹其理用筆特異遂作筆論曰書者散也欲書先散懐抱任情恣性然後書之若廹扵事雖中山兔毫不能佳也夫書先黙坐静思隨意所適言不出口氣不盈息沉密神彩如對至尊則無不善矣為書之體湏入其形若坐若行若飛若動若徃若來若卧若起若愁若憂若蟲食木葉若利劍長戈若強弓硬矢若水火若雲霧若日月縱横有象可謂書矣鍾繇見蔡伯喈筆法扵韋誕自搥胸盡青因嘔血魏太祖以五靈丹活之誕死繇令人盗發其墓得之故知多力豊筋者勝無力無筋者病一一從其消息而用之由是更妙繇曰筆跡者界也流羙者人也非凡庸所知見萬類皆象之點如山頺摘如雨線纎如絲毫輕如雲霧去者若鳴鳯之㳺雲漢來者若㳺女之入花林粲粲分明遥遥逺曖者矣衛夫人云用筆有六種結搆圓備如篆法飄颺洒落如章草凶險可畏如八分窈窕出入如飛白耿介特立如鶴頭鬰抜縱横如古隷然心有委曲每為一字各象其形王右軍云轉筆宜左右回顧無使節目孤露蔵鋒點畫出入之跡欲使左先右至回左亦然蔵頭圓筆属𥿄令筆心常在點畫中行䕶尾點勢盡力收之疾勢在扵啄磔之中又在豎筆豎趯之内掠筆在扵䟎鋒峻趯用之澀勢在扵緊駃戦行之梁武帝云運筆斜則無芒鋒執筆寛則書緩弱點掣短則擁腫點掣長則離澌畫細則字横畫粗則形慢抱則泛勢放又少則天台紫真云夫書必逹乎道同混一之理似七寳之貴以垂萬古之名陽氣明而華壁立隂氣太而風神生把筆抵鋒肇扵夲性形圓則潤勢疾則澁法以緊而勁逆以險而峻内盈外虗起不孤伏不冝向近非近背接非逺望之惟逸發之惟静虞世南云羲之謂耽翫之功積如山丘張芝學盡池水盡墨當其雅趣求彼真意無圖其形容而滯扵體質此貴乎志意專精必可誠應也余中宵之間遂夢吞筆既覺之後若在胸臆又因假寐見張芝指一道字用筆體法斯也足明至誠感神信有徴矣故羲之扵山隂冩黄庭經感三台神降其子獻之扵㑹稽山見一異人披雲而下左手持𥿄右手持筆以遺獻之獻之受而問之曰君何姓氏復㳺何處筆法奚施荅曰吾象外為宅不變為姓常定為字其筆跡豈殊吾體耶獻之佩服斯言退而臨冩竟昧其微况不學乎筆髓論云真言拂掠輕重若浮雲蔽扵晴天波撆勾截若微風摇扵碧海氣如奔馬亦如朶鈎輕重出扵心而妙用應乎手然則體約八分勢同章草而各有趣無問巨細皆有虗散其鋒圓豪蕝按轉易也豈真書一體篆章草行八分等當覆腕上搶掠毫𨳩下撇撥歴鋒轉則稍有筋骨指端横鈎蹲踞轉腕之状矣行書之體略同扵真至扵頓挫磅礴若猛獸之搏噬進退鈎鉅若秋鷹之迅擊故覆腕搶毫乃按鋒而直進其綰也則内拓外旋結鋒而環轉結者上蹙旋毫不絶内轉鋒也加以掉筆聯毫若石璺玉瑕自然之理亦如長空㳺絲容曵而來徃又如蟲網絡壁勁而復虗羲之云㳺絲斷而復連皆契以天真同扵輪扁每作點畫皆懸管掉之令其鋒𨳩自然勁健草則縱心奔放覆腕轉蹙懸管取鋒柔毫外拓左爲外拓右爲内伏連卷收攬吐納内轉蔵鋒也既如舞䄂揮拂而縈紆又若垂藤僇盤而繚繞蹙旋轉亦如騰猨過樹逸蚪得水輕騎追虜列火燎原或氣雄而不可抑或勢逸而不可止縱扵狂逸不違筆意也但先緩筆引興心逸自急也仍接鋒以取興興盡則巳又生簇鋒任豪端之竒妙象兎絲之縈結轉剔刓角多鉤篆體或如蛇形或如兵陣故兵無常陣字無常體謂如水火勢多不定故曰字無常定也懷素常師鄔肜肜謂之曰學書勢多矣惟太宗以獻之書如陵冬枯樹寒寂勁硬不置枝葉張旭嘗私語肜曰孤􅏃自振驚沙坐飛余思而為書故得竒怪凡草聖盡扵此懷素後學書如䜿牽如古釵脚顔太師以素為同學問之曰學書於師授之外湏自得之張長史覩孤􅏃驚沙之外見公孫大娘劍器舞始得低昻回翔之状未知鄔兵曺有之乎素曰似古釵脚為草書豎牽之極顔公曰師䜿牽古釵脚何如屋漏㾗素抱顔公脚唱嘆乆之顔公徐問曰師亦有自得之妙乎對曰吾觀夏雲多竒峰輒嘗師之夏雲因風變化乃無定勢又遇壁折之路一一自然顔公曰草聖之妙代不乏人可謂聞所未聞也盧筆謂林韞曰子學吾書但求其力耳殊不知用筆之方不在扵力用扵力死矣昔受教扵韓吏部其法曰撥鐙推拖撚拽是也錢若水云善書者鮮得筆法唐陸希聲得之凡五字曰㩎壓鉤格抵用筆雙鉤即點畫遒勁謂之撥鐙法希聲自言若二王皆傳此法陽氷得之希聲以授辯先先入長安為翰林供奉江南李後主得此法書絶遒勁復増二字曰導送雷簡夫云余偶晝卧聞江漲瀑聲想其波濤翻翻迅駃掀搕高下蹙逐奔去之状無物可寄其情遽起作書則心中之想盡在筆下矣噫鳥跡之始乃書法之祖皆其状也張旭觀飛蓬舞劍懐素觀夏雲顔公豎牽法以釵股不如壁圻漏㾗斯師法之外皆自得者不專為草但通論筆法也姜堯章草書法云折釵股者欲其圓而有力屋漏㾗者欲其無起止之跡錐畫沙者欲其勻而蔵鋒壁坼者欲其布置之巧然皆不若是筆正則鋒蔵筆偃則鋒出一起一側一晦一明而神竒出焉常欲筆鋒在畫中則左右無失矣下筆之初有搭鋒有折鋒一字之體定扵初下筆凢作字第一多是折鋒第二三是承上筆勢多是搭鋒若一字之間右邊多是折鋒應在左故也又有平起如隷蔵鋒如篆大要折搭多精神平蔵善含蓄則妙矣宣和書譜云唐玄度臨書甚詳惜其出扵法中而不能遺法以見意書學纂要云右軍用筆内擫而收歛故森嚴而有法度大令用筆外拓而開廓故散朗而多姿大抵書畫之法同故張彦逺云草書體勢一筆而成血脉隔行不㫁王子敬明其深㫖陸探微亦作一筆畫連綿不㫁精利潤媚新竒妙絶名高宋代張僧繇點曵研拂依衛夫人筆陣圖一點一畫如鈎㦸利劍森森然吴道玄古今獨歩授筆法扵張旭此知書畫用筆同矣郭若虗云氣韻本乎㳺心神采生扵用筆用筆之難斷可識矣又畫有三病皆繫用筆一曰版者腕弱筆痴全虧取與物平𥚹不能圓混也二曰刻者用筆中疑心手相戻勾畫之際妄生圭角也三曰結者欲行不行當散不散似物凝滯不能流暢也法書攷卷之三
