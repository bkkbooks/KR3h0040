front:
  text: 法書考卷之三
  hash: sha256:209fa9dcfde7a1f632743b43c623326fe3097ed908a5184d45ff4b5e04ccfdcc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_003-1a}
body:
  text: 元盛熙明著筆法夫書者心之迹也故有諸中而形諸外得于心而應于手然揮運之妙必由神悟而操執之要尤為先務也操執衛夫人曰學書先學執筆真書去筆頭一寸二分行草去筆頭三寸一分下筆點墨芟波屈曲皆須盡一身之力而送之執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而不能緊者心手不齊意後筆前者敗若執筆逺而急意前筆後者勝唐太宗云腕豎則鋒正鋒正則四靣鋒全次實指指實則節力均平次虗掌掌虗則運用便易虞世南云筆長不過六寸真一行二草三指實掌虗韓方明云以雙指包管亦當五指共執要在實指虗掌鈎擫干送亦曰抵送若以單指包之則力不足而無神氣撮管法以五指撮管末可大草書張敬玄云楷書把筆妙在掌虗運腕不可太緊緊則腕不能轉而字體粗細上下不均不可懸臂氣力有限其行草須懸腕筆勢無限也盧進士用筆之法拓大指擫中指斂第二指抵無名指令掌心虗如握彈丸此大要也而以大指節外置筆令轉動自在無名指抵中指小指抵名指此細要也張懷瓘云若執筆淺則堅掣打徑三寸而一寸著𥿄勢則有餘若執筆深而束緊三寸而一寸著𥿄勢已盡矣其故何也筆在指端則掌虗運動適意騰躍頓挫生意在焉筆居半則掌實如樞不轉制豈自由轉動回旋乃成稜角筆既死矣寧望字之生動李華云豫有二字之訣至神之方曰截拽是也虗掌而實指緩衄而急送黃魯直云須雙鉤回腕以無名指抵筆則有力薑堯章云淺其筆牢其執實其指虗其掌真書小密執宜近頭行書寬送執宜稍逺草書流逸執宜更逺逺取點畫長太易于分布齊均韋榮宗云搦破筆畫破𥿄藏鋒結體大要執之欲緊運之欲活不可以指運筆常以腕運筆執之在手手不主運運之在腕腕不知執故孫氏有執使轉用之法執謂淺深長短使謂縱橫牽制轉謂鉤環盤紆用謂點畫向背揮運李斯云用筆先急回後疾下如鷹望雕逝信之自然不得重改送腳若逰魚得水舞筆如景山興雲蕭何云夫書勢法猶若登陳變通並在踠前文武遺于筆下出沒須有倚伏開闔籍于隂陽每欲書字喻如下營穩思審之方可用筆筆者心也墨者手也書者意也依此臻妙矣蔡雍入嵩山學書于石室內得素書八角垂芒頗似篆籀寫史籀李斯等用筆勢雍得之不食三日唯大呌歡喜若對千人雍遂讀三年妙逹其理用筆特異遂作筆論曰書者散也欲書先散懷抱任情恣性然後書之若迫于事雖中山兔毫不能佳也夫書先默坐靜思隨意所適言不出口氣不盈息沉密神彩如對至尊則無不善矣為書之體須入其形若坐若行若飛若動若往若來若卧若起若愁若憂若蟲食木葉若利劍長戈若強弓硬矢若水火若雲霧若日月縱橫有象可謂書矣鍾繇見蔡伯喈筆法于韋誕自捶胸盡青因嘔血魏太祖以五靈丹活之誕死繇令人盜發其墓得之故知多力豐筋者勝無力無筋者病一一從其消息而用之由是更妙繇曰筆迹者界也流美者人也非凡庸所知見萬類皆象之點如山頺摘如雨線纎如絲毫輕如雲霧去者若鳴鳯之遊雲漢來者若遊女之入花林粲粲分明遙遙逺曖者矣衛夫人云用筆有六種結搆圓備如篆法飄揚灑落如章草凶險可畏如八分窈窕出入如飛白耿介特立如鶴頭鬱拔縱橫如古隸然心有委曲每為一字各象其形王右軍云轉筆宜左右回顧無使節目孤露藏鋒點畫出入之迹欲使左先右至回左亦然藏頭圓筆屬𥿄令筆心常在點畫中行護尾點勢盡力收之疾勢在于啄磔之中又在豎筆豎躍之內掠筆在于趲鋒峻躍用之澀勢在于緊駃戰行之梁武帝云運筆斜則無芒鋒執筆寬則書緩弱點掣短則擁腫點掣長則離澌畫細則字橫畫粗則形慢抱則泛勢放又少則天台紫真云夫書必逹乎道同混一之理似七寶之貴以垂萬古之名陽氣明而華壁立隂氣太而風神生把筆抵鋒肇于夲性形圓則潤勢疾則澀法以緊而徑逆以險而峻內盈外虗起不孤伏不冝向近非近背接非逺望之惟逸發之惟靜虞世南云羲之謂耽玩之功積如山丘張芝學盡池水盡墨當其雅趣求彼真意無圖其形容而滯于體質此貴乎志意專精必可誠應也余中宵之間遂夢吞筆既覺之後若在胸臆又因假寐見張芝指一道字用筆體法斯也足明至誠感神信有徴矣故羲之于山隂寫黃庭經感三台神降其子獻之于會稽山見一異人披雲而下左手持𥿄右手持筆以遺獻之獻之受而問之曰君何姓氏復遊何處筆法奚施答曰吾象外為宅不變為姓常定為字其筆迹豈殊吾體耶獻之佩服斯言退而臨寫竟昧其微况不學乎筆髓論云真言拂掠輕重若浮雲蔽于晴天波撇勾截若微風搖于碧海氣如奔馬亦如朵鈎輕重出于心而妙用應乎手然則體約八分勢同章草而各有趣無問巨細皆有虗散其鋒圓豪蕝按轉易也豈真書一體篆章草行八分等當覆腕上搶掠毫開下撇撥歷鋒轉則稍有筋骨指端橫鈎蹲踞轉腕之狀矣行書之體略同于真至于頓挫磅礴若猛獸之搏噬進退鈎巨若秋鷹之迅擊故覆腕搶毫乃按鋒而直進其綰也則內拓外旋結鋒而環轉結者上蹙旋毫不絶內轉鋒也加以掉筆聯毫若石璺玉瑕自然之理亦如長空遊絲容曵而來往又如蟲網絡壁徑而復虗羲之云遊絲斷而復連皆契以天真同于輪扁每作點畫皆懸管掉之令其鋒開自然徑健草則縱心奔放覆腕轉蹙懸管取鋒柔毫外拓左為外拓右為內伏連卷收攬吐納內轉藏鋒也既如舞袖揮拂而縈紆又若垂藤僇盤而繚繞蹙旋轉亦如騰猿過樹逸蚪得水輕騎追虜列火燎原或氣雄而不可抑或勢逸而不可止縱于狂逸不違筆意也但先緩筆引興心逸自急也仍接鋒以取興興盡則巳又生簇鋒任豪端之竒妙象兔絲之縈結轉剔刓角多鉤篆體或如蛇形或如兵陳故兵無常陳字無常體謂如水火勢多不定故曰字無常定也懷素常師塢肜肜謂之曰學書勢多矣惟太宗以獻之書如陵冬枯樹寒寂徑硬不置枝葉張旭嘗私語肜曰孤􅏃自振驚沙坐飛余思而為書故得竒怪凡草聖盡于此懷素後學書如豎牽如古叉腳顔太師以素為同學問之曰學書於師授之外須自得之張長史覩孤􅏃驚沙之外見公孫大娘劍器舞始得低昻回翔之狀未知塢兵曺有之乎素曰似古叉腳為草書豎牽之極顔公曰師豎牽古叉腳何如屋漏䀶素抱顔公腳唱嘆久之顔公徐問曰師亦有自得之妙乎對曰吾觀夏雲多竒峰輒嘗師之夏雲因風變化乃無定勢又遇壁折之路一一自然顔公曰草聖之妙代不乏人可謂聞所未聞也盧筆謂林韞曰子學吾書但求其力耳殊不知用筆之方不在于力用于力死矣昔受教于韓吏部其法曰撥鐙推拖撚拽是也錢若水云善書者鮮得筆法唐陸希聲得之凡五字曰擫壓鉤格抵用筆雙鉤即點畫遒徑謂之撥鐙法希聲自言若二王皆傳此法陽氷得之希聲以授辨先先入長安為翰林供奉江南李後主得此法書絶遒徑復增二字曰導送雷簡夫云余偶晝卧聞江漲瀑聲想其波濤翻翻迅駃掀搕高下蹙逐奔去之狀無物可寄其情遽起作書則心中之想盡在筆下矣噫鳥迹之始乃書法之祖皆其狀也張旭觀飛蓬舞劍懷素觀夏雲顔公豎牽法以叉股不如壁圻漏䀶斯師法之外皆自得者不專為草但通論筆法也薑堯章草書法云折叉股者欲其圓而有力屋漏䀶者欲其無起止之迹錐畫沙者欲其勻而藏鋒壁坼者欲其布置之巧然皆不若是筆正則鋒藏筆偃則鋒出一起一側一晦一明而神竒出焉常欲筆鋒在畫中則左右無失矣下筆之初有搭鋒有折鋒一字之體定于初下筆凡作字第一多是折鋒第二三是承上筆勢多是搭鋒若一字之間右邊多是折鋒應在左故也又有平起如隸藏鋒如篆大要折搭多精神平藏善含蓄則妙矣宣和書譜云唐玄度臨書甚詳惜其出于法中而不能遺法以見意書學纂要云右軍用筆內擫而收斂故森嚴而有法度大令用筆外拓而開廓故散朗而多姿大抵書畫之法同故張彥逺云草書體勢一筆而成血脈隔行不斷王子敬明其深旨陸探微亦作一筆畫連綿不斷精利潤媚新竒妙絶名高宋代張僧繇點曵研拂依衛夫人筆陳圖一點一畫如鈎戟利劍森森然吳道玄古今獨步授筆法于張旭此知書畫用筆同矣郭若虗云氣韻本乎遊心神采生于用筆用筆之難斷可識矣又畫有三病皆繫用筆一曰版者腕弱筆癡全虧取與物平𥚹不能圓混也二曰刻者用筆中疑心手相戻勾畫之際妄生圭角也三曰結者欲行不行當散不散似物凝滯不能流暢也法書考卷之三
