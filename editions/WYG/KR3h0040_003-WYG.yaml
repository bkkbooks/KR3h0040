  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_003-1a, image: WYG0814/WYG0814-0507c.png}
body:
  text: 法書考卷三元盛熈明撰筆法夫書者心之迹也故有諸中而形諸外得於心而應於手然揮運之妙必由神悟而操執之要尤為當務也操執衛夫人曰學書先學執筆真書去筆頭二寸一分行草書去筆頭三寸一分下筆㸃墨芟波屈曲皆須盡一身之力而送之執筆有七種有心急而執筆緩者有心緩而執筆急者若執筆近而下能𦂳者心手不齊意後筆前者敗若執筆逺而急意前筆後者勝唐太宗云腕豎則鋒正止運用便易見前虞世南云筆長不過六寸真一行二草三指實掌虚韓方眀云以䨇指包管止無神氣見前撮管法以五指撮管末云云見前張敬元云楷書把筆妙在虚掌運腕不可太𦂳𦂳則腕不能轉而字體粗細上下不均不可懸臂氣力有限其行草湏懸腕筆勢無限也盧雋云用筆之法止此大要也以大指節外置筆此細要也並見前張懷瓘云若執筆淺則堅掣打勁三寸而一寸着紙止字之生動見前李華云予有二字之訣至神之方曰截拽是也虚掌而實指云云見前黄魯直云湏雙鉤廻以無名指抵筆則有力姜堯章云淺其執牢其筆實其指虚其掌真書小宻執宜近頭行書寛縱執宜稍遠草書流逸執宜更遠遠取㸃畫長大易於分布齊均韋榮夫云搦破管畫破紙藏鋒結體最要執之以𦂳運之以活不可以指運筆執之在手手不主運運之在腕腕不知執故孫氏有執便轉用之法執謂淺深長短便謂縱横牽制轉謂鈎環盤紆用謂㸃畫向背揮運李斯云用筆先急迴後疾下止景山興雲蕭何云夫書勢法猶若登陣變通並在懸前文武貴於筆下出沒湏有倚仗開合藉於隂陽毎欲書字喻如下營稳思審之方可用筆筆者心也墨者手也書者意也依此臻妙矣蔡邕入嵩山學書於石室内得素書八角垂芒頗似篆籀寫史籀李斯等用筆勢邕得之不食三日惟大呌歡喜若對千人邕遂讀三年妙達其理用筆特異遂作筆論曰書者散也欲書先散懷抱任情恣性然後書之若廹於事雖中山兎毫不能佳也夫書先黙坐静思随意所適言不出口氣不盈息沉宻神彩如對至尊則無不善矣為書之體湏入其形若坐若行若飛若動若徃若來若卧若起若愁若憂若蟲食木葉若利劒長戈若强弓勁矢若水火若雲霧若日月縱横有象可謂善矣鍾繇見蔡伯喈筆法於韋誕自搥胸盡青魏太祖以五靈丹活之誕死繇令人盗發其墓得之故知多力豊筋者勝無力無筋者病一一從其消息而用之由是更妙繇曰筆跡者果也流美者人也非凡庸所知見萬類皆象之㸃如山頺摘如雨線纎如絲毫輕如雲霧去若鳴鳯之逰雲漢來若㳺女之入花林粲粲分眀遥遥遠暖者矣衛夫人云用筆有六種結搆圓備如篆法飄颺洒落如章草㓙險可畏如八分窈窕出入如飛白耿介特立如鶴頭欎㧞縱横如古𨽻然心有委曲毎為一字各象其形王右軍云轉筆宜左右回顧無使節目孤露藏鋒㸃畫出入之迹欲使左先右至回左亦然藏頭圓筆属紙令筆心常在㸃畫中行䕶尾㸃勢盡力收之疾勢在於喙磔之中又在竪筆竪趯之内掠筆在於䟎鋒峻趯用之澁勢在於𦂳駃戰行之梁武帝云運筆斜則無芒角執筆寛則書緩弱㸃掣短則腫擁㸃掣長則離澌畫細則字横畫麄則形慢拘則乏勢放又少則天台紫真云夫書必達乎道同混一之理似七寶之貴以垂萬古之名陽氣明而華壁立隂氣肅而風神生把筆抵鋒肇於本性形圓則潤勢疾則澁法以𦂳而勁逸以險而峻内盈外虚起不孤伏不寡向迎非近背接非遠望之惟逸發之惟静虞世南云羲之謂耽翫之功積如丘山張芝草書池水盡黒當其雅趣求彼真意無圖其形容而滯於體質此貴乎志意專精必可成應也余中宵之間遂夢吞筆既覺之後若在胸臆又因假寐見張芝指一道字用筆體法斯也足眀至誠感神信有徴矣故羲之於山隂寫黄庭經成三台神降其子獻之於㑹稽山見一異人披雲而下左手持紙右手持筆以遺獻之獻之受而問之曰君何姓字復何㳺䖏筆法奚施答曰吾象外為宅不變為姓常定為字其筆豈殊吾體耶獻之佩服斯言退而臨寫竟昧其㣲况不學乎筆髓論云真書拂掠㣲重若浮雲蔽於晴天波撆勾截若㣲風摇於碧海氣如奔馬亦如朶鉤輕重出於心而妙用應乎手然則體約八分勢同章草而各有趣無問巨細皆有虚散其鋒圓毫􅀢按轉易也豈真書一體篆草章行八分等當覆腕上搶掠毫間下撇掇歴鋒轉則稍有筋骨指端横鉤蹲踞轉腕之狀矣行書之體畧同於真至於頓挫磅礴若猛獸之摶噬進退鉤距若秋鷹之迅撃故覆腕搶毫乃按鋒而直進其綰也則内拓外旋結鋒而環轉結者上慼旋毫不絶内轉鋒也加以掉筆聨毫若石瑩玉瑕自然之理亦如長空㳺絲容曵而來徃又如蟲細絡勁而復虚羲之云㳺絲㫁而復聮皆契以天真同於輪扁毎作㸃畫皆懸筆掉之令其鋒開自然勁徤草則縱心奔放旋覆腕轉蹙懸管聚鋒柔毫外拓左為外拓右為内伏連卷收攪吐納内轉藏鋒也既如舞袖揮拂而縈紆又若垂藤憀盤而繚繞蹙旋轉鋒亦如騰猿過樹逸虬得水輕騎追虜烈火燎原或氣雄而不可抑或勢逸而不可止縱於狂逸不違筆意也但先援筆引興心逸自急也仍接鋒以取興興盡則已又生􅝷鋒任篆端之竒妙象吐絲之縈結轉剔刓角多勾篆體或如蛇形或如兵陣故兵無常陣字無常體謂如水火勢多不定故曰字無常定也懷素嘗師鄔肜肜謂之曰學書古勢多矣惟太宗以獻之書如隆冬枯樹寒寂勁痩不置枝葉張旭稱亞聖嘗私語肜曰孤蓬自振驚沙坐飛余思而為書故得竒怪凡草聖盡於此懷素後學書豎牽如古釵脚顔太師以素為同學問之曰學書於師授之外湏自得之張長史覩孤蓬驚沙之外見公孫大娘舞劍器始得低昻廻翔之狀未知鄔兵曺有之乎曰似古釵脚為草書豎牽之極顔公曰師豎牽古釵脚何如屋漏痕素抱顔公脚唱嘆乆之顔公徐問曰師亦有自得之妙乎對曰吾觀夏雲多竒峰輙常師之夏雲因風變化乃無常勢又遇壁拆之路一一自然顔公曰草聖之妙代不乏人可謂聞所未聞也虞肇謂林韞曰子學我書但求其力耳殊不知用筆之方不在於力用於力死矣昔受教於韓吏部其法曰撥鐙推抱撚拽是已錢若水云善書者鮮得筆法唐陸希聲得之凡五字曰擫壓鈎格抵用筆雙鈎即㸃畫遒勁謂之撥鐙法希聲自言若二王皆傳此法陽氷亦得之希聲以授􅈯光光入長安為翰林供奉江南李後主得此法書絶遒勁復増二字曰導送雷簡夫云余偶晝卧聞江瀑漲聲想其波濤翻翻迅駛掀搕髙下蹙逐奔去之狀無物可寄其情遽起作書則心中之想盡出筆下矣噫鳥跡之始乃書法之宗皆有狀也張旭觀飛􅏃舞劍懷素觀夏雲顔公豎牽法以釵股不如屋漏痕斯師法之外皆自得者不專為草但通筆法也姜堯章草書法云折釵股者欲其圓而有力屋漏痕者欲其無起止之跡錐畫沙者欲其勻而藏鋒止則左右皆無失矣下筆之初有塔鋒有折鋒一字之體止應在右故也又有平起如𨽻藏鋒如篆止則妙矣並見學書纂要宣和書譜云唐元度臨書甚詳惜其出於法中而不能遺法以見意書學纂要云右軍用筆内擫而收歛故森嚴而有法度大令用筆外拓而開廓故散朗而多姿大抵書畫之法同故張彦逺云草書體貴一筆而成血脉隔行不㫁王子敬眀其深陸探微亦作一筆畫連綿不㫁精利潤媚新竒巧妙髙宗代張僧繇㸃拽斫拂依衛夫人筆陣圖一㸃一畫如鈎㦸利劍森森然吳道元古今獨歩授筆法於張旭此知書畫用筆同矣郭若虚云氣運本乎㳺心神采生於用筆用筆之難可識矣又畫有三病皆係用筆一曰版者腕弱筆癡全虧取與物狀平褊不能圓混也二曰刻者運筆中疑心手相反句畫之際妄生圭角也三曰結者欲行不行當散不散似物凝滯不能流暢也法書考卷三
