front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_008-1a, image: WYG0814/WYG0814-0531a.png}
body:
  text: 法書考卷八元盛熈眀撰附録印章印制周禮璽節鄭氏註云璽節者今之印章也許慎説文云印執政所持信也徐鍇云從手爪以持信也衛宏云秦以前民皆以金玉為印龍虎鈕惟其所好然則秦以來天子獨以印稱璽又獨以玉羣臣莫敢用也七雄之時臣下璽始稱曰印漢制諸侯王金璽璽之言信也古者印璽通名漢舊儀云諸侯王黄金璽槖駝鈕文曰璽謂刻曰某王之璽列侯黄金印龜鈕文曰某侯之章丞相太尉與三公前後左右將軍黄金印龜鈕文曰章中二千石銀印龜鈕文曰章千石六百石四百石至二百石以上皆銅印鼻鈕文曰印建武元年詔諸侯王金印赤綬公侯金印紫綬中二千石以上銀印青綬千石至四百石以下銅印墨綬及黄綬陳制金章或龜鈕貔鈕豹鈕銀章為龜鈕熊鈕羆鈕羔鈕鹿鈕銀印為珪鈕兎鈕銅印率環鈕吾衍曰漢晋諸印皆大不踰寸惟異其鈕以别主守之上下諸侯王印以槖駝列侯以龜將軍以虎於蠻夷則虵􅚣駝兎之屬示周禮六節之義也其字皆曰文常職多瓦鈕令長印止作鼻鈕可綰而已其印文惟侯印就範中鑄字極精緻是擇日封拜非急遽為之也虗爵曰填其文以金銀當時未有署僉以印為信故軍中印皆鑿官重者兩鑿成文官卑者畫一鑿或字有踈宻不一則宻文細而䟽文肥人名私印其六面者多鑿餘亦皆鑄率多為龜鈕或二印一龜身首蔵合謂之子母印聞有三級壇鈕及天禄辟邪者或大小為兩面晋時猶有漢印惟私印間用朱文字體與漢不異唐人用朱文故古法漸廢也印記唐太宗自書貞觀二字作二小印𤣥宗自書開元小字作一小印集賢印秘閣印翰林印各以判司所收掌圖書定印𢎞文之印恐是東觀舊印書者其印至小九和之印恐是官印多印搨本書畫東晋僕射周顗印古小雌字梁徐僧權印唐魏王恭印太平公主駙馬武延秀玉印胡書四字梵音云三藐母䭾今多黑塗潤州刺史徐嶠印嶠之子吏部侍郎㑹稽郡公徐浩浩子璹印議郎竇䝉印䝉弟范陽功曺竇印延王友竇永二小字印金部郎中劉繹印起居舍人李造印鄂州司馬張懐瓘弟盛王府司馬懷瓘印劍州司馬劉知章印光禄大夫中書令趙國公鍾紹京印張彦遠髙祖中書令河東公印曽祖相國魏國公印祖髙平公二小印司徒沂國公李勉印子兵部員外郎李約印趙國公李吉甫印御史大夫黎幹印桂州觀察使蕭佑印晋公韓滉印鄴侯李泌印宰相王涯印僕射馬縂印宣州長史周昉印張敦簡印劍州刺史王朏印右印記記千百年可為龜鑑别有右皆未詳去處皆識鍳之家印記並可為証又有禇氏書印非禇河南之印也此外更有禇家印署皆非鑒識不足為証故不具録若不識圖畫空騐印記然自古及今家蔵傳玩要知䟦尾印記乃書畫之本耳印譜長秋宮寶用之江休復嘉祐襍志云淘蔡河獲一玉印與篆文不同成隂陽字李昌言處見飛白鳯字印繡衣執法大夫印銅印龜鈕得之淮隂字畫㣲漫大夫字用嶧山篆法奉車都尉銀錯龜鈕徧體塗銀校尉之印章僧賛寕要言曰近獲銅龜印一寸餘其文五字其篆前兩行皆二字第三行單章字伸之令長稱副前二行廷尉之印章軍曲矦丞章馬永年懶真録云今印文榜額有之則秦璽文也子良誤合之李陽氷曰摹印之法有四功侔造化㝠受鬼神謂之神筆畫之外得㣲妙法謂之竒萟精於一規矩方員謂之工煩簡相叅布置不紊謂之巧趙彦衛云古印文作白文蓋用以印泥紫泥封詔是也今之木印及倉厫印近之矣自有紙始用朱字間有為白字者米芾書史云印文須細圏須與文等太宗秘閣圖書之印不滿二寸圏文皆細上閣圖書字印亦然仁宗後印經院賜經用上閣圖書字大印粗文若施於書畫古紙素字畫多有損於書帖近三館秘閣之印文雖細圈乃粗如半紙亦印損書畫也王說見某家印記與唐印相似始換作細圈仍皆求作篆如填篆自有法世填皆無法貞觀開元皆小印便於印縫大者圈刓角一寸已似古篆於鶺鴒頌上見之又云唐印郭如一細如絲髪篆文取稱不必專滿世所收唐告可考也今印文可篆囬環曲折更無餘地郭倍於文吾衍摹印法漢有摹印篆只是方正篆法與𨽻相通後人不識古印妄加盤屈且以為法多見故家蔵得漢印字皆方正近乎𨽻書此即摹印篆也凢屈曲盤回唐始如此今碑刻有顔魯公告尚書省可考白字印皆用漢篆平正方直字下可圜縱有斜筆出當取巧寫過如崔子五寫張平子碑上字及漢器上并碑蓋印章等字最第一其印文必過於邉不可空空且不古朱文印或用雜體篆不可太恠擇其近人情者免費詞說其印文不可逼邊須當以空中空白得中處為相宜庶免印出與邉相倚也字宜細於四傍有出筆皆滯邉邊須細於字字若一體印出時四邊虗紙昻起未免邉肥於字粘邊朱文建業文房之法也三字印一邉一字一邉兩字者以兩字處與一字處相等不可兩字中㫁又不可太相接凢印文中有一二字偶有自然空缺不可映帶者聴其自坐古印多如此又下有空處懸之最佳不可妄意伸屈務欲填滿若寫之得法自不覺空處凢印文中有匾口如子字上口畧須寛使口中見空稍多方混厚漢印皆如此四字印若前二字交果有空後二字無須當空一畫地别之字有脚故言及此不然一邉見分一邊不分非法度也軒齋等印古無此式惟唐相李泌有端居室白文五印或可為法白文終非法不若只朱文唐人雖有號未嘗作印三字扁却有之名印不可妄寫姓名相合或加印字等字或兼用印章字曰姓某印章不若只用印字為正也二名者可回文寫姓下著印字在右二名左是也單名者曰姓某之印却不可回文寫名印内不得著氏字表字印只用二字此為正式近人欲并知姓氏加氏其上曰某氏某若作姓集文古雖有此稱係他人美已却不可入印漢人三字印非複姓及無印字者皆非名印蓋字印不可以印字亂耳漢張安字㓜君有印曰張㓜君右一字左二字唐呂温字化光有印曰呂化光此亦三字表字印式也押署䟦尾前代御府自晋宋至於隋收聚圖書皆末行印記但備列當時鑒識藝人押署宋張則袁倩陸綏齊劉瑱毛惠梁沈熾文唐懐充徐僧權孫子真法象庾於陵徐湯孫達姚懷珍滿騫范允祖顧􅍾江僧寶陳延祖陳杜僧譚黄髙北齊丁道務隋江縂姚察朱昇何妥大業年月日奉勅裝開皇年月日内史薛道衡署名䟦尾亦有開皇年月日叅軍事學士諸葛頴咨議叅軍開府學士柳顧言釋智來又唐武德初秦王府䟦尾薛收禇亮虞世南貞觀中褚河南等監裝背並有當時鑒識人押署貞觀十一年月日樊行整裝李德穎數平儼蘇旭韋挺監十二年月日題署同十一年十三年月日王行直裝褚遂良監臣無忌臣𤣥齡臣士廉臣徴臣君集唐皎臣楊師道李大亮唐儉臣孝恭劉徳威章挺馮長命亦有不署馮長命唐皎者十四年月日張龍裝臣士亷臣徴楊師道褚遂良姜行本亦有蔡揣裝十五年十六年張龍樹裝禇遂良楊師道魏徴房𤣥齡無他人名十七年十八年十九年禇遂良監無他人名是開元中割却開元中𤣥宗購求天下圖書命當時鑒識人押署䟦尾印用之字其來乆矣太初元年夏五月正厯以正月為嵗首色上黄用五注云漢用土數五五謂印文若丞相曰丞相之印章諸守相卿印文不足五字者以之字足右二印皆太初以後五字印也後世不然印文榜額有三字者足成四字有五字者足成六字但取端正耳非之字本意也倉印銅印甚薄令其長而二之隆其中一叚比印身倍厚為鈕色如碧玉鈕左一淺竅不透右按太倉令丞漢制主受郡國漕榖督攝萬幾通典云北齊有木印長一尺廣二寸五分背上為鼻鈕長九寸厚一寸廣七分腹下隐起篆文曰督攝萬幾惟以印籍縫今齪合縫條印蓋原於此南徐司馬之印銅印銳鈕桓温嘗引袁髙為南徐司馬即此是也印制與漢不類蓋晋物也然文乃楷書順字或謂古者官印皆佩於身即作楷書須順字讀之所貴一則人易讀若是反字雖可以印用但擾攘時仰賜臣下貴順忌反非若篆文反正皆可讀也賈山印銅印兩面山漢文時言治亂曰賈山至言邯鄲淳銅印兩面文曰子叔史云淳字叔當以印為正劉勝私印銅印瓦鈕鈕上作鈕鈕中穿一小印鈕上見一珠下覆盆可轉不可出勝姓名見東漢杜宻傳中金關封完銅印輪鈕兩面上皆有文如漢鏡名武琦大面甲内有印着臣字者王應先曰秦漢前人相語徃徃稱臣不必君前然後稱臣也王寀曰武琦六印如言事言䟽等文自有序則稱臣者當徹君前其制度字畫纎巧不類秦漢疑六朝物右擇其制度之異者録之餘見各家譜中楊克一圖書譜一卷又名集古印格張文潜之甥其文補之王厚之復齋譜字順伯臨川人顔叔夏古印譜二卷字景周吳人姜䕫集古印譜一卷字堯章鄱陽人自稱白石生吾衍古印文一卷字子行太末人精篆籀趙孟頫印史一卷字子昻吳興人善書印法秦有八體書三曰刻符書即古所謂繆篆五曰摹印蕭子良以刻符摹印合為一體徐鍇謂符者竹而中剖之字形半分理應别為一體摹印屈曲縝宻尾劉懐信等亦或割去前代名氏以已等名字代之開元五年王思忠裝亦有張龍樹裝王行直裝陸元悌賜名聖直魏哲褚無量姚崇王知逸監劉懐信賜名聖從馬懷素蘇頲宋璟開元十年王思忠裝馮紹陳儀十五年李仙丹裝背尹奉祥建中十年賀遂竒劉逸江茹蘭芳宋逰􅅛以上畧舉大例法書考卷八
