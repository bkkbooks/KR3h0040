front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_006-1a, image: WYG0814/WYG0814-0523c.png}
body:
  text: 法書考卷六元盛熈明撰風神翰墨之妙通於神眀故必積學累功心手相忘當其揮運之際自有成書於胸中乃能精神融㑹悉寓於書或遲或速動合規矩變化無常而風神超逸是非髙眀之資孰克然耶情性禁經云有功無性神彩不生有性無功神彩不變又云九生法一生筆止乃可言書虞世南云收視反聴絶慮凝神心正氣和則契於妙心神不正書則欹斜志氣不和字則顛仆故知字雖有質迹本無為禀隂陽而動静體萬物以成形書道𤣥㣲必資神遇不可以力求也必須心悟不可以目取也孫過庭云一時而書有乖有合各有其五神怡務閑止䝉無所從右軍之書寫樂毅則情多怫欎書方朔則意涉瓌竒黄庭經則怡懌虗無大師藏則縱横争折暨乎蘭亭興集思逸神超私門戒誓情拘意慘所謂涉樂方笑言哀已歎情動乎中取㑹風騷之意陽舒隂慘本乎天地之心右軍之書末年多妙當緣思慮通睿志氣和平不激不厲而風規自遠子敬以下莫不鼓努為力操置成體豈獨工用不侔亦乃神情懸隔也消息多方情性不一止外耀鋒芒内存骨氣止偏翫所乖張懐瓘云古人妙迹用思沉欎自非㝠搜不可得見固大巧若拙眀道若昧汎濫則混於愚智研味則駭於心神百靈儼其如前萬象森兮自矚雷電興滅光隂糾紛考無說而䆒情察無形而得相隨變恍惚窮深杳㝠金山玉林敷乎其内何竒不有何怪不儲無物之象藏之於宻静而求之或存躁而求之或失雖眀目諦察而不見長䇿審逼而不知豈徒倒薤懸針偃波垂露而已哉訣云彩色者字之神也神馭氣氣馭形形全骨肉肉全神色歐陽修曰作字要熟熟則神氣完全姜堯章云風神一須人品髙二須師法古三須紙墨佳四須險勁五須髙眀六湏潤澤七須向背得宜八須時出新意則自然長者如秀整之士短者如精悍之徒瘦者如山澤之癯肥者如貴㳺之子勁者如武夫媚者如美女欹斜者如醉仙端楷者如賢士運筆訣云遺跡古法事理昭然用舍變通誠難定執神彩風姿随宜自立圖書譜云情之喜怒哀樂各有分數氣之清和肅莊竒麗古淡互有出入遲速虞安吉云太緩無筋太急無骨筆勢論云意在筆前字居心後未作之始結思成矣仍下筆不用急故須遲何也筆為將軍故須持重心欲急不欲遲何也心為箭鋒不欲遲遲則中物不入毎字欲十遲五急十曲五直十藏五出十起五伏方可謂書若直筆急牽此暫視似書乆味無力又曰初業書要類本乎緩筆定其形勢忙則失其規矩但取形質快徤手腕輕便方員大小各不相犯莫以小字易而忙行筆勢莫以大字難而慢展毫頭筆髓論云遲速虛實若輪扁斵輪不疾不徐得之於心應之於手心口不能言也歐陽詢云最不可忙忙則失勢最不可緩緩則骨癡孫過庭云至有未悟淹留偏思勁疾不能迅速偏效持重夫勁速者超逸之機遲留者賞㑹之致將及甚速行臻㑹美之方專溺於遲終䘮絶倫之妙能速不速所謂淹留因遲就遲詎名賞㑹非其心閒手敏難以兼通訣云速則神在其中遲則妙在其内能速而速謂之入神能速而不速謂之賞㑹未能速而速謂之狂馳不當遲而遲謂之淹滯馳則形勢不全滯則骨肉重濁又云能縱横斜直不速而行不止而緩腕不停筆筆不離紙實按而和意在筆前心不速而神氣短筆不遲而形色枯一速一遲乃得則柔相濟表裏相資姜堯章云遲以取妍速以取勁止又多失勢宻法曰遲筆法於疾疾筆法於遲止偏宜寂静方圓翰林隠術云崔子玉云觀其法象俯仰有儀方不中矩圓不中規抑左揚右望之若歆虞世南云字之形者如目之視也為目有止限眀執字體既有質滯為目所視遠近不同如水在方圓豈由乎水且筆妙喻水方圓喻字所視則同遠近則異變通異訣云方以圓成圓由方得舍方求圓則骨氣莫合舍圓求方則神氣不潤方不變謂之斗圓不變謂之環此書之大病也張懐瓘云蓋欲方而有規圓而不矩亦猶人之指腕促則如指之卷賖則如腕之曲理須裹之以皮肉為筋力是乃疾也豈曰壯哉書一須圓轉順其天理若懾成稜角是乃病也豈曰力哉堯章云方圓者真草之體用真貴方草貴圓方者叅之以圓圓者叅之以方斯為妙矣然方圓曲直不可顯露直須㴠泳一出自然真多用折草多用轉折欲少駐駐則有力轉不欲滯滯則不通然而真以轉而後通草以折而後勁方長嚴肅為體圓轉輕徤為用法書考卷六
