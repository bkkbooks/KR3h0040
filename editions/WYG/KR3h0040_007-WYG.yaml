  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_007-1a, image: WYG0814/WYG0814-0526c.png}
body:
  text: 法書考卷七元盛熈眀撰工用王右軍過江觀覽名刻歎學衛夫人書徒費嵗月故學書必當知所宗尚乃能知所用力至於臨摹之功丹墨之要皆宜精䆒也宗學右軍云須㝷諸名書鍾張信為絶倫其餘不足觀張旭云妙在執筆令其圓暢勿使拘攣其次識法須口傳手授勿使無度所謂筆法也其次在布置不慢不廹巧使合宜其次變通適懷縱合規矩其次紙筆精佳虞世南云掇筆徃來懸管自在但取體之雄壯不可拘其小節若畏懼生疑否臧不决運用迷於筆前振動惑於手下師心囿乎獨見弟子執其寡聞恥請問於智人忌藝能之勝已若欲造𤣥微未之見也張懐瓘云夫物芸芸各歸其根復本之謂也書復於本上則法於自然次則歸篆籀又次者師於鍾王夫學鍾王尚不繼虞褚况冗冗者哉又云一㸃一畫意態縱横偃亞中間綽有餘裕然字峻秀類於生動幽若深遠煥若神明以不測為量者書之妙也是曰無病動而行之益佳其有方潤齊平支體肥腯布置逼仄有所不容稜角且形神氣昏䝉以濃墨為華者書之困也是曰疾甚須毒藥以攻之孫過庭云趨向適時行書為妙要之題勒方富真乃居先草不兼真殊於專謹真不通草殊非翰札真以㸃畫為形質使轉為性情草以㸃畫為性情使轉為形質草乖使轉不能成字真􅃧㸃畫尤可記文回互雖殊大體相涉故亦旁通二家俯貫八分包括篇章㴠泳飛白若毫釐不察則胡越殊風者焉至於鍾繇𨽻竒張芝草聖此乃專精一體以致絶倫伯英不真而㸃畫狼籍元常不草而使轉縱横自兹以降不能兼善者有所不逮非專精也雖篆𨽻草章工用多變而濟成厥美各有攸宜篆尚婉而通𨽻欲精而宻草貴流而暢章務險而便然而凛之以風神温之以妍潤鼓之以枯勁和之以閒雅故可達其情性形其哀樂又云貴能古不乖時今不同弊但右軍之書代多稱習良可據為宗匠取立㫖歸豈惟㑹古通今亦乃情深調合致使摹搨日廣研習嵗滋先後著名多從散落歴代終始非其效與夫運用之方雖由已出規模所設信屬目前差之毫釐失以千里苟知其術適可兼通心不厭精手不忘熟若運用盡於精熟規矩暗於胸􅁭自然容與徘􅆦意先筆後瀟灑流落翰逸神飛亦猶𢎞羊之心預乎無際庖丁之目不見全牛若思通楷則少不如老學成規矩則老不如少思則老而愈妙學乃少而可勉勉之不已抑有三時時然一變極其分矣至如初學分布但求平正者不能及矣顔柳結體既異古人用筆復溺一偏書法一變字畫剛勁髙明固不為無助而晋魏之風軌埽地矣僧傳曰政禪師攻書筆法絶如晋宋間人嘗笑學者臨法帖曰彼皆知翰墨為貴者其工皆有意今童子書畫多純筆可法也臨摹筆勢論云始書之時不可盡其形勢一徧正脚手二徧少得形勢三徧㣲㣲似本四徧加其遒潤五徧兼加抽㧞如其生澁筆下不滑兩行一度創臨惟須筆滑不得計其徧數唐太宗云朕少時頻遭陣敵必自指揮即知其强弱毎取吾弱對其强以吾强對其弱敵犯吾弱踰追奔不百數十步吾撃其弱必突過其陣自背而反撃之無不大潰多用此制勝思得其理深也今吾臨古人之書殊不學其形勢惟在求其骨力及得其骨力而形勢自生耳然我之所為皆先作意是以果能成也張懷瓘云夫簡兵則觸目而是擇將則萬不得一固與衆同者俗物與衆異者竒才書亦然然為將之眀不必披圖講法眀在臨陣制勝為書之妙不必應文按本妙在應變無方皆能遇事從宜决之於度内者也虞安吉云未觧書意者一㸃一畫皆求象本乃轉自取拙豈成書耶姜堯章云摹書最易唐太宗云卧王濛於紙上坐徐偃於筆下可以嗤笑子雲惟初學者不得不摹亦以節度其手易於成就既知平正務追險絶復歸平正初謂未及中則過之㑹通之際人書俱老李華云大抵字不可拙亦不可巧不可今不可古華質相半可也鍾王之法悉而備矣近世虞世南深得其體别有婉媚之態徐季海云張伯英臨池學書池水盡黑永禪師登樓不下四十餘年張公精熟號為草聖永師拘滯終著能名以此而言非一朝一夕所能盡矣俗云書無百日功悠悠之談也臨池談云第一用紙筆第二認勢第三裹束第四真如立行如行第五草如走第六上稀第七中勻第八下宻張敬元云初學必先學真書若便學縱體為宗主真體難成矣宋髙宗云士於書法必先學真書以八法俱備不相附麗至側字亦可正讀不渝本體蓋篆𨽻之遺風若楷法既到肄業行草自然臻妙朱文公筆銘握管濡毫伸紙行墨一在其間㸃㸃畫畫放意則荒取妍則惑必有事焉神明厥德姜堯章云下筆盡倣古人則少神氣專務遒勁則俗疾不除又云或者專喜方正極意歐顔或者專務勻圓留心虞永或謂體須稍匾則自然平正此又有徐㑹稽之病或謂欲其蕭散則自不塵俗此又有王子敬之風豈足盡書法之美哉歐陽率更雖結體太拘而用筆特備衆美雖小楷而翰墨洒落追跡鍾王要皆須是古人名筆置之几案懸之座右朝夕諦觀思其運筆之理然後可以摹臨其次雙鉤蠟本須精意摹搨乃不失位置之美耳臨書易進摹書易忘經意與不經意也夫臨摹之際毫髪失真則精神頓異所貴詳謹又云書字專以風神超邁為主刻之金石其可苟哉雙鉤之法須墨暈不出字外或填其内或朱其背正得肥痩之本體雖然尤貴於痩使工人刻之又從而刮治之則痩者亦肥矣雙鉤時須倒置之則無容私於其間誠使下本眀上紙薄倒鉤何害若下本晦上紙薄却須能書者為之發其筆意可也夫鋒芒圭角字之精神大抵雙鉤多失又須朱其背時稍致意焉丹墨右軍云紙剛用軟筆紙柔用硬筆純剛如錐畫石純柔如泥沙既不圓暢神格亡矣書石同紙剛例蓋其相得也又云用筆着墨不過三分不得深浸毛弱無力墨用松節同研乆彌佳米元章書史云古書畫皆圓蓋有助於器唐皆鳯池研中心如瓦凹故曰研瓦援筆因凹勢鋒已圓書畫安得不圓今硯治心平如紙援筆則匾故字亦匾又近有􅌯心凸硯援筆即三角字安得圓哉姜堯章云欲刻者不失真未有若書丹者然筆得墨則痩得朱則肥故書丹先以痩為竒而圓熟美潤常有餘燥勁老古常不足朱使然也又云作楷欲乾然不可太燥行草則燥潤相雜潤以取妍燥以取險墨濃則筆滯墨燥則筆枯筆鋒欲長勁而圓長則含墨可以運勁則有力圓則妍美蓋紙墨筆皆書法之一助也法書考卷七
