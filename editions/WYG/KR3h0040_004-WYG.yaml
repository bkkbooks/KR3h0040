  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_004-1a, image: WYG0814/WYG0814-0512c.png}
body:
  text: 法書考卷四元盛熈眀撰圖訣毎觀古人遺墨在世㸃畫精妙振動若生蓋其用功有自來矣世傳衛夫人之筆陣圖王右軍之永字八法猶可考也舍此而欲求全美於成體之後固亦難矣今采八法併偏傍之訣列為圖於左八法翰林禁經云八法起於𨽻字之始自崔張鍾王傳授所由該於萬字墨道之最不可不眀也隋智永發其㫖趣授於虞世南自兹傳授遂廣彰焉李陽氷云昔逸少工書多載十五年偏工永字以其備八法之勢能通一切字也側不貴卧如髙峰之墜石問曰㸃而言側何也論曰謂筆鋒顧右止神格䘮矣訣云側者側下其筆止則稜利矣又曰作㸃向左止按筆收之一勒嘗患平如千里之陣雲問曰不言畫而言勒何也論曰勒者趯筆而行止㣲可稱工矣訣曰筞筆湏勒仰筆覆收又云用中指鈎筆止遣至盡處亅努過直而力敗如萬嵗之枯藤問曰中心豎畫謂之努何也論曰勢㣲努曰努止書之病也訣曰鋒湏先發止如錐畫沙又曰努彎環而勢如深林之喬木趯宜存而勢生鋒峻快以如飛問曰凡字之出鋒謂之挑今謂之趯何也論曰語異而體一止不墜矣訣云湏蹲鋒得勢而出出則暗出又云傍鋒輕掲止欲挑還置也張敬元云又謂之抽筆事字中畫便宜下筆便挑不宜停筆姜堯章云挑剔者字之步履欲其沈實晋人挑剔或帶斜拂或横引向外至顔柳始正鋒為之而無古飄逸之氣一左上為䇿䇿仰收而暗掲問曰䇿一名折異畫今謂之䇿何也論曰䇿謂之畫止此備畫耳訣云仰筆潜鋒以平勒之法仰收掲腕止峻顧於掠也丿左下為掠掠左出而鋒輕問曰掠一名分法今稱為掠何也論曰掠乃疾徐有凖止可收矣唐太宗云為撇必掠貴險而勁訣云撇過謂之掠止傷於緩滯又云㣲曲而下筆心至卷處孫過庭云遣不當速丿右上為啄啄倉皇而疾掩如利劍截㫁犀角象牙訣云右向左之勢為卷啄按筆潜蹙於右止衂謂之啄者如禽之啄物也立筆下罨湏疾為勝形似鳥獸卧斫斜發作丿不宜遲右下為磔磔䟐趞以開撐如崩浪雷奔問曰發波之筆今謂之磔何也論曰發波之筆止遲澁之訣云始入筆豎築止由心而始也湏飛動無凝滯又云波法㣲直曰磔横過曰波作一波當三過折筆抑而後曵乀不宜緩又云抽筆法左罨掠湏峻利止流滑凢淺側起平發𦂳殺按波為抽筆從腹内起又謂平磔法不遲不疾止駐筆而後放如生蛇渡水庾肩吾云掲放更當駐唐太宗云為波必磔貴三折止欲復駐而去之草書以丶拂代磔如柳葉撃石波者缺波也章草用之又八分更有凖尾波即鍾公㤗山銘及魏文帝受禪碑中已有此體姜堯章云丿者字之手足伸縮異度變化多端要如魚翼鳥趐翩翩自得黄伯思云昔人運筆側掠努趯䟐皆有成規造㣲洞𤣥則出捩飛動神㑹意得然所謂成規者未嘗失也偏傍孫過庭云一畫之間變起伏於鋒杪一㸃之内殊衂挫於毫茫精其㸃畫乃能成字勒法一偃蹲鋒自駐力到疾提力滿微捺力盡回鋒一仰蹲鋒自駐力到㣲捺力滿疾提力盡回鋒一平蹲鋒自駐力到疾過力盡回鋒訣云用筆若錐畫沙横畫放手盡力痩硬方直沈着勁徤無變為度縱畫硬如屈鐡一縱一横可方可圓千形萬狀皆如一畫作一畫成熟就痩硬之鐡畫變温和之玉畫又云横畫似八分唐太宗云為畫必勒貴澁而遲姜堯章云畫者字之骨體止結束堅實士兩畫者上仰下偃三止潜鋒平勒中背筆仰筞下𦂳趯覆收唐太宗云三湏觧磔上平中仰下覆春生是也禁經云黄庭三闗字用草法止凢横畫多用此法隔仰隔覆見智果頌鄉背法鄉筆貴和􅕶背筆貴峻垂縮法亅頓筆又云垂露欲垂而復縮丨懸針自王右軍始筆欲正自上而下如長針垂偏拂自張長史始張敬元申字中畫宜卓筆直畫疾抽唐太宗云為豎必怒貴戰而雄㸃法丶冫冫㸃之變無窮皆帶側勢蹲之首尾相顧自成三過筆有偃仰鄉背等勢着㸃皆磊磊落落似大石之當衢或如蹲鴟或如𤓰瓣或如栗子或存若鶚口尖如䑕矢如斯之類各稟其儀姜堯章云㸃者字之眉目全要顧盻精神有向有背隨字異形散水法氵互相顯異氵潜相属視氵行書借勢訣云上衂側中偃下潜挫趯鋒或藏或露止輕利為美冫冫訣云上側覆殺下築而趯之止率字左右用之烈火法从古法灬各自立勢灬聨飛灬布基格訣云衂鋒暗接湏各立勢抵背潜衂所謂視之不見考之彌章聮飛者暗衂㣲駐輕掲潜趯筆鋒連綿相顧布絶禁經云聮飛如雁陣當秋樂毅論燕然等字用之姜堯章云四㸃者一㸃起兩㸃帶一㸃應曽頭其脚法對合貴從上開下合八相背貴横上合下開訣曰左潜掲而右啄曽左啄右側其脚長舒左足謂有脚者向右舒寳其等字是也頁脚法頁上畫平勒頁斗折衮筆法令訣云湏按鋒上下蹙衂之令今等字是也謂下一㸃鳥字法馬焉字同切宜𦂳收右軍云字有緩急如烏下手一㸃湏急横直即湏遲欲烏之脚急乃取形勢也宀頭法宀若宀各相顯異宀行法宀章草訣云上㸃駐鋒左右挫鋒横畫按筆勢湏相順又曰上㸃止為美姜堯章云宀頭湏覆其下容寳等字上㸃湏正畫湏圓的不宜相着上長下短暗築法冫訣云馭風直衝有㸃連横則名暗築月其字兩㸃是也豎􅝫法訣云擡筆竪䇿挫鋒上下竪直尚嘗等字中竪畫用灬􅝫垂露懸針向背努等法皆有之肥瘠以字分為稱長短随偏傍所宜奮筆法卜訣云左側而獨立中衂側而右鉤禁經云鍾書宣示用止系字三書也戈法弋如百鈞之弩發論曰夫斫戈之法落筆峩峩如長松之倚谿谷似欲倒也筆訣云悉以中指遣至盡處止趯之潜鋒暗勒勢盡然後趯之右軍背趯戈法上則俯而過止正之於後也永禪師澁出戈法止此云禿出法張旭折芒法潜鋒𦂳走意盡乃收章草法潛按㣲進止質滯鈍俗又有斫戈反戈飛戈唐太宗云為戈必潤貴遲疑而右顧張敬元云戈脚宜斜筆直抽直者縁上實下自成也上實謂藏鋒抽筆也背抛法乙蠆尾如壯士之屈臂􅡧外畧訣云蹲鋒𦂳掠徐擲之速則失勢遲則緩怯又謂外擘法左峻掠中潛鋒衂挫右蹲鋒外擲右軍云腕脚􅀈斡上捺下撚終始折轉援毫蹲鋒即輕重有凖庾肩吾云欲抛還置為駐鋒而後趯之撆法丿背撇首圓蹲過作背懸針左出郷撇首側蹲右顧作向左筆尾懸針左出如手之前後撇物提鋒空中行下衫法彡上平中仰下偃上横下縱或反之唐太宗云彡乃形影字右邉不可一向為之湏背下撇之人等法人入等法乂交争勢訣云凡又人第二筆云攙引仰拽也人章草王云趯之欲利按之欲輕亻立人如鳥之在柱姜堯章云如立人田王礻衣一切偏傍皆湏令狭長則占有餘地矣不可太宻太巧是唐人之病也匚法下體切匚上平旁嚮下偃匚上仰旁背下平匚上飛平傍飛嚮下飛偃飛者空中飛法謂𦂳提轉腕疾書也鈎努法􅗵勒努趯訣云圓角趯鋒作努法勢未盡而趯之右軍云作右邉折角止直截而下轉為曲折鈎筆轉角折鋒輕過亦謂轉角為暗角唐太宗云為環必貴蹙鋒而忽轉書勢論云急牽引如雲中掣電日月因固是也張敬元云固字轉角之勢止貴其圓潤蘭亭瘞鶴銘固字妙勾裹法􅗵偃勒嚮􅝫趯丁仰勒背􅝫趯訣云圓角激鋒待筋骨而成如武人屈臂又如勁弩筋節右軍云四角不用峻及有稜顔真卿云用筆如紙下行重複法戔上磔衂鋒下磔出之訣曰上縮鋒作弩下出鋒作趯唐太宗云多字四撇一縮二少縮三亦縮四湏出鋒丁字脚勢丁打宜疾不宜遲寺守宜疾挑不宜遲鳯字飛勢几兩邉悉宜圓𦂳用筆之時左邉勢宜疾背筆時意中如電疾急也几鳯等字同挑勢乙􅡧右背􅝫左衂仰勒反趯貴抱腹而清口字勢嗚呼喉嚨等字口在左者宜上和扣如知口在右者宜下法書考卷四
