  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_002-1a, image: WYG0814/WYG0814-0502a.png}
body:
  text: 法書考巻二元盛熈眀撰字源圖書既出書道尚矣固知文字之始非特倉頡也後世作者皆乘時而増損之然宇内萬國文字各異其源未能詳詰也嘗觀竺典云造書之主凡三人曰梵曰伽盧曰倉頡梵者光音天人也以梵天之書傳於邙土其書右行伽盧創書於西域其書左行皆以音韻相生而成字諸蕃之書皆其變也其季倉頡居中夏象諸物形而為文形聲相益以成字其書下行未知其說果何所據也因而考之蓋西方以音為母華夏以文為基諸國之風土語音既殊而文字遂亦各異泝流窮源其法似不出乎此三者也嗚呼制書以載言因言以達意意苟相符則言可忘言假以傳而書非定法古之至人由其習俗之殊隨宜而制作雖東西各源而傳理實一古今遷變而華質靡常夫豈人力所能及哉今以華梵創書之㫖列之於篇梵音梵者不囉麻也合而言之為梵此云光音天也其字之母凡五十曰悉曇章此云能成諸義也其中十六字為轉聲之範三十四字為五音之祖或一或二或三至於聮載互合而有輕重清濁非清非濁等聲其詳見於天竺字源今存其母如左十六聲者右依天竺聲明字源及諸教中有十六轉聲今所傳者去其中第七第八第九第十之四字惟有十二轉聲者蓋以此四聲已在第三第四二聲中所統也斯乃音韻之祖因之配合而生生無窮焉其土有五天竺文字稍異獨以中天竺為正削竹為筆以貝多樹葉為紙其書廣有六十四種名載釋書兹不復詳謹按諸蕃文字雖變遷各異然其音韻莫不祖述梵音故今曰梵音而不曰梵書者以其音律交合而成字載音以導意非若華文有六義也鄭樵嘗言梵字有象形乃其臆説耳字母者猶倉頡之古文也其音韻㑹合而成字猶古文滋孕而成篆也其轉變而為諸蕃之書者亦由行草分𨽻之變也華文庖犧氏之王天下也仰則觀象於天俯則觀法於地視鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以垂憲象及神農氏結繩為治以統事務繁飾既萌易以書契百工以乂萬民以察蓋取諸夬自倉頡創始以迄五帝三皇之世改易殊體封於泰山者七十有二代靡有同焉其書總有六義缺一曰指事視而可識察而可見上下是也在上為上在下為下二曰象形畫成其物隨體詰詘日月是也日滿月虧效其形也三曰諧聲以事為名取譬相成江湖是也以類為形配以聲也四曰㑹意比類合誼以見指撝武信是也止戈為武人言為信五曰轉注連類一首同意相受考老是也以老受考也六曰假借本無其字依聲記事令長是也數言同字其聲雖異文意一也至周宣王太史籀著大篆十五篇與古文或異至孔子書六經左丘明述春秋傳皆以古文其後諸侯力政不統於王分為六國制度各異秦始皇初并天下丞相李斯乃奏同之罷其不與秦文合者斯乃作倉頡篇中車府令趙高作爰歴篇太史令胡母敬作傳學篇頗省改古法為小篆焉至於焚書坑儒典謨滌盡工獄事煩變𨽻趣約而古文由此絶矣是時有八體一曰大篆二曰小篆三曰刻符四曰蟲書即鳥書以書幡信五曰摹印六曰署書七曰殳書隨殳體八􅒀而書之也八曰𨽻書衛恒曰王莽時甄豐定古文復有六種一曰古文孔氏壁中書也二曰竒字即古文而異者也三曰篆書秦篆是也四曰佐書即𨽻書也五曰繆書所以摹印也六曰鳥書所以書幡信也張懐瓘十體書斷各附諸家之論古文者黄帝史倉頡所造也頡四目通神明仰觀奎星圓曲之勢俯察龜文鳥跡之象博採衆美合而為字是曰古文夫文字總而為言包意以名事也分而為義則文者祖父字者子孫得之自然備其文理象形之屬則謂之文因而滋蔓母子相生形聲㑹意之屬則謂之字字者言孳乳浸多也題之竹帛謂之書書者如也舒也著也記也著明萬事記徃知來名言諸無宰制羣有也三代以來咸用之秦用小篆焚燒先典古文絶矣漢文時秦博士伏勝獻古文尚書時又有魏文侯樂人竇公年二百八十歲獻古文樂書一篇武帝時魯共王壊孔子宅壁間得孝經尚書等書宣帝時河南女子壊老子屋得古文二篇晉咸寧五年汲郡人盗發魏安釐王塜得丹書千餘萬言其書隨世已變數體周幽王時又有古文者今汲冡書中多有是也滕公塜内得石銘人無識者惟叔孫通云凡蝌蚪書也科者上古之别名也吾衍學古編云科斗為字之祖象蝦蟇子形或巧畫形狀失本意矣上古無筆墨以竹挺㸃漆書竹木上竹剛漆膩畫不能行故首重尾輕似其形耳大篆者周史籀所作也或云柱下史始變古文或同或異謂之篆篆者傳也傳其物理施之無窮漢藝文志史籀十五篇並此也以史官制之用以教授謂之史書凡九千字秦趙高以教胡亥又漢元年王遒嚴延年並工史書是也秦焚書惟易與史篇得全呂氏春秋云倉頡造大篆非也學古編云欵識文者諸侯本國之文也古者諸侯書體各異秦始一其法世或以欵識襍篆書一篇之上齊楚不分人莫知其謬學篆博覽古器真欵識中古字神氣散樸可以助人亦知象形指事㑹意筆未變之妙也凡作篆之氣象良以未嘗博古故也善見模文終不及古籀文者史籀所作也與古文小異後人以名稱書謂之籀文七畧曰即周時史官教學童書也與孔壁古文異體即竒字也其跡則石鼓文存焉學古編云李斯既作小篆遂以籀文為大篆篆法匾者最佳謂之䖝音果匾徐鉉謂非老手莫能到石鼔是也小篆者秦相李斯所作也増損大篆籀文謂之小篆亦曰秦篆始皇二十年始并六國斯時為廷尉乃奏罷不合秦文者於是天下行之畫如鐡石字若飛動作楷𨽻之祖為不易之法其銘題鐘鼎及作符節至今用焉斯雖草創遂造其極矣學古編云漢篆多變古法此許氏作説文以救失也必先通此則冩無謬又當考通釋然字有古今不同説文頗廣當先熟古編大槩得矣初學篆時當虚手心伸中指并二指於几上虚畫如此流便方可􅋵筆􅋵筆必須单鈎却伸中指在下夾襯方圓平直無不可意矣世多不得師傳故字多欹斜勢不活動若篆大字當虚腕懸筆腕着紙即不活以紙筒㯶櫚為筆者非士大夫所為也小篆一也而各有筆法李斯方圖廓落陽氷圓活姿媚徐鉉如𨽻無垂脚字下如釵股稍大鍇如其兄但字下為玉筯㣲小耳崔子玉多用𨽻法似乎不精然甚有漢意陽氷多非古法蓋效子玉也小篆世喜長然不可過但以方楷一字半為度一字為正體半字為垂脚豈不美茂或有不可者當以正脚為主餘畧收短如幡脚可也字有一無垂脚者如生甘之等字却以上枝為出如草木之為物正生則上出枝倒懸則下出枝凡寫匾額畫宜肥體宜方碑蓋同此但以小篆為正不用襍體凡口中字不可填滿但如井斗中着一字任其空可放垂筆方不覺大圈比諸字亦須畧收口不可圓亦不可方只以炭􅜘範子為度自好如日月等字須更放小也凡篆中包一二畫如日月之類若初一字内畫不與兩傍相連後皆如之首尾一法若或接或否各不同者非法也又用員圈及員㸃小篆無此法古文有之口字不可作三角形凡鐘鼎古文錯襍為用無跡為當但以小篆法寫之自然一法此雖易求却難襍記不熟其法未免如百衲衣為識者笑此為逸法正用廢此可也體率有多變有起有應如此而起者當如此應各有義理王右軍羲之字當字得字深字慰字最多多至數十字無有同者然而未嘗不同也可謂所欲不踰矩矣凡學草書先當取法張芝星象索靖等章草而結體平正下筆有源然後倣右軍申之以變化鼔之以竒崛若從學諸家則字有工拙云云見前况今世哉然而襟韻不高記憶雖多莫洗塵俗若使風神蕭散便當過人自唐以前多是獨草不過兩字後世相連属數十字而不斷號曰遊絲此雖出於古人不足為法更成大病古人作書云云見前特是引帶常考其字是㸃畫處皆重非㸃畫處偶相引帶其筆皆輕雖復變化多端未嘗亂其法度張顛懐素最號野逸而不失此法近代山谷自謂得長沙三昧自是又一變矣流至於今不可復觀唐太宗云行行若縈春蚓字字若綰秋蛇惡無骨也大抵用筆有緩有急云云見前忽徃復收緩以倣古急以出竒有鋒以耀其精神無鋒以含其氣味横斜曲直鉤環盤紆皆以勢為主然不欲相帶則近於俗横畫不欲太長云云則間有之意盡則用懸針意盡雖再生意筆不若垂露耳草書忌横直分明横直多則如積薪束葦無蕭散之氣時時一出為妙蔡希宗云始下筆須藏鋒轉腕止箭不欲遲以上云云並見前書學纂要法書考卷二
