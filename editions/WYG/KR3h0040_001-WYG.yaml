采視其雕文非特刻鵠人人下筆寕止追響遺迹見珍餘芳可折誠乃驅馳並駕不逮前鋒而中權後殿各盡其美允為下中品徐幹張云章草能品徐令文張云章草能品王愔張云章草能品顔倩梁武云如貧家果實無妨可愛少乏珍羞王彬之梁評放縱快利筆道流便柳惲梁評縱横廓落大意不凡而徳體未備徐淮南梁評如南岡士夫縱尚風軌而不免寒乞張斯梁評如辨士對敭獨語不回得心㑹理齊髙帝庾云下上品李云中下品張云行草能品劉珉李云頺波赴壑狂澗爭流蕭特梁評雖有家風而風流勢薄猶如羲獻安得相似庾肩吾張云𨽻草能品李云下上品梁評畏懼收斂少得自充效未能精去蕭蔡逺矣袁崧李云下上品梁評如深山道士見人便欲退縮梁武帝張云草能品李云下下品梁簡文帝李云下中品梁元帝陳文帝褚淵沈君理張正見右數君亦稱妙筆多類效顰猶枯林之青露一枝比泉石之孤生片琰為下下品于中彦回輕怯陳倩有力孝先風流君理效達智果張云𨽻行章草能品蕭綸李云下下品斛斯彦眀李云筆勢咸有由來下上品房彦謙張大隠李云房司𨽻張益州叅小令之體下上品殷令名李云下上品擅聲題署藺静友李云下上品正書甚為鮮潔殊有軌則錢毅李云下上品小篆飛白寛愽敏䴡太宗貴之劉逖王宴周顒虞綽李云劉黄門落花從風王中玉竒石當徑彦倫意則甚髙跡少俊鋭虞綽鋒頴迅徤並為下中品魏徴𤣥成庾云下上品徐浩季海唐評固多精熟無有異趣黄魯直云唐自褚虞後能備八法者獨徐㑹稽與太師耳然㑹稽多肉太師多骨又云徃時見怒猊抉石渴驥奔泉之論茫然不知何語乃於季海書中見之房𤣥齡李云雕文抱質又云海上雙鳬鄔肜唐評寒鴉棲林平岡走兎陸柬之其古如馬之齊髦人不櫛沭張云𨽻行妙品章草能品學虞草體用筆則青出於藍唐評仿彿可觀依稀堪擬盧蔵用張云行𨽻草能品唐評露潤花妍烟凝脩竹裴行儉張云行草俱能品王承烈張云𨽻章行能品髙正臣張云𨽻行草能品傅元張云𨽻能品楊肇張云𨽻草能品釋崇簡唐評臨寫逸少時有亂真蔡隠丘以下皆唐評古質放意自成一家韓擇木龜開萍葉鳥散芳洲梁升卿驚波徃來巨石前却張廷珪古木奔沙閑花映竹史惟則雁足映沙深囦魚躍右四人皆善八分孫過庭𨽻行草能品丹崖絶壑筆勢堅勁張懐瓘繼軌章草生意頗多史麟逸氣雄鎮超然不羣梁耿錯落漁网縱横鳥跡張芳孤松聳身弱草垂露房廣婉美芬藹春鶯欲嬌沈益春鷺窺魚秋蛇走穴張彪孤峯削出藏筋露節陸曾驚波魚躍深水龍濯桓夫人如快馬入陣屈伸随人傅玉項羽投戈荆軻執㦸王紹宗筆下流利快徤雄古熟看轉增美妙程廣鴻鶴弄翅翺翔頡頏張越蓮花出水眀月開天雲散金峯霞依玉嶺蕭誠舞鶴交影騰猿在空韋陟蟲穿古木鳥踏花枝宋儋暮春花發夏柳枝低沈千運飢鷹殺心忍痩筋骨闗􅍾淵月沉珠露花濯錦鄭䖍家貧於青龍寺拾柿葉學書評云風送雲收霞催月上李璆垂藤着地古木如折吴郁字體綿宻不謝當時頼文雅騰沙欎霧翻浪揚鷗賀知章縱筆如飛酌而不竭何昌裔子敬餘波時時可玩宋之問天性卓絶而功未深李清變化自逸代有斯人元悟骨氣無䨥逈出時軰湛然子雲之後難與比肩書法纂要云慶歴以後惟君謨特守法度眉山豫章一掃故常米薛二蔡大出所竒雖皆有所祖襲而古風蕩然南渡而後思陵大萃美藴筋力過婉吳傅朋規倣孫過庭姿媚傷妍姜堯章逈脫脂粉一洗塵俗有如山人隠者難登廊廟右所集評皆據古人之論始於蒼頡終於唐人尚多遺跡博雅君子其葺正焉辨古石鼔十史籀書今在京文廟薛尚功法帖所載字完於真本鄭樵音不可信延陵君子碑在鎮江人謂孔子書文曰嗚呼至矣延陵君子之墓按古帖止云嗚呼君子而已篆法敦古今此碑妄增延陵之墓四字除之字外三字是漢方篆不與前六字合借夫子以欺後人耳又書君作季漢器蜀郡字半邉正與此君字同法比干墓有漢篆亦此法詛楚文有巫咸大沈久音故湫亞音洿駞三種辝則一乃後人偽作先秦文以先秦古器比較全不似泰山碑李斯書石皆剥落惟二世詔一面僅存嶧山碑李斯書直長者真横列者摹本有新刻尤謬秦望山碑李斯書在㑹稽今無張平子碑崔瑗書篆多用𨽻法不合說文却可入印全是漢篆法故也許慎說文十五卷徐鉉校定本始一終亥者正分韻者非古意倉頡十五篇即說文目録五百四十字許氏分為毎部之首人多不知謂久已滅此字之原豈得不在後世又併字目為十四卷以十五卷著序表人益不意其存矣新泉銘李陽氷書最佳碧落碑存絳州字雖多不合法然有置美成自有神氣當以唐碑觀之此碑不可賤毁古三墳書乃偽書言詞俗謬字法非古尚書無也字此書有之必字合從八弋此從心加一筆走之合從辵音㲋此随俗作之字引脚其謬甚多古文尚書乃後人不知篆者以夏竦韻集成不合古古文孝經内一篇大謬後人妄欲作古以古文字集成觀者當取其字泉志間有泉文近於道者可以廣見聞有妄作三皇幣及禹幣不可卍字人謂萬字乃出古錢不見此書終不知也六書故戴行以鐘鼎文編此書喜其字皆有古字襍亂無法鐘鼎偏傍不能全有却以小篆足之或一字兩法音睘加門為寰乃音為官村字不從寸木今乃書此為村鎊鏟鋫鋸尿屎等字皆依俗作鐘鼎文各有詳註卯字所解尤不雅編首以門類採但有數說文悖却係陽氷變法是字上從是巴字從已加㸃之類續千文正雖近人然字法極好有兩續本不可無别有偽本亦佳漢𨽻字源六卷字法最好洪氏本有碑目在前碑本𨽻韻十卷劉球編外一卷紀源𨽻韻二冊閩中刻本字體不佳𨽻釋二十七卷并𨽻續十卷通作一部皆漢碑釋文𨽻續畫諸碑形及墓碑畫像其碑多圭角或笏首上有垂虹或題䖏偏壁畫則如象形然佐書韻編姑蘇顔氏本字多而無法嘯堂集古録一百紙王俅集也中有古印文數十其一曰夏禹係漢巫􅐦水災法印世傳渡水佩禹字此印乃漢篆所以知之又一印曰孔夫誤音作孫兹二字又有滕公墓銘欎欎作兩字書且妄為剥落狀然考之古法叠字只作二小畫附其下秦為次第古法掃地矣薛尚功欵識法帖二十卷碑在江州蜀有翻本字肥後多一虺鼎薛尚功重廣鐘鼎韻七卷江州板内一卷象形竒字一卷器物名目五卷韻王楚鐘鼎韻兩冊衡州本字少所出在薛氏前石經遺字碑㑹稽蓬萊閣翻本磨滅不異真古碑徐鍇通釋四十卷當與許氏本相参首尾分六書甚詳末卷辨陽氷差減張有復古編載古今異文字不可以為闕字少張有五聲韻五卷無誤夏竦古文四聲韻五卷前有序并全銜者佳别有僧翻本字多無據且不與欵識合不可用髙氏五聲韻縂五卷篆𨽻真行草五體俱備可助初學間有差處林罕偏傍小說三卷言篆與𨽻相通源流亦自可時大夫猶以夫字加二小畫况此叠文乎偽無疑矣右古文篆𨽻力命尅捷宣示帖鍾繇樂毅畫讃黄庭霜寒王羲之洛神賦王獻之曺娥遺教羊叔子碑六朝瘞鶴舊館壇陶𢎞景千字文智永書梁武帝得羲之千字令周興嗣次之自爾書家毎以是為程課智永嘗寫八百本謂以千字經心則手自應手和心得可與入道孔子廟虞世南醴泉化度虞恭公皇甫碑歐陽詢哀册聖教禇遂良郎官張旭麻姑壇放生池中興頌顔真卿陁羅尼柳公權右真書丙舍吳人羸頓雪寒長風鍾繇蘭亭極寒毒熱慈䕃官奴晚雪來禽奉橘快雪王羲之地黄歳終衛軍授衣阿姨鵞羣嵗盡夏日奉對思戀天寶吳興山隂黄門東家轉勝相過鵞還觸事夏節恨深黄者礐石駱驛月内尊體王獻之八月五日謝安枯樹賦星霜禇遂良嶽麓娑羅樹雲麾東林寺李邕𤣥静先生碑張從申右行書十七帖羲之千文張旭自叙千文懷素右草書以上並舉其要必所當䆒者若欲名家尤以博覽為貴絳帖評姜堯章作審訂深妙褉帖偏傍考堯章作法帖譜系翰墨志法帖刋誤元章書史法書考卷一
