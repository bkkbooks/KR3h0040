body:
  text: 法書考卷一元盛熈眀撰書譜夫學書之要在於師古然去古既遠名迹紛如不可不詳擇也嘗考歴代之善書者多矣其聲譽著於時書翰傳於後者皆可歴數至於謬當虗名者庸亦有之其餘泯没無聞者固已何限况乎好利售竒傳搨亂真自非精鍳鮮能去取也故首著書譜纂集諸家之評論研䆒書刻之精粗以備采摭云集評國家以神武定天下世祖皇帝大興文治至於仁廟典章俱備自是列聖萬幾之暇多能俯事於藝文欽惟皇上生知之聖日新之功非臣管見所能測焉我朝能書之士常不乏人然世俗率多貴耳賤目罕能定其優劣千載之下必自有能辨之者今集倉頡以降自秦迄唐凡若干人㑹萃諸家之評論畧成上中下三品焉張懷瓘云先其天性後其習學且以風神骨氣居上妍美功用者居下上品倉頡張懷瓘云古文神品史籀張懷瓘云古文妙品李斯字通古上蔡人張云小篆神品大篆妙品李嗣真云逸品小篆之精古今妙絶秦望山及皇帝璽猶千鈞强弩萬石洪鐘豈徒學者宗匠亦是傳國遺寳唐人評云骨氣豐勻方圓妙絶趙髙張云大篆妙品程邈李云𨽻上上品首創模範煥於丹青王次仲始作楷法詳見字源陳遵孟公漢人善𨽻書與人尺牘皆藏之以為榮史㳺漢黄門令史創章草杜操漢相或云始變藁法劉穆後漢北海敬王善草書書體甚濃結字工巧張芝學焉杜度伯度韋誕云傑有骨力而字畫㣲痩庾肩吾云上中品張云章草神品章帝使草書上事劉德昇君嗣始造行書庾云中上品王僧䖍云鍾胡所師張云行書妙品崔瑗子玉庾云擅名北中跡罕南渡世有得其摹本者王子敬見之稱美以為絶類伯英上中品張云章草第一神品小篆妙品李云上上品篆效李斯㸃畫皆如鐡石王云筆勢甚快而結字小踈袁昻云如危峯阻日孤松一枝有絶望之意崔實瑗之子曹喜扶風人衛恒曰篆法少異於李斯而亦稱善袁云如經論道人言不可絶張云小篆𨽻俱妙品嘗見李斯筆法悲嘆不已作筆論一卷邯鄲淳衛恒曰得次仲法善𨽻書小字師曹喜篆韋誕師淳不及也袁曰應規入矩方員乃成張云大小篆字𨽻俱妙品師宜官衛云善𨽻書靈帝時為最大則一字徑丈小則方寸千言或時不持錢徃酒家飲因書其壁願觀者以讐酒錢足而滅之毎書輙削而焚其拊梁鵠乃益為版而飲之酒候其醉而竊其拊庾云鴻都為最能大能小上中品王云致酒簡多梁武云如鵬翔未息翩翩而自逝張云八分妙品衛宏張云古文妙品蔡邕伯喈篆采斯喜之法為古今備形然精宻簡理不如淳也張云八分飛白俱神品大小篆𨽻妙品李云上中品惟范巨卿碑風神艷麗古今冠絶梁武帝云洞達爽爽如有神力張芝伯英少好學筆札臨池學書池水盡黑自謂上比崔杜不足下方羅趙有餘見蔡邕筆勢論遂作筆心論五篇衛云宏農張伯英下筆必為楷則號匆匆不暇草書寸紙不見遺至今寶其書張云草第一章草第二行第三俱神品𨽻妙品庾云衣帛先書稱為草聖工夫第一上上品李云逸品章草似春虹飲磵洛浦浮霞渥霧沾濡繁霜摇落梁武帝云如漢武愛道憑虛欲仙張昶文舒芝之弟庾云上中品張云八分章草妙品𨽻能品李云上中品西嶽碑文但覺妍冶殊無骨氣胡昭孔眀庾云動見模楷上下品張云𨽻行妙品篆能品韋誕仲將京兆人庾云不妄染毫湏張筆紙上下品張云草第六八分𨽻章草飛白妙品小篆能品梁武云如龍威虎振劍㧞弩張王云善楷時謂之筆聖魏凌雲殿榜未題而匠者誤釘之不可下乃使仲將懸櫈書之比訖鬢盡白戒子孫宜絶此藝鍾繇元常許昌人師胡昭十六年不窺户見昭筆心論驚歎無已作筆骨論又云盜發韋誕冡得蔡邕筆法晝夜不輟卧則以手劃被被為之破庾云天然第一妙盡許昌之碑窮極鄴下之牘為上上品張云真第一行第三俱神品八分草妙品王云謂之盡妙鍾有三體一曰銘石書最妙者也二曰章程書教小學者也三曰行押書行書是也三法皆世人所善李云正體猶郊廟既陳爼豆斯在又比寒磵峭削秋山嵳峩梁武云雲鶴㳺天羣鴻戲海行間宻茂實亦難過鍾㑹士季庾云上下品張云真第五章草第六草第七并行四體俱妙品李云上中品小鍾有正書洛神賦梁武云有十三行意皇象休眀庾云胡肥鍾痩休眀斟酌二家驅駕八絶上下品張云章草第八神品小篆能品袁云如歌聲繞梁琴人捨徽梁鵠伯鸞以書至選部尚書魏武懸鵠書着帳中玩之以為勝庾云上下品張云八分妙品李云上中品衛云𨽻書用筆盡其勢矣袁云如太祖忘寢觀之喪目衛瓘伯玉幼為魏尚書郎與索靖俱善書時謂一臺二妙庾云上下品張云行第五并小篆𨽻草俱妙品古文大篆能品章第四神品王云衛覬子也為晋司空採張芝草法取父書叅之更為草藁子巨山亦善書故云伯玉得筋巨山得骨索靖㓜安庾云上上品衛瓘有楷書然遠不及靖又云靖得伯英肉嘗作草書狀張云章草第三神品八分草妙品李云上中品趣向遒竦無愧珪璋梁武云如王謝家子弟縱􅂧不端整奕奕皆有一種風流氣骨王云張芝姊之孫也傳芝草而形異其字勢曰銀鉤蠆尾張華張云章草妙品􅄞康叔夜張云草第二妙品叔夜身長七尺六寸美聲音偉容色雖土木形體而龍章鳯姿天質自然加以孝友温恭嘗草書絶交書一紙唐評如抱琴半醉詠物緩行又若孤鶴歸林羣鳥乍散謝安安石庾云上品張云行第九𨽻草妙品李云上中品縱任自然螭盤虎踞王云亦能入流殊亦自重嘗為子敬書嵇中散詩得子敬書有時裂作紙校衛夫人茂漪庾云中上品張云𨽻妙品李云上下品唐評如挿花美女低昻有容又如美女登臺仙娥戱影紅蓮映水碧落浮霞王廙世將庾云中中品張云真第三草第五俱能品飛白妙品李云上下品王云王南平是右軍叔自過江來右軍之前惟廙為最畫為晋眀帝師書為右軍法王羲之逸少曠之子瑯琊臨沂人幼學書及年十三見前代筆訣於父枕中竊而說之學功日進衛夫人一見語太常王䇿曰此子必見用筆訣也必蔽我書名晋成帝祀北郊更祝版工人削之羲之墨入木七分初學衛夫人書過江見古碑歎學衛夫人徒費嵗月張云筆迹遒潤獨擅一家之美天質自然風神蓋代且其道㣲而味薄固常人莫之能學其理隠而意深固天下寡於知音真第一行第二章第五草第八及飛白俱神品八分妙品庾云工夫不及張天然過之天然不及鍾工夫過之允為上上品李云逸品如隂陽四時寒暑調暢巖廊宏敞簪裾肅穆其聲鳴也則鏗鏘金石其芬郁也則氤氲蘭麝其難徴也則縹緲而已仙其可觀也則昭章而在目可謂真書之聖也若草行襍體如清風出袖眀月入懷瑜瑾爛而五色黼黻摛其五采故使離朱喪眀子期失聼可謂草書之聖也其飛白猶霧縠卷舒烟雲照灼長劍耿介而倚天勁矢超忽而無地可謂飛白之仙也又如松巖㸃黛蓊欎而起朝雲飛泉潄玉洒落而成暮雨既離方以遁圓亦非絲而異帛唐評如壯士㧞劍壅水絶流頭上安㸃如髙峯之墜石作一横畫如千里之陣雲捺一偃波如風雷振駭作一竪畫如萬嵗枯藤立一倚竿若虎卧鳯閣自上掲竿如龍躍天門梁武云字勢雄逸如龍跳天門虎卧鳯閣故歴代寳之永以為訓王云古人之跡計無以過王獻之子敬逸少第七子子敬最知名七八歳學書逸少宻從後掣其筆不得歎曰此子當大有名嘗書壁為方丈大字逸少甚以為能初學父書頃習于張以後改變制度别創其法率爾師心㝠合天矩雄武神蹤靈姿秀出若臧武仲之智卞莊子之勇大鵬摶風長鯨噴沫懸崖墜石驚電送光張云子敬行草之外更開一門非草非真離方遁圓兼真者謂之真行帶草者謂之行草子敬之法非草非行流便於行草之間逸少秉真行之要子敬執行草之權父之靈和子之神俊古今獨絶也真第四行第二草第三并飛白俱神品八分能品庾云上中品梁武云絶衆超羣無人可擬如河朔少年皆充悦舉體㳫拖而不可耐李云子敬草書逸氣過父如丹穴鳯舞清泉龍躍倐忽變化莫知所成或蹴海移山或翻濤簸嶽而正書行書如田野學士越恭朝列非不稽古憲章乃時有失體處瓘說稱其轉妍品鍳踈矣王珉季琰洽之少子也名出珣右時云法護非不佳僧彌難為兄法䕶珣小字也有四疋素自朝操筆至暮書竟首尾如一又無誤字子敬戲之弟書如騎騾駸駸恒欲度驊騮前當代獻之兼中書令故以獻之為大令珉為小令庾云中上品張云行第六并𨽻妙品王云筆力過於子敬荀輿長允庾云上下品張云𨽻草俱妙品王云長允狸骨右軍以為絶倫阮研文機庾云窮古觀今盡窺衆妙之門雖師王祖鍾終成别搆一體上下品張云𨽻行草妙品李云中中品梁武云如貴胄失品不復排斥英賢中品嚴延年張云大篆能品工籀書許慎張云小篆能品班固張云大小篆能品羅暉叔景庾云中下品張云章草能品趙襲元嗣庾云中下品張云章草能品魏武帝曹操孟徳庾云筆墨雄贍中中品張云章草妙品唐云如金花鈿落徧地玲瓏荆玉分輝瑶巖璀璨吳孫皓元宗庾云體裁綿宻中中品李云中下品如齊人酣暢驕其家室雖欲矜豪亦復平矣劉釗張云小篆飛白能品毛宏張云八分能品衛恒云宏乃梁鵠弟子教以秘書今八分皆宏法也衛覬伯儒庾云中中品張云古文𨽻章草能品王云體如傷痩而筆匠精緻衛恒巨山瓘之子庾云中中品張云古文章草妙品𨽻能品李云中上品司馬攸晋武帝弟也王云京師以為楷式張云行草能品陸機士衡庾云中下品李云中下品蚌質珠胎金沙銀礫王曰吳士也無以較其多少劉輿慶孫庾云中下品庾亮元規庾云中下品王云亦能入録庾翼稚恭庾云中上品張云𨽻章草能品李云上下品王云征西翼書少時與右軍齊名右軍後進庾猶不憤其在已上在荆州與都下書曰小兒軰乃賤家雞重野鶩學逸少書湏我下當比之王敦處仲張曰草第四王導茂宏庾云中下品張云真第七行第八并草能品王云甚有楷法以師鍾衛好惡無厭喪亂狼狽猶以鍾繇尚書宣示帖衣帶過江陵右軍得之子恬洽薈亦能書郗氏羲之妻甚工書有七子五子知名長𤣥之次凝之徽之操之獻之皆羲之子並工草𨽻謝道韞凝之妻也有才華善書李云中下品雍容和雅芬馥可玩郄愔方回庾云中上品張云章草妙品草𨽻能品李云上下品梁武云意趣甚熟而取妙特難故闕散風氣一無雅素王云章草亞於右軍郄超景興又字嘉賔庾云中下品王云草亞二王𦂳媚過其父骨力不及也李云中下品桓𤣥敬道庾云中上品李云中中品如驚蛇入草鋸鋒出匣王云𤣥自比右軍識者未之許云可比孔琳之杜預元凱庾云中中品張云章草能品李云中下品張翼君祖善𨽻草書史㑹要云穆帝令翼寫王羲之手表帝自批其後羲之殆不能辨真贋乆乃悟云小子幾欲亂真羊欣敬元庾云早隨子敬妙得其體中上品張云𨽻行草妙品李云上下品梁云如婢作夫人雖處其位而舉止羞澁終不似真王云受訣於子敬書見重於一時行草尤善正乃不稱薄紹之敬和庾云下上品張云𨽻行草俱妙品梁武云如龍逰在霄繾綣可重孔琳之彦琳庾云中上品張云𨽻行草妙品唐評放縱快徤筆勢流利二王以後難與比肩但功虧少故當劣於羊欣王云天然縱逸極有筆力規矩但工夫少自在張超子並庾云子並崔家州里頗相倣效可謂氷寒於水中上品張云章草能品梁武云如髙麗人抗浪乃不有意氣而姿媚自足精神李云中下品如郢中少年乍入京輦縱有才辨蓋亦可知殷鈞庾云頗沈著受好終得肩隨中上品謝靈運庾云下上品張云𨽻草妙品李云中下品王云昔子敬上表多於中書雜事中皆自書竊易真本相與不疑永