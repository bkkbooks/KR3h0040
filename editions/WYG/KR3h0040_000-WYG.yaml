  text: 欽定四庫全書子部八
  hash: sha256:ed7b890dbd4c5a48db16c46d7fbf2f236332a20a938d6348e5c3606dd689b6ba
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_000-1a, image: WYG0814/WYG0814-0477a.png}
body:
  text: 法書考藝術類一書畫之屬提要臣等謹案法書考八卷元盛熙明撰案陶九成書史會要曰盛熙明其先鮮卑人後居豫章清修謹飭篤學多材工翰墨亦能通六國書則色目人也是書前有虞集揭傒斯歐陽原功三序集序稱其備宿衞傒斯序稱為夏官屬其始末則不可考矣傒斯序又稱熙明作是書屬稿未竟已有言之文皇帝者有旨趣上進以備皇朝經世大典事嚴未及録上四年四月五日今上在延春閣遂以書進上方留神書法覽之終卷親問八法旨要命藏之禁中以備觀覽書史會要亦稱至正甲申嘗以法書考八卷進上與序相合則是書實當時奏御本也其書首為書譜分子目四次為筆法次為圖訣次為形勢各分子目二次為風神次為工用各分子目三次為附錄印章押署跋尾雖雜取諸家之説而採擇特精頗足以資考證也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀法書考序小學廢書學㡬絶聲音之道尤泯如也周秦而下體製迭盛西晉以來華梵兼隆唐人以書取士宋人臨搨價踰千金刻之秘閣法書興矣然而循流道源士有憾焉此龜兹盛熙明法書考之所由作歟熙明刻意工書而能研究宗源作為是書至於運筆之妙評書之精則甘苦疾徐之度非老於斵輪者疇克如是耶書成近臣薦逹以徹上覽清問再三又能悉所學以對因獲嘆賞給事中兼起居注亦思刺瓦性吉時中出資鋟梓以廣其傳庶俾世之學者有所模楷其用心可謂公且仁矣熙明以書入官今為夏官屬葢亦不忘其本者云翰林學士資善大夫知制誥同修國史廬陵歐陽𤣥序法書考序法書肇伏羲氏愈變而愈降遂與世道相隆汚能考之古猶難况復之乎至順二年盛君熙明作法書考藁未竟已有言之文皇帝者有㫖趣上進以備皇朝經世大典事嚴未及録上四年四月五日今上在延春閣遂因奎章承制學士沙㓨班以書進上方留神書法覽之徹卷親問八法㫖要命藏之禁中以備親覽當是時上新入自嶺南聖心所向已傳播中外及即位開經筵下崇儒之詔天下顒顒然翹首跂足思見聖人之治法書之復其在兹乎然天下之期復於古者不止法書也而於是乎觀也則盛氏之書其復古之兆乎惟盛氏之先曲鮮人今家豫章而熙明清修謹飭篤學多才有文章工書能通諸國書而未嘗自賢或為一時名公卿所知是書之作虞奎章既為之序余特著其進書始末如此元統二年十月望文林郎藝文監丞叅檢書籍事揭徯斯序法書考原序伏羲始畫八卦而文字興焉六書之象形此其端也中古簡牘之事則史氏掌之後世有天下者葢有以書名世者矣曲鮮盛熙明得備宿衛有以知皇上之天縱多能留心書學手輯書史之舊聞叅以國朝之成法作法書考八卷上之燕門之暇多有取焉昔唐桞公權嘗進言於其君曰心正則筆正天下後世謂之筆諌朂哉熙明無俾公權專美前世史臣虞集序
