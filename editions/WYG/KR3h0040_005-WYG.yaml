front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_WYG_005-1a, image: WYG0814/WYG0814-0520a.png}
body:
  text: 法書考卷五元盛熈眀撰形勢㸃畫既工而後能結體然布置有踈宻骨格有肥瘠不可不察也布置八靣俱滿者方偏而隅者方竒飛八靣㸃畫皆拱中心隨字㸃畫多少踈宻各有停分作九九八十一分界畫均平之訣云布置者長短濶狹字之態度也㸃畫斜曲字之照應也無布置如竹竿之無節野人之無文其法先主後賔卑奉尊接字之上下左右畫之大小多少取其停勻審其踈宻以下承上以右應左以大包小以少附多多以少為體少以多為用空則補就孤則扶持剛縱其柔柔縱其剛自然可觀蔡邕云勢來不可止止無使勢背右軍云夫欲書先凝神静慮預想字形大小偃仰平直振動令筋骨相連意在筆前然後作字又云夫書字四方南髙北下東闢西閤為形上平下端左輕右重為勢凡字處其中畫之法止自然平穏腹不宜促止腹不宜大傷宻則似疴瘵纒身不舒展也傷踈則似弱水之􅕛也陶隐居云近左虚右分間不同視之不足學之彌工隋智果心成頌云回展右肩止妙在相承起伏梁武帝觀鍾繇書十二意顔真卿張旭問答夫平謂摸子知之乎真卿云長史毎令為一畫皆湏縱横有象其此之謂乎長史曰然夫直與縱子知之乎曰豈不謂直者必縱之不令邪曲之謂乎曰然夫均謂間子知之乎曰嘗象示以間不容光之謂乎曰然夫宻謂之際子知之乎曰豈不謂築鋒下筆皆令宛成不令其踈之謂乎曰然鋒謂末子知之乎曰豈不謂末以成畫使其鋒健之謂乎曰然力謂骨體子知之乎曰豈不謂趯筆則㸃畫皆有筋骨字體自然雄媚之謂乎曰然輕謂屈折子知之乎曰豈不謂鈎筆轉角折鋒輕過亦謂轉角為暗過之謂乎曰然决謂牽掣子知之乎曰豈不謂牽掣為撆决意擇鋒不怯滯令險峻而成乎曰然補謂不足子知之乎曰豈不謂結搆㸃畫或有失趣者則别㸃畫旁救之乎曰然損謂有餘子知之乎曰豈不謂趣長筆短常使意氣有餘畫若不足之謂乎曰然巧謂布置子知之乎曰豈不謂欲書先想字形大小布置令其平稳或意外字體令其異勢乎曰然稱謂大小子知之乎曰豈不謂大字促之令小小字寛之令大兼令茂宻所以為稱乎曰然運筆覩勢故云上下相望左右相近四隅相招大小相副長短濶狭臨時變通用意經思何虞不勝歐陽詢云毎秉筆必在圓正氣力縱横重輕凝神静慮當審字勢四面勻停八邊俱備長短合度粗細折中心眼凖程疎宻欹正筋骨精神隨其大小不可頭輕尾重無令左短右長斜正如人上稱下載張懷瓘十法偃仰向背云云隨事轉變云云姜堯章云疎欲風神宻欲老蒼如佳之四横川之三直兼之四㸃畫之九畫必須下筆勁净疎宻得勻乃佳當疎不疎反成寒乞當宻不宻必至凋疎且字之長短大小斜正疎宻天然不齊孰能一之晉魏書法之髙良由盡字之真態不以私意叅耳向背者如人之顧盼㸃畫相揖相背發於左者應於右起於上者伏於下大約㸃畫之間施設各有性情求之古人右軍蓋為獨歩蔡希踪云毎字皆須骨力雄强止舉止合則起伏相承肥瘠韋誕云多力豐筋者勝無力無筋者病衛夫人曰善筆力者多骨不善筆力者多肉多骨㣲肉者謂之筋書多肉㣲骨者謂之墨猪梁武帝云純骨無媚純肉無力少墨浮澁多墨芒鈍此皆自然之理也若抑揚得所趣舍自違值筆亷㫁觸勢峰欎揚波折節中規合矩分間下注濃纎着力骨肉相稱婉婉娩娩視之不足稜稜凛凛常有生氣適眼合心便為甲科訣曰書以骨氣為體以主其内以肉色為用以彰其外氣宜清色宜温骨宜豊肉宜潤不失其所虞世南云側管則鈍慢而多肉直鋒則乾枯而露骨終其悟也粗而不鈍細而能壯長而不為有餘短而不為不足歐陽詢云字不可痩痩則形枯復不可肥肥則質濁張懷瓘云夫馬筋多肉少為上止恣其運動徐浩云宜先筋骨筋骨不立肉何所附用筆特湏藏鋒不然字則有病夫鷹隼乏彩而翰飛戾天骨勁而氣猛也翬翟備色而翺翔於百步肉豊而力泬也若華藻而髙翔書之鳯皇矣歐虞為鷹隼陸禇為翬翟黄魯直云作字湏筆中有畫肥不露肉痩不露骨政如詩中有句亦猶禪家句中有眼湏叅透乃悟耳姜堯章云用筆不欲太肥肥則形濁又不欲太痩痩則形枯露鋒則意不持重深藏圭角則體不精細然其太肥不若痩硬也法書考卷五
