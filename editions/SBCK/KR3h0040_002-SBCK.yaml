  text: 法書攷􅃃之二
  hash: sha256:43d39aac49871f026924b5e14aec97e58f8e52ec3d20baf67bc0f0359b401979
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_002-1a}
body:
  text: 元盛熈明著字源圖書既出書道尚矣固知文字之始非特倉頡也後世作者皆乗時而増損之然宇内萬國文字皆異其源未能詳詰也嘗覧竺典云造書之主凡三人曰􅆊曰伽盧曰倉頡􅆊者光音天人也以􅆊天之書傳扵印土其書右行伽盧創書於西域其書左行皆以音韻相生而成字諸蕃之書皆其變也其季倉頡居中夏象諸物形而為文形聲相益以成字其書下行未知其説果何所據也因而攷之盖西方以音為母華夏以文為基諸國之風土語音既殊而文字遂亦各異沂流窮源其法似不出乎此三者也嗚呼制書以載言因言以逹意意茍相符則言可忘言假以傳而書非定法古之至人由其習俗之殊隨冝而制作雖東西各源而傳理實一古今變而華質靡常夫豈人力所能及哉今以華􅆊創書之㫖列之於篇􅆊音􅆊者不囉麻也合而言之為􅆊此云光音天也其字之母凡五十曰悉曇章此云能成諸義也其中十六拶去不切攃七蜀惹仁左切切嵳昨何倪倪也切切齒音哳陟轄詫丑轄痆尼轄荼切切切拏舌音怛撻他逹捺切達那喉音鉢發末婆麻唇音􅁘囉歴加切羅嚩設沙薩詞刹以上融舌喉二音斯乃音韻之祖因之配合而生生無窮焉其土有五天竺文字稍異獨以中天竺為正削竹為筆以貝多􅀣葉為􅁓其書廣有六十四種名載釋書並不復詳按漢明帝時摩騰竺法蘭自西域來以白馬􅀒至四十二章􅆊夾始通於中國自唐以來漸布中外如古本􅆊法字􅀔方古嚴重凡詔誥表章鴻文大􅉺並以書焉謹按諸蕃文字雖變􅁶各殊然其音韻莫不祖述􅆊音故今曰􅆊音而不曰􅆊書者以其音律交合而成字載音以􅋚意非若華文有六義也鄭樵嘗言􅆊字有象形乃其臆説耳字母者猶倉頡之古文也其音韻㑹合而成字猶古文孳孕而成􅂐也其轉變而為諸蕃之書者亦猶行草分隸之變也華文庖犧氏之王天下也仰則觀象於天俯則觀法於地視鳥獸之方輿地之冝近取諸身逺取諸物於是始作八卦以垂憲象及神農氏結䋲為治以統事務緐飾既萌易以書契百工以義萬民以察盖取諸夬自倉頡創始以迄五帝三王之世改易殊體封扵太山者七十有二代靡有同焉其書總有六義一曰指事視而可識察而可見上下是也在上為上在下為下二曰象形畫成其物隨體詰詘日月是也日滿月􅉻效其形也三曰諧聲以事為名取譬相成江河是也以􅀋為形配以聲也四曰會意比􅀋合義以見指揮武信是也止戈為武人言為信也五曰轉注建􅀋一首同意相受考老是也以老受考也六曰假借本無其事依聲託字令長是也數言同字其聲雖異文義一也至周宣王時太史籀著大􅂐十篇互與古文或異至孔子書六經左丘明述春秋傳皆以古文其後諸侯力政不統於王分為六國制度各異秦始皇初并天下丞相李斯乃奏同之罷其不與秦文合者斯作倉頡篇中車府令趙高作爰歴篇太史令胡母敬作博學篇頗省改古法為小􅂐焉至於焚書坑儒典謨滌盡工獄事緐變􅀠􅃐約而古文由此絶矣是時有八體一曰大􅂐二曰小􅂐三曰刻符四曰􅆉書即鳥書以書幡信五曰摹印六曰署書七曰芟書隨殳體八觚而書之也八曰隸書衛恒曰王莾時甄豊定古文復有六種一曰古文孔子壁中書也二曰竒字即古文而異者也三曰􅂐書秦􅂐是也四曰佐書即隸書也五曰繆書所以摹印也六曰鳥書􅀁以書幡信也張懷瓘十體書㫁各附諸家之論古文者黃帝史倉頡􅀁造頡四目通神明仰觀奎星圓曲之􅀔俯察􅀛文鳥跡之象博采衆羙合而為字是曰古文夫文字總而為言包意以名事也分而為義則文者祖父字者子孫得之自然備其文理象形之屬則謂之文因而滋蔓母子相生形聲會意之属則謂之字字者言孳乳浸多也題之竹帛謂之書書者如也舒也著也記也著明萬事記徃知來名言諸無宰制羣有也三代以來咸用之秦用小􅂐焚燒先典古文絶矣漢文時秦博士伏勝獻古文尚書時又有魏文侯樂工竇公年二百八十歲獻古文樂書一篇武帝時魯共王壊孔子宅壁中得孝經尚書等書宣帝時河南女子壊老子宅而得古文二篇晉咸寜五年汲郡人盗􅀤魏安􅁵王􅊘得册書千餘萬言其書隨世巳變數體周幽王時又有省古文者今汲􅊘書中多有是也􅅬公􅊘得石銘人無識者惟􅅩孫通云此科斗書也科斗者即上古之别名也吾衍學古編云科斗為字之祖象蝦蟇子形或巧畫形状失本意矣上古無筆墨以竹挺􅀧􅃮書竹木上竹剛􅃮膩畫不能行故首重尾輕似其形耳大􅂐周史籀所作也或云柱下之始變古文或同或異謂之􅂐篆者傳也傳其物理施之無窮漢藝文志史籀十五篇竝此也以史官製之用以教授謂之史書凡九千字秦趙高以教胡亥又漢元帝遵嚴延年並工史書是也秦焚書與易惟史篇得全吕氏春秋曰倉頡造大􅂐非也學古篇云欵識文者諸侯夲國之文也古者諸侯書體各異秦始一其法世或以欵識雜􅂐書一篇之主齊楚不分人莫知其謬學􅂐博覧古器真欵識中古字神氣散朴可以助人亦知象形指事會意等未變之妙也凡作􅂐之氣象良以未嘗博古故也若夫模文終不及古籀文者史籀所作也與古文大􅂐小異後人以名稱書謂之籀文七略曰即周時史官教學童書也與孔壁古文異體即竒字也其跡則石鼓文存焉學古編云李斯既作小􅂐遂以籀文為大􅂐􅂐法匾者最佳謂之果匾徐鉉謂非老手莫能到石鼓是也小􅂐者秦丞相李斯􅀁作也増損大􅂐籀文謂之小􅂐亦曰秦􅂐始皇二十年始并六國斯時為廷尉乃奏罷不合秦文者扵是天下行之畫如鐡石字若飛動作楷􅀠之祖為不易之法其銘題鍾􅂦及作符節至今用焉斯雖草創遂造其極矣學古編云漢􅂐多變古法此許氏作説文以救其失也必先通此則冩無謬又當考通釋然字有古今不同説文頗廣當先熟復古編大㮣得矣初學􅂐時當虗手心伸中指并二指扵几上虗畫如此流便方可操筆􅍾筆必湏單鈎却伸中指在下夾襯方圓平直無不可意矣世多不得師傳故字多欹斜􅀔不活動若􅂐大字當虗腕懸筆腕著􅁓即不活以􅁓筒為筆者非士大夫所為也小􅂐一也而各有筆法李斯方圓廓落陽氷圓活姿媚徐􅉗如隷無垂脚字下如􅁫股稍大鍇如其兄但字下為玉筯微下耳崔子玉多用􅀠法似乎不精然意有漢意陽氷多非古法盖效子玉也小􅂐世喜長然不可過但以方楷一字半為度一字為正體半字為垂脚豈不羙茂或有不可者當以正脚為主餘略􅀵短如幡脚可也字有下無垂脚者如㞢等字却以上枝為出如草木之為物正生則上出枝倒懸則下出枝耳凡寫匾額畫冝肥體冝方圖碑盖同此但以小􅂐為正不用雜體凡中字不可填滿但如井斗中者一字垂其空可放垂筆方不覺大圈比諸字亦湏略􅀵不可圓亦不可方只以炭墼範子為度自好日月等字湏略放小也凡􅂐中包一二畫如日月之􅀋若初一字内畫不與两傍相連後皆如之首尾一法若或接或否各不同者非法也又用圓圈及圓􅀧小篆無此法古文有之口字不可作三角形凡鍾􅂦古文錯雜為用無跡為當但以小􅂐法冩之自然一法此雖易求却難雜記不熟其法未免如百衲衣為識者􅀏此為逸法正用廢此可也八分者秦羽人上谷王次仲所作也王愔云次仲以古書方廣少波􅀔建􅀄中以隷草作楷法字方八分言有模楷蕭子良云靈帝時王次仲飾隷為八分且靈帝之前工八分者非一而云方廣殊非􅀠書既言古書豈得稱􅀠若驗方廣則􅂐籀有之變古為方不知其謂也序仙記云王次仲上谷人少有異志年未弱冠變倉頡書為今八分始皇時官務煩多得次仲文蕳略赴急疾之用甚喜遣使三徴不至始皇大怒制檻車送之扵道化為大鳥翻然長引落二翮今為大翮小翮山山上立祠水旱祈焉蔡邕云次仲􅀄變古體即效程邈隷也小􅂐古形猶存其半八分巳减小􅂐之半隸又减八分之半本謂之楷書楷法也式也模也或云後漢亦有王次仲為上谷太守楷隷􅀄制大範幾同故後人惑之時人用冩篇章法令亦謂之章程書故梁鴻云鍾繇善章程書也且二不善扵八分唯伯喈造其極焉訣云本扵􅂐法學如真書但變隼尾擊石二波也吾衍云八分者漢􅀠之未有挑法者也比秦隷則易識比漢􅀠則微似􅂐若用􅂐筆作漢隷即得矣八分與􅀠多不分故言其法又云􅀠書人謂宜匾殊不知妙不在匾括曰方勁古拙斬釘截鐡備矣挑抜平硬如折刀頭方是漢隷􅀠法頗寛姑具其略􅀠書者秦下邽人程邈所造也始為獄吏得罪始王幽繫雲陽獄中覃思十年易大小􅂐方圓而為隷書三千字奏之始皇善之用為御史以奏事繁多􅂐書難成乃用隷字以為隷人佐書故曰隷書亦曰佐書案八分乃小􅂐之㨗隷亦八分之㨗漢陳遵善書後鍾元常王逸少各造其極焉宣和書譜云有人􅀤臨淄􅊘得齊太公六世孫胡公棺上有字同今隷按胡公先始皇四百餘年何為巳有隷法豈是書原與􅂐隷相生特未行扵時耶若邈者豈知此體而上之以觧雲陽之難耳字源云􅀠有秦漢之分秦隷者程邈以文牘緐多難扵用􅂐因减小􅂐為便用之法故不為體􅀔若漢欵識􅂐字相近非有挑法之隷也即是秦權量上刻字世多以為􅂐者誤也漢隷者蔡邕石經及漢諸碑上字是也此體為最後出皆有挑法與秦􅀠同名而實異也姜尭章云真書以平正為善此世俗之論唐人之失也古今真書之妙無出扵鍾元常其次則王羲之二家之書皆蕭洒縱横何拘平正良由唐人以書判取士而士大夫字頗有科舉習氣顔魯公作干禄書是其證也矧歐虞顔栁前後相望故唐人下筆應規入矩無復􅀳魏飄逸之氣矣竊謂真書又隸之變而以形􅀔布置采色為度懐瓘論十體而真書不與焉豈以隸為真書耶故以堯章真書之論附云章草者漢元帝時史㳺作急就章觧散隷體麤書之漢書蕳墯漸以行之是已損隷規矩縱任奔逸因草創義謂之草書惟君長告令臣下則可後海北漢劉穆始善書之至建初中杜度善草見稱於章帝上貴其迹詔使草書上事魏文帝亦令劉廣通上事盖因章奏後世謂之章草惟張伯英造其極焉章草即􅀠書之㨗草亦章草之㨗也訣云章草草具􅀠字八分謹嚴如真用其一趯二波也行書者後漢頴川劉徳昇所作也即真書之少偽務從簡易相間流行故謂之行書昔鍾元常善行狎書是也爾後羲獻並造其極焉獻之常白父云古之章草不能宏逸頓異真體合窮撝運之理極草縱之致不若扵槀行之間扵徃法固殊也大人冝改體觀其騰煙焬火則回禄䘮精覆海傾河則􅀇㝠失御天假其魄非學之功若逸氣縱横則羲謝扵獻若􅆪􅅂禮樂則獻不􅁇羲雖諸家之法悉殊而子敬朂為遒抜故得之者先本扵天然次資扵功用而善學者乃學之扵造化異􅀋而求之固不取乎似本而各挺之自然訣云行筆而不停著􅁓而不離輕轉而重按如水流雲行無少間㫁永存乎生意也姜堯章云晉魏行書自有一體與草不同大率變真以便揮運而巳草出扵章行出扵真雖曰行書各有體縱復晉代諸賢亦莫不相逺蘭亭記及右軍諸帖第一謝安大令諸帖次之大要以筆老為貴少有失誤亦可暉暎􅀁貴濃纎間出血脉相連筋骨老徤風神洒落姿態具備飛白者漢左中􅀰􅀅蔡邕􅀁作也王􅀮王愔竝云飛白變楷製以題署􅀔勁字輕微不滿名曰飛白王僧􅐚云飛白八分之輕者皆不言所起按靈帝熹平中蔡邕作聖皇篇成待詔鴻都門下見役人方脩飾以堊箒成字心有悦焉歸而為飛白之書漢末魏􅀄並以題署宫闕其體創法扵八分窮微扵小􅂐可謂勝􅀉㝠通緲綜神仙之事也爾後羲獻並造其極衛恒祖述飛白而造散隷􅄏張隷體微露其白拘束扵飛白蕭洒扵隷書處其季仲之間也梁武帝謂王獻之書白而不飛蕭子雲書飛而不白宜斟酌令得其衷後子雲以􅂐文為之雅合帝意雖創法扵八分實窮微扵小篆其後歐陽脩得焉草書之先因起扵草自杜度妙扵章草崔瑗崔寔父子繼能羅暉趙􅊞亦法此藝與張芝相善因而變之以成今草轉精其妙字之體􅀔一筆而成偶有不連而血脉不斷及其連者氣候通其隔行惟王子敬明其深㫖故行首之字徃徃繼前行之末世稱一筆書首自張伯英也衛恒曰漢興有草書不知作者姓名章帝時齊相杜度號善為草後有崔瑗崔寔亦皆稱工杜氏結字甚安而書體微瘦崔氏甚得筆􅀔而結字小疎弘農張伯英因而轉精甚巧凡家之衣帛必書而後尺寸􅁓不見遺韋仲􅀅謂之草聖伯英弟文舒者次伯英又有姜孟頴梁孔逹田彦和及韋仲􅀅之徒皆伯英弟子有名扵世殊不及文舒也姜堯章云草聖之體如人坐卧行立揖遜忿爭乗舟躍馬歌舞躃踴一切變態非茍然者又一字之體率有多變有起有應如此而起者當如此應各有義理王右軍書羲之字當字得字深字慰字最多至數十字無有同者然而未嘗不同也可謂所欲不踰矩矣凡學草書先當取法張芝皇象索靖等章草而結體平正下筆有源然後倣王右軍申之以變化鼓之以竒崛若泛學諸家則字有工拙筆多失誤當連者反斷當斷者反續不識向背不知起止不悟轉換隨意用筆任筆賦形失誤顛錯反爲新竒自大令以來已如此矣况今世哉然而􅁭韻不高記憶雖多莫湔塵俗若使風神蕭散便當過人自唐以前多是獨草不過两字後世相連属數十字而不斷號曰逰絲此雖出扵古人無足為法更成大病古人作草如今人作真何嘗茍且其相連處特是引􅅁常攷其字是􅀧畫處皆重非􅀧畫處偶相引帯其筆皆輕雖復變化多端未嘗亂其法度張顛懷素至號野逸而不失此法近代山谷老人自謂得長沙三昧草書之法自是又一變矣流至扵今不可復觀唐太宗云行行若縈春蚓字字若綰秋蛇惡無骨也大抵用筆有緩有急有有􅄡有無􅄡有承接上文有牽引下字乍徐還疾忽徃復􅀵緩以傚古急以出竒有􅄡則以耀其精神無􅄡則以含其氣味横斜曲直鈎環盤紆皆以􅀔為主然不欲相帯相帯則近扵俗横畫不欲太長太長則轉換遲直畫不欲太重太重則神癡以捺代乀以彂代辵即辶辵亦以捺代之唯乀則間用之意盡則用懸針意盡湏再生筆意不若用垂露耳草書忌横直分明横直多則如積薪束葦無蕭散之氣時時一出為妙蔡希綜云始下筆湏蔵􅄡轉腕前緩後急字體形􅀔状如蟲蛇相連意莫令斷仍湏簡略為上不貴緐冗至如稜側起復隨􅀔所立大抵之意圜規最妙其有誤􅀤不可再模恐失其筆􅀔猶高􅈐墜石從天而下筆意如放箭箭不欲遲法書攷卷之二
