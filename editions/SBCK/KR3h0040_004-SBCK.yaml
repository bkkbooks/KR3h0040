front:
  text: 法書攷卷之四
  hash: sha256:69b5b4e3694662992ce0b5e293071b94b647b46e758d9a25b0e6d036b73ae5ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_004-1a}
body:
  text: 元盛熈明著圓訣每觀古人遺墨存世􅀧畫精妙振動若生盖其用功有自來矣世傳衛夫人之筆陣圖王逸少之永字八法猶可攷也舍此而欲求全羙扵成體之後固亦難矣今採八法并偏傍之訣列為圖扵左八法翰林禁經云八法起扵􅀠字之始自崔張鍾王傳授􅀁用該扵萬字墨道之最不可不明也隋智永􅀤其論曰勒者趯筆而行承其虗畫取其勁澁則功成矣今止言畫者慮在不趯一出便畫則􅄡拳而怯薄也夫勒者藉扵䜿趯䜿趯則筆勁澁亡其流滑微可稱工矣訣云䇿筆湏勒仰筆覆􅀵又云用中指鈎筆􅉣進覆筆以中指頓筆然後以大指遣至盡處丨弩過直而力敗如萬歲枯藤問曰中心䜿畫謂之弩何也論曰􅀔微弩曰弩在乎趯筆下行若直其畫則形圓􅀔質書之病也訣云􅄡湏先􅀤管逐􅀔行􅂃􅀵􅉣進如錐畫沙又曰弩彎環而􅀔曲如深林之喬木丨趯冝蹲而􅀔生峻快以如飛問曰凡字之出􅄡謂其筆或蔵􅄡或出􅄡由心所好也湏飛動無凝􅆡又云波法微直曰磔横過曰波作一波當三過折筆仰而後曵不冝遲又云抽筆法在罨掠湏峻利右潛趯而戰行持􅀔卷而機駐掲摘而暗􅀵若便抛之必流滑凡淺側起平􅀤􅂃殺按波為抽筆從腹内起又謂平磔法不遲不疾戰筆側去􅀔􅃃不可便出湏駐筆而後放如生蛇渡水庾肩吾云􅀅放更駐唐太宗云為波必磔當三磔折而遣毫磔者不徐不疾而去欲復駐而去之筆訣云磔筆湏飛動無凝􅆡草書以一拂代磔如桞葉擊石波者乀缺波也章草用之又八分更有隼尾波即鍾公㤗山銘及魏文帝受禅碑中巳有此體姜堯章云乀者字之手足伸縮異處變化多端要知無翼鳥翅翩翩自得黄伯思云昔人運筆側掠弩趯皆有成規造微洞􅀇則出沒飛動神會意得然所謂成規者初未嘗失也偏傍孫過庭云一畫之間變起㐲於􅄡杪一􅀧之内殊衂挫於毫芒精其􅀧畫乃能成字勒法一偃蹲􅄡自駐力到疾提力滿微捺力盡回􅄡訣云用筆若錐畫沙横畫放手盡力瘦硬方直沉著勁健無變為度縱畫硬如屈鐡一縱一横可方可圓千形萬状皆如一畫作畫成熟就瘦硬之鐡畫變温和之玉畫又云横畫似八分唐太宗云為畫必勒貴澁而遲姜白石云畫者字之體骨欲其堅正勻凈有起有止所貴長短合宜結束堅實士兩畫者上仰下偃三上潛􅄡平勒中背筆仰䇿下􅂃趯覆􅀵唐太宗三湏觧磔上平中仰下覆春生是也禁經云黄庭三􅀜字用草法上衂側中䇿下􅁬筆横飛凡横畫多用此法隔仰隔覆見智果頌郷背法郷筆宜和􅕶背筆冝峻垂縮法丨頻筆又云垂露欲垂而復縮丨自王右軍始筆欲正自上而下如長針垂丨偏拂自張長史始張敬􅀇云申字中畫宜卓筆疾抽唐太宗云為䜿必弩貴􅀾而雄􅀧法八􅀧之變無窮皆􅅁側􅀔蹲之首尾相顧自成三過筆有偃仰向背等􅀔著􅀧皆磊磊落落如大石之當衢或如蹲鴟或如科斗或如爪瓣或如栗子或蹲若鶚口尖如䑕矢如斯之􅀋各禀其儀姜尭章云􅀧者字之眉目全頼顧盻精神有向有背隨字異形散水法氵互相顯異氵潛相属視氵行書借􅀔訣云上􅗮側中偃下潛挫趯􅄡或蔵或露状􅀋不同意要逓相顯異若頻有則两􅀧相近而上􅀧當高此名潛相属視外雖觧摘内相属附為上中潛􅄡暗衂下峻趯潛遣之此鍾法也行書􅀔微按以輕利為羙冫訣云上側覆􅀵下築而趯之湏相承揖若並連衂側輕掲則率字左右用之烈火法古法灬各自立􅀔聨飛灬布碁俗訣云衂􅄡暗接湏各立􅀔抵背潛衂所謂視之不見考之彌彰聯飛者暗衂微駐輕掲潛趯筆􅄡連綿相顧不絶禁經云聯飛如鴈陣當秋樂毅論燕然等字用之姜尭章云四􅀧者一􅀧起兩􅀧帯一􅀧應曾頭其脚對合貴從上開下合八相背貴從上合下􅄏訣云左潛揭而右啄曾頭左啄右側其脚長舒左足謂有脚者向左舒寳其等字是也頁脚法頁上畫平勒頁斗折衮筆法令訣云湏按􅄡上下蹙衂之令今等字是也謂下一􅀧烏字法馬焉字同切宜􅂃􅀵右軍云字有緩急如烏字下手一􅀧湏急横直即湏遲欲烏之脚乃取形􅀔也宀頭法宀若􅢶宀各相顯異宀行法宀章草訣云上􅀧駐􅄡左右挫􅄡横畫按筆􅀔湏相順又云上􅀧側横畫勒左􅝫筆擺􅄡􅎑筆豎䇿謂􅝫右峻啄輕掲出虞永興常用之法以圓峻飛動為羙姜尭章云宀頭湏覆其下容寳等字上􅀧湏正畫湏圓的不冝相着上長下短暗築法訣云馭􅄡直衝有􅀧連横則名暗築月其字两􅀧是也􅆆􅝫法丨訣云擡筆􅆆䇿挫􅄡上下􅆆直尚常等字中竪用川􅙍􅝫垂露懸針郷背弩等法皆有之肥􅇤以字分為稱長短隨偏傍所冝􅁬筆法小訣云左側而獨立中衂折而右鉤禁經法云鍾書宣示字用若中􅆆則左右潛暗衂而潛趯又簇􅄡健進為系字三畫也戈法戈如百鈞之弩􅀤論曰夫斫戈之法落筆峩峩如長松之􅀝溪谷似欲倒也筆訣云悉以中指遣至盡處以名指拒而趯之潛􅄡暗勒􅀔盡然後趯之右軍背趯戈法上則俯而過下則曲而就盖失之扵前正之於後也智永禅師澁出戈法下以名指築上借􅀔以中指遣之至下以名指衂􅄡潛趯此云秃出張旭折芒法潛􅄡􅂃走意盡乃􅀵章草法潜按微進輕掲暗趯夫掲欲利按欲輕輕則骨勁神清重則質􅆡鈍俗又有斫戈又戈飛戈唐太宗云為戈必潤貴遲凝而右顧張敬􅀇云戈脚宜斜筆直抽直者縁上實下自成也上實為蔵􅄡抽筆也背抛法乙蠆尾如壮士之屈臂乙外略訣云蹲􅄡􅂃掠徐擲之連則失􅀔遲則緩怯又謂外擘法左峻掠中潛􅄡衂挫右蹲􅄡外擲右軍云腕脚幹上捺下撚􅄡始折轉緩毫挫􅄡即輕重有凖􅁃肩吾云欲抛還置為駐􅄡而後趯之撆法背撇首圓蹲過作背懸針法左出郷撇首側蹲右顧作郷左筆尾懸針左出如手之前後撇物提􅄡空中打下如歩少之属衫法彡上平中仰下偃上横下從或反之唐太宗云彡乃形影字右􅁁不可一向為之湏背下撆之人入等法人交争􅀔訣云凡又人第一筆云􅍴引抑拽也人章草王􅄥云趯之欲利按之欲輕亻立人如烏之在柱姜尭章云如立人由王依示一切偏傍皆湏令狹長則右有餘地矣匚法匚上平傍向下平匸上仰傍背下平匸上飛平傍飛郷下飛偃飛者空中飛筆謂􅂃提轉腕疾出也勾弩法􅗵勒弩趯訣云圓角趯􅄡作弩法􅀔未盡而趯之右軍云作右􅁁折角疾牽下微開左略幹轉令取登對勿使腰中傷緩視筆取􅀔宜截而下轉為曲折鉤筆轉角折􅄡􅠌過亦謂轉角為暗角唐太宗云為環必郁貴蹙􅄡而急轉書􅀔論云急牽急引如雲中掣電日月因目是巳張敬􅀇云固字轉角之弩􅀄不冝稜角弩張即字體俗非特固字但有轉筆一切貴其圓潤蘭亭􅄟鶴銘固字妙勾裹法􅗵偃勒郷􅝫趯􅗵仰勒背􅝫趯訣云圓角激􅄡待筋骨而成如武人之屈臂又如勁弩筋節右軍云囬角不用峻及有稜顔真卿云用筆如􅁓行重􅃨法戔上磔衂􅄡下磔出之訣云上縮􅄡作下出􅄡作趯唐太宗云多字四撆一縮二少三亦縮四湏出􅄡丁字脚􅀔丁打宜疾不宜遲寺守亦宜疾挑不宜遲鳯字飛􅀔凡兩􅁁悉宜圓􅂃用筆之時左􅁁􅀔冝疾背筆時意中如電疾急也凡風等同挑􅀔乙右背􅝫左衂仰勒反趯貴抱腹而清口字􅀔嗚呼咽嚨等字口在左者冝上和扣如知等字口在右者冝下法書攷􅃃之四
