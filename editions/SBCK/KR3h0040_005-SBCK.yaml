seq: 5
front:
  text: 下左右畫之大小多少取其停均審其疎密以下承上以右應左以大包小以少附多多以少為體少以多為用空則􅀘就􅀌則扶持剛縱其柔柔縱其剛自然可觀蔡邕云􅀔來不可止􅀔去不可遏惟筆軟則竒怪生焉凡落筆結字上皆覆下下皆承上使其形􅀔逓相映帯無使􅀔背右軍云夫欲書先凝神静想字形大小偃仰平直振動令筋骨相連意在筆前然後作字又云夫書字四方南高北下東闢西闔為形上平下端左輕右重為􅀔凡字處其中畫之法皆不冝倒其左右相顧右宜麤於左畔横貴乎纎䜿貴乎麤分間布白逺近冝均上下得所自然平稳腹不宜促短也脚不宜賖長也又不宜斜重不宜長单不宜小􅃨不宜太傷密則似痾瘵􅆞身不舒展也傷疎則似溺水之禽慢也陶􅀮居云近左虗右分間不同視之不足學之難工智果成心頌廻展左肩頭項長者向又展宣壹尚字等是也長舒左足有脚者向左傍舒實其等是也峻抜一角字方者擡右角國用周字是也潛虗半腹畫稍麤於左亦要逺近均勻遽相覆盖令左實右虗用見罔月字是也隔仰隔覆並字是隔二薑字是隔三仰覆用之間開間合無字等四􅀧四畫為綜上閈則下合之回互􅅏放謂字有磔掠重者爻字上住下放茶字上放下住不可並放變換垂縮并字右縮左垂斤右垂左縮上下亦然緐則减除王書懸字虞書字張盡盛字改血為皿疎則􅀘續字加􅀧􅉝字加畫之􅀋分若仰背為綜也州册之􅀋皆湏自立向背合如並目八字州字皆湏潛相瞩視􅀌單必太一􅀧一畫成其獨立也重並乃促謂昌吕爻􅀥等字之上小林􅁄羽字左促以側附邪為邪􅀧為側交欠以人等是也如邪附曲謂為曲女晏必在等是也覃精一字功歸自得盈虗向背仰覆縮垂回互不失也統視連行妙在相承􅁸伏梁武帝觀鍾繇書十二意顔真卿張旭問答夫平為横子知之乎真卿曰長史每令作一畫皆縱横有象其此之謂乎曰然夫直為縱子知之乎曰豈不謂直者必縱之不令邪曲之謂乎曰然夫均為間子知之乎曰嘗䝉示以間不容光之謂乎曰然密謂際子知之乎曰豈不謂築􅄡下筆皆令宛成不令其疎之謂乎曰然􅄡謂末子知之乎曰豈不謂末以成畫使其􅄡徤之謂乎曰然力為骨體子知之乎曰豈不謂趯筆則􅀧畫皆有筋骨字體自然雄媚乎曰然輕為曲折子知之乎曰豈不謂鈎筆轉角折􅄡輕過亦謂暗過角之謂乎曰然决謂牽掣子歐陽詢云每秉筆必在圓正氣力縱横重輕凝神静慮當審字􅀔四靣停勻八􅁁俱偹短長合度麤細折中心眼凖程疎密欹正筋骨精神隨其大小不可頭輕尾重無令左短右長斜正如人上稱下載張懐瓘十法偃仰向背謂兩字并為一字湏求􅀧畫上下偃仰離合之􅀔隂陽相應謂隂為内陽為外歛心為隂展筆為陽右右亦然鱗羽􅂙差謂􅀧畫編次無使齊平如鱗羽之状􅈐巒起伏謂起筆蹙衂如􅈐巒之状殺筆筆湏存結真草偏枯謂両字或三字不得真草合成一字謂之偏枯湏求映帯邪正失則謂落筆結字分付􅀧畫之法湏依位次遲澁飛動謂勒磔皆湏飛動無凝􅆡之􅀔射空玲瓏謂煙盛識行草字用筆不依先後尺寸規度謂不可長有餘而短不足湏引筆至盡處則字有凝重之態隨字轉變謂蘭亭年字一筆作懸針嵗字即變垂露其間字各有體姜堯章云疎欲風神密欲老蒼如佳之四横川之三直魚之四􅀧畫之九畫必湏下筆勁净疎密得勻乃佳當疎不疎反成寒乞當密不密必至凋疎且字之長短小大斜正疎密天然不齊孰能一之晉魏書法之高良由各盡字之真態不以私意􅂙之耳向背者如人之頋盻指畫相揖相背􅀤扵左者應扵右起扵上者伏扵下大要􅀧畫之間施設各有情理求之古人右軍盖為獨歩蔡希綜云每字皆湏骨力雄強奕奕有飛動之􅀔屈折之状如鋼鐡為鈎牽掣之蹤若勁針直下主客勝負皆湏姑息先作者主也後為者客也既搆筋力然後装束必湏舉止合則起伏相承
