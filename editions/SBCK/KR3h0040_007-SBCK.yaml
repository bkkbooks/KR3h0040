front:
  text: 法書攷卷之七
  hash: sha256:dd1c979e9974fc98c23225b70432579c979b93034d979088f8db19b77bf78f84
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_007-1a}
body:
  text: 元盛熈眀著工用王右軍過江觀覧名刻歎學衛夫人書徒費歲月故學書者以當知􅀁終宗尚乃能知􅀁用力至扵臨摹之功丹墨之妙皆宜精䆒也宗學右軍云頃㝷諸名書鍾張信為絶倫其餘不􅁕觀張旭云妙在執筆令其圓暢勿使拘攣其次識法湏口傳手授勿使無度所謂筆法也其次在布置不慢不廹巧使合宜其次變通適懐縱合規矩其次􅁓墨精佳虞世南云掇筆徃來懸管自在但取體􅀔雄壮不可拘其小節若畏懼生疑否􅆇不决動用迷扵筆前振動扵手下師心固乎獨見弟子執其寡聞耻請問扵智人忌藝能之勝已若欲造􅀇未之見也張懐瓘云大物芒芒各歸其根復本謂也書復扵本上則法扵自然次則歸乎􅂐籀又其次者師扵鍾王夫學鍾王尚不繼虞禇况冗冗者哉又云一􅀧一畫意態縱横偃亞中間綽有餘􅁉然字峻秀􅀋扵生動幽若深逺煥若神明以不測爲量者書之妙也是曰無病勤而行之益佳若有方濶齊平支體肥遁布置逼仄有􅀁不容稜角且形神氣昏􅄥以濃墨爲華者書之困也是曰病甚稍湏毒藥以攻之孫過庭云趍向適時行書為妙要之題勒方富真乃居先草不兼真殆扵專謹真不通草殊為翰札真以􅀧畫為形質便轉為性情草以􅀧畫為性情便轉為形質草乖便轉不能成字真􅉻􅀧畫尢可記文回互雖殊大體相渉故亦旁通二􅂐俯貫八分包括篇章􅉼泳飛白若毫􅁵不察則胡越殊風者焉至扵鍾繇􅀠竒張芝草聖此乃專精一體以致絶倫伯英不真而􅀧畫狼籍元常不草而使轉縱横自兹以降不能兼善者􅀁以不逮非專精也雖􅂐籀章草工用多變而濟成厥羙各有攸冝􅂐尚婉而通隷欲精而密草貴流而暢章貴險而便然而凛之以風神温之以好潤鼓之以枯勁和之以閒雅故可逹其情性形其哀樂又云貴能古不乖時今不同􅁦但右軍之書代多稱習良可據為宗匠取立㫖歸豈惟㑹古通今亦乃情深調合致使摹榻日廣研習歲滋先後著名多從散落歴代始終非其效歟夫運用之方雖由已出規撫所設信属目前差之毫􅁵失巳千里茍知其術適可兼通心不厭精手不忘熟若運用盡扵精熟規矩得扵胸􅁭自然容與徘徊意先筆後瀟洒流利翰逸神飛亦猶弘羊之心預乎無際庖丁之目不見全牛若思通楷則少不如老學成規矩則老不如少思則老而愈妙學則少而可勉勉之不巳抑有三時然一變極其分矣至如􅀄學分布但求平正既知平正務追險絶既追險絶復歸平正初謂未及中則過之會通之際人書俱老李華云大抵字不可拙亦不可巧不可今不可古華質相半可也鍾王之法悉而偹矣近世虞世南深得其體别有婉媚之態徐季海云張伯英臨池學書池水盡墨永禪師登樓不下四十餘年張公精熟號為草聖永師拘􅆡終著能名以此而言非一朝一夕􅀁能盡羙俗云書無百日工盖悠悠之談也臨池訣云第一用􅁓墨第二認􅀔第三裹束第四真如立行如走第六上稀第七中勻第八下密張敬􅀇云初學必先真書便學縱體為宗主真體難成矣宋高宗云士扵書法必先學真書以八法俱偹不相附䴡至側字亦可正讀不論本體盖􅂐籕之遺風若楷法既到則肆筆行草自然臻妙朱文公筆法銘云握管濡毫伸􅁓行墨一扵其間􅀧􅀧畫畫放意則荒取妍則惑必有事焉神明其徳姜尭章云下筆盡倣古人則少神氣專務遒勁則俗病不除又云或者專喜方正極意歐顔或者專務勻圓留心虞永或謂體湏稍匾則自然平正此又徐㑹稽之病或謂欲其蕭散則自不塵俗此又王子敬之風豈􅁕以盡書法之羙哉歐率更雖結體太拘而用筆特偹衆羙雖少楷則而翰墨洒落追縱鍾王來者不能及矣顔栁結體雖異用筆復溺一偏書法一變字畫剛勁高明固不為無助而晉魏之風􅁤掃地矣僧傳曰政禪師工書筆法絶如晉魏間人常􅀏學者臨法帖曰彼皆知翰墨為貴者其工皆有意令童子書􅀞多純筆可知也臨摹筆􅀔論云始書之時不可盡其形􅀔一遍正手二徧少得形􅀔三徧微微似本四徧加其遒潤五徧兼加抽抜如其生澁筆下不滑两行一度創臨惟湏筆滑不得計其徧數唐太宗云朕少時頻遭陣敵必自指揮觀行陣即知其強弱每取吾弱對其強以吾強對其弱敵犯吾弱追奔不踰數百數十歩吾擊其弱必突過其陣自背而反擊之無不大潰多用此制勝思淂其理深也今吾臨古人之書殊不學其形􅀔惟在求其骨力及得其骨力而形態自生耳然吾之􅀁為皆先作意是以果能成也張懐瓘云夫蕳兵則觸目而是擇􅀅則萬不得一固與衆同者俗物與衆異者竒材書亦如然為陣之明必不披圖講法明在臨陣制勝為書之妙必不應文按本妙在應變無方皆能遇事從冝决之扵度内者也虞安吉云未觧書意者一􅀧一畫皆求象本乃轉自取拙豈成書耶姜堯章云摹書最易唐太宗云卧王􅄥於􅁓上坐徐偃扵筆下可以􅅓􅀏子雲唯初學者不得不摹亦以節度其手易扵成就皆湏是古人名筆置之几懸之座右朝夕締觀思其運筆之理然後可以摹臨其次䨇鈎本湏精意摹榻乃不失位置之羙耳臨書易進摹書易忘經意與不經意也夫臨摹之際毫髪失真則神情頻異􅀁貴詳謹又云字書專以風神超邁為主刻之金石其可茍乎摹字之法湏墨暈不出字外或填其内或朱其背正得肥瘦之本體雖然猶貴扵瘦勁使工刻之又從而刮治之則瘦者亦肥矣䨇鈎時湏倒置之使無容私意扵其間誠使下本明上􅁓薄倒鈎何害若下本晦上􅁓薄却湏能書者為之􅀤其筆意可也夫􅄡芒者盖字之精神大抵䨇鈎多失又湏朱其背時稍致意焉丹墨右軍云􅁓剛用軟筆􅁓柔用硬筆純剛如錐畫石純柔如泥洗泥既不圓暢神格亡矣書石同􅁓剛例盖其相得也又云用筆着墨不過三分不得深浸毛弱無力墨用松節同研乆彌佳矣米元章畫史云古書畫皆圓盖有助扵器唐皆鳯池研中心如瓦凹故曰研瓦一援筆因凹􅀔巳圓書畫安得不圜今研如心平如砥一援筆則􅄶故字亦􅄶又近有􅌯心凸硏援筆即三角安得圜哉姜堯章云欲刻者不失真未有若書丹者然筆浮墨則痩得朱則肥故書丹先以痩爲竒而圓熟羙潤常有餘燥勁古老常不足朱使然也又云作楷欲乾然不可太燥行草則燥潤相雜潤以取妍燥以求險墨濃則筆滯墨燥則筆枯筆欲􅄡長勁而圓則含墨可以運動勁則有力圓則妍羙盖􅁓筆墨皆書法之一助也法書攷卷之七
