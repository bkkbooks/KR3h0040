  text: 法書攷卷之二
  hash: sha256:305073944b7b7d9d66fe433fd97fbfbf81c0cf771b351437866f60046e3df431
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_002-1a}
body:
  text: 元盛熈明著字源圖書既出書道尚矣固知文字之始非特倉頡也後世作者皆乗時而増損之然宇内萬國文字皆異其源未能詳詰也嘗覧竺典云造書之主凡三人曰𣑽曰伽盧曰倉頡𣑽者光音天人也以𣑽天之書傳扵印土其書右行伽盧創書於西域其書左行皆以音韻相生而成字諸蕃之書皆其變也其季倉頡居中夏象諸物形而為文形聲相益以成字其書下行未知其説果何所據也因而攷之盖西方以音為母華夏以文為基諸國之風土語音既殊而文字遂亦各異沂流窮源其法似不出乎此三者也嗚呼制書以載言因言以逹意意茍相符則言可忘言假以傳而書非定法古之至人由其習俗之殊隨冝而制作雖東西各源而傳理實一古今變而華質靡常夫豈人力所能及哉今以華𣑽創書之㫖列之於篇𣑽音𣑽者不囉麻也合而言之為𣑽此云光音天也其字之母凡五十曰悉曇章此云能成諸義也其中十六拶去不切攃七蜀惹仁左切切嵳昨何倪倪也切切齒音哳陟轄詫丑轄痆尼轄荼切切切拏舌音怛撻他逹捺切達那喉音鉢發末婆麻唇音耶囉歴加切羅嚩設沙薩詞刹以上融舌喉二音斯乃音韻之祖因之配合而生生無窮焉其土有五天竺文字稍異獨以中天竺為正削竹為筆以貝多樹葉為𥿄其書廣有六十四種名載釋書並不復詳按漢明帝時摩騰竺法蘭自西域來以白馬負至四十二章𣑽夾始通於中國自唐以來漸布中外如古本𣑽法字勢方古嚴重凡詔誥表章鴻文大冊並以書焉謹按諸蕃文字雖變遷各殊然其音韻莫不祖述𣑽音故今曰𣑽音而不曰𣑽書者以其音律交合而成字載音以導意非若華文有六義也鄭樵嘗言𣑽字有象形乃其臆説耳字母者猶倉頡之古文也其音韻㑹合而成字猶古文孳孕而成篆也其轉變而為諸蕃之書者亦猶行草分隸之變也華文庖犧氏之王天下也仰則觀象於天俯則觀法於地視鳥獸之方輿地之冝近取諸身逺取諸物於是始作八卦以垂憲象及神農氏結䋲為治以統事務緐飾既萌易以書契百工以義萬民以察盖取諸夬自倉頡創始以迄五帝三王之世改易殊體封扵太山者七十有二代靡有同焉其書總有六義一曰指事視而可識察而可見上下是也在上為上在下為下二曰象形畫成其物隨體詰詘日月是也日滿月虧效其形也三曰諧聲以事為名取譬相成江河是也以類為形配以聲也四曰會意比類合義以見指揮武信是也止戈為武人言為信也五曰轉注建類一首同意相受考老是也以老受考也六曰假借本無其事依聲託字令長是也數言同字其聲雖異文義一也至周宣王時太史籀著大篆十篇互與古文或異至孔子書六經左丘明述春秋傳皆以古文其後諸侯力政不統於王分為六國制度各異秦始皇初并天下丞相李斯乃奏同之罷其不與秦文合者斯作倉頡篇中車府令趙高作爰歴篇太史令胡母敬作博學篇頗省改古法為小篆焉至於焚書坑儒典謨滌盡工獄事緐變隷趣約而古文由此絶矣是時有八體一曰大篆二曰小篆三曰刻符四曰蟲書即鳥書以書幡信五曰摹印六曰署書七曰芟書隨殳體八觚而書之也八曰隸書衛恒曰王莾時甄豊定古文復有六種一曰古文孔子壁中書也二曰竒字即古文而異者也三曰篆書秦篆是也四曰佐書即隸書也五曰繆書所以摹印也六曰鳥書所以書幡信也張懷瓘十體書㫁各附諸家之論古文者黃帝史倉頡所造頡四目通神明仰觀奎星圓曲之勢俯察龜文鳥跡之象博采衆羙合而為字是曰古文夫文字總而為言包意以名事也分而為義則文者祖父字者子孫得之自然備其文理象形之屬則謂之文因而滋蔓母子相生形聲會意之属則謂之字字者言孳乳浸多也題之竹帛謂之書書者如也舒也著也記也著明萬事記徃知來名言諸無宰制羣有也三代以來咸用之秦用小篆焚燒先典古文絶矣漢文時秦博士伏勝獻古文尚書時又有魏文侯樂工竇公年二百八十歲獻古文樂書一篇武帝時魯共王壊孔子宅壁中得孝經尚書等書宣帝時河南女子壊老子宅而得古文二篇晉咸寜五年汲郡人盗發魏安釐王塚得册書千餘萬言其書隨世巳變數體周幽王時又有省古文者今汲塚書中多有是也滕公塚得石銘人無識者惟叔孫通云此科斗書也科斗者即上古之别名也吾衍學古編云科斗為字之祖象蝦蟇子形或巧畫形状失本意矣上古無筆墨以竹挺點􅃮書竹木上竹剛􅃮膩畫不能行故首重尾輕似其形耳大篆周史籀所作也或云柱下之始變古文或同或異謂之篆篆者傳也傳其物理施之無窮漢藝文志史籀十五篇竝此也以史官製之用以教授謂之史書凡九千字秦趙高以教胡亥又漢元帝遵嚴延年並工史書是也秦焚書與易惟史篇得全吕氏春秋曰倉頡造大篆非也學古篇云欵識文者諸侯夲國之文也古者諸侯書體各異秦始一其法世或以欵識雜篆書一篇之主齊楚不分人莫知其謬學篆博覧古器真欵識中古字神氣散朴可以助人亦知象形指事會意等未變之妙也凡作篆之氣象良以未嘗博古故也若夫模文終不及古籀文者史籀所作也與古文大篆小異後人以名稱書謂之籀文七略曰即周時史官教學童書也與孔壁古文異體即竒字也其跡則石鼓文存焉學古編云李斯既作小篆遂以籀文為大篆篆法匾者最佳謂之果匾徐鉉謂非老手莫能到石鼓是也小篆者秦丞相李斯所作也増損大篆籀文謂之小篆亦曰秦篆始皇二十年始并六國斯時為廷尉乃奏罷不合秦文者扵是天下行之畫如鐡石字若飛動作楷隷之祖為不易之法其銘題鍾鼎及作符節至今用焉斯雖草創遂造其極矣學古編云漢篆多變古法此許氏作説文以救其失也必先通此則冩無謬又當考通釋然字有古今不同説文頗廣當先熟復古編大㮣得矣初學篆時當虗手心伸中指并二指扵几上虗畫如此流便方可操筆􅍾筆必湏單鈎却伸中指在下夾襯方圓平直無不可意矣世多不得師傳故字多欹斜勢不活動若篆大字當虗腕懸筆腕著𥿄即不活以𥿄筒為筆者非士大夫所為也小篆一也而各有筆法李斯方圓廓落陽氷圓活姿媚徐鉉如隷無垂脚字下如釵股稍大鍇如其兄但字下為玉筯微下耳崔子玉多用隷法似乎不精然意有漢意陽氷多非古法盖效子玉也小篆世喜長然不可過但以方楷一字半為度一字為正體半字為垂脚豈不羙茂或有不可者當以正脚為主餘略收短如幡脚可也字有下無垂脚者如㞢等字却以上枝為出如草木之為物正生則上出枝倒懸則下出枝耳凡寫匾額畫冝肥體冝方圖碑盖同此但以小篆為正不用雜體凡中字不可填滿但如井斗中者一字垂其空可放垂筆方不覺大圈比諸字亦湏略收不可圓亦不可方只以炭墼範子為度自好日月等字湏略放小也凡篆中包一二畫如日月之類若初一字内畫不與两傍相連後皆如之首尾一法若或接或否各不同者非法也又用圓圈及圓點小篆無此法古文有之口字不可作三角形凡鍾鼎古文錯雜為用無跡為當但以小篆法冩之自然一法此雖易求却難雜記不熟其法未免如百衲衣為識者笑此為逸法正用廢此可也八分者秦羽人上谷王次仲所作也王愔云次仲以古書方廣少波勢建𥘉中以隷草作楷法字方八分言有模楷蕭子良云靈帝時王次仲飾隷為八分且靈帝之前工八分者非一而云方廣殊非隷書既言古書豈得稱隷若驗方廣則篆籀有之變古為方不知其謂也序仙記云王次仲上谷人少有異志年未弱冠變倉頡書為今八分始皇時官務煩多得次仲文蕳略赴急疾之用甚喜遣使三徴不至始皇大怒制檻車送之扵道化為大鳥翻然長引落二翮今為大翮小翮山山上立祠水旱祈焉蔡邕云次仲𥘉變古體即效程邈隷也小篆古形猶存其半八分巳减小篆之半隸又减八分之半本謂之楷書楷法也式也模也或云後漢亦有王次仲為上谷太守楷隷𥘉制大範幾同故後人惑之時人用冩篇章法令亦謂之章程書故梁鴻云鍾繇善章程書也且二不善扵八分唯伯喈造其極焉訣云本扵篆法學如真書但變隼尾擊石二波也吾衍云八分者漢隷之未有挑法者也比秦隷則易識比漢隷則微似篆若用篆筆作漢隷即得矣八分與隷多不分故言其法又云隷書人謂宜匾殊不知妙不在匾括曰方勁古拙斬釘截鐡備矣挑抜平硬如折刀頭方是漢隷隷法頗寛姑具其略隷書者秦下邽人程邈所造也始為獄吏得罪始王幽繫雲陽獄中覃思十年易大小篆方圓而為隷書三千字奏之始皇善之用為御史以奏事繁多篆書難成乃用隷字以為隷人佐書故曰隷書亦曰佐書案八分乃小篆之㨗隷亦八分之㨗漢陳遵善書後鍾元常王逸少各造其極焉宣和書譜云有人發臨淄塚得齊太公六世孫胡公棺上有字同今隷按胡公先始皇四百餘年何為巳有隷法豈是書原與篆隷相生特未行扵時耶若邈者豈知此體而上之以觧雲陽之難耳字源云隷有秦漢之分秦隷者程邈以文牘緐多難扵用篆因减小篆為便用之法故不為體勢若漢欵識篆字相近非有挑法之隷也即是秦權量上刻字世多以為篆者誤也漢隷者蔡邕石經及漢諸碑上字是也此體為最後出皆有挑法與秦隷同名而實異也姜尭章云真書以平正為善此世俗之論唐人之失也古今真書之妙無出扵鍾元常其次則王羲之二家之書皆蕭洒縱横何拘平正良由唐人以書判取士而士大夫字頗有科舉習氣顔魯公作干禄書是其證也矧歐虞顔栁前後相望故唐人下筆應規入矩無復晉魏飄逸之氣矣竊謂真書又隸之變而以形勢布置采色為度懐瓘論十體而真書不與焉豈以隸為真書耶故以堯章真書之論附云章草者漢元帝時史㳺作急就章觧散隷體麤書之漢書蕳墯漸以行之是已損隷規矩縱任奔逸因草創義謂之草書惟君長告令臣下則可後海北漢劉穆始善書之至建初中杜度善草見稱於章帝上貴其迹詔使草書上事魏文帝亦令劉廣通上事盖因章奏後世謂之章草惟張伯英造其極焉章草即隷書之㨗草亦章草之㨗也訣云章草草具隷字八分謹嚴如真用其一趯二波也行書者後漢頴川劉徳昇所作也即真書之少偽務從簡易相間流行故謂之行書昔鍾元常善行狎書是也爾後羲獻並造其極焉獻之常白父云古之章草不能宏逸頓異真體合窮撝運之理極草縱之致不若扵槀行之間扵徃法固殊也大人冝改體觀其騰煙焬火則回禄䘮精覆海傾河則玄㝠失御天假其魄非學之功若逸氣縱横則羲謝扵獻若簪𥚑禮樂則獻不繼羲雖諸家之法悉殊而子敬朂為遒抜故得之者先本扵天然次資扵功用而善學者乃學之扵造化異類而求之固不取乎似本而各挺之自然訣云行筆而不停著𥿄而不離輕轉而重按如水流雲行無少間㫁永存乎生意也姜堯章云晉魏行書自有一體與草不同大率變真以便揮運而巳草出扵章行出扵真雖曰行書各有體縱復晉代諸賢亦莫不相逺蘭亭記及右軍諸帖第一謝安大令諸帖次之大要以筆老為貴少有失誤亦可暉暎所貴濃纎間出血脉相連筋骨老徤風神洒落姿態具備飛白者漢左中郎将蔡邕所作也王隱王愔竝云飛白變楷製以題署勢勁字輕微不滿名曰飛白王僧􅐚云飛白八分之輕者皆不言所起按靈帝熹平中蔡邕作聖皇篇成待詔鴻都門下見役人方脩飾以堊箒成字心有悦焉歸而為飛白之書漢末魏𥘉並以題署宫闕其體創法扵八分窮微扵小篆可謂勝寄㝠通緲綜神仙之事也爾後羲獻並造其極衛恒祖述飛白而造散隷𨳩張隷體微露其白拘束扵飛白蕭洒扵隷書處其季仲之間也梁武帝謂王獻之書白而不飛蕭子雲書飛而不白宜斟酌令得其衷後子雲以篆文為之雅合帝意雖創法扵八分實窮微扵小篆其後歐陽脩得焉草書之先因起扵草自杜度妙扵章草崔瑗崔寔父子繼能羅暉趙􅊞亦法此藝與張芝相善因而變之以成今草轉精其妙字之體勢一筆而成偶有不連而血脉不斷及其連者氣候通其隔行惟王子敬明其深㫖故行首之字徃徃繼前行之末世稱一筆書首自張伯英也衛恒曰漢興有草書不知作者姓名章帝時齊相杜度號善為草後有崔瑗崔寔亦皆稱工杜氏結字甚安而書體微瘦崔氏甚得筆勢而結字小疎弘農張伯英因而轉精甚巧凡家之衣帛必書而後尺寸𥿄不見遺韋仲将謂之草聖伯英弟文舒者次伯英又有姜孟頴梁孔逹田彦和及韋仲将之徒皆伯英弟子有名扵世殊不及文舒也姜堯章云草聖之體如人坐卧行立揖遜忿爭乗舟躍馬歌舞躃踴一切變態非茍然者又一字之體率有多變有起有應如此而起者當如此應各有義理王右軍書羲之字當字得字深字慰字最多至數十字無有同者然而未嘗不同也可謂所欲不踰矩矣凡學草書先當取法張芝皇象索靖等章草而結體平正下筆有源然後倣王右軍申之以變化鼓之以竒崛若泛學諸家則字有工拙筆多失誤當連者反斷當斷者反續不識向背不知起止不悟轉換隨意用筆任筆賦形失誤顛錯反爲新竒自大令以來已如此矣况今世哉然而襟韻不高記憶雖多莫湔塵俗若使風神蕭散便當過人自唐以前多是獨草不過两字後世相連属數十字而不斷號曰逰絲此雖出扵古人無足為法更成大病古人作草如今人作真何嘗茍且其相連處特是引帶常攷其字是點畫處皆重非點畫處偶相引帯其筆皆輕雖復變化多端未嘗亂其法度張顛懷素至號野逸而不失此法近代山谷老人自謂得長沙三昧草書之法自是又一變矣流至扵今不可復觀唐太宗云行行若縈春蚓字字若綰秋蛇惡無骨也大抵用筆有緩有急有有鋒有無鋒有承接上文有牽引下字乍徐還疾忽徃復收緩以傚古急以出竒有鋒則以耀其精神無鋒則以含其氣味横斜曲直鈎環盤紆皆以勢為主然不欲相帯相帯則近扵俗横畫不欲太長太長則轉換遲直畫不欲太重太重則神癡以捺代乀以彂代辵即辶辵亦以捺代之唯乀則間用之意盡則用懸針意盡湏再生筆意不若用垂露耳草書忌横直分明横直多則如積薪束葦無蕭散之氣時時一出為妙蔡希綜云始下筆湏蔵鋒轉腕前緩後急字體形勢状如蟲蛇相連意莫令斷仍湏簡略為上不貴緐冗至如稜側起復隨勢所立大抵之意圜規最妙其有誤發不可再模恐失其筆勢猶高峰墜石從天而下筆意如放箭箭不欲遲法書攷卷之二
