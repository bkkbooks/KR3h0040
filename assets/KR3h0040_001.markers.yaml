  - {type: variant, offset: 4718, length: 0, content: '', WYG: 危峯阻日孤樹一枝荆軻負劍壯士彎弓雄人獵虎心胸猛烈鋒刅難當唐評如上林春花遠近瞻望無處不發智永𨽻章草俱妙品行能品李云精熟過人惜無竒態中中品王逸少七代孫妙傳家法住吳興永欣寺積退筆頭置大竹簏受一石餘而五簏皆滿瘞之號筆塜求書者如市所居户限為之穿穴用鐡葉裹之人謂之鐡門限唐太宗李世民好羲之書師虞世南嘗患戈脚不工偶作戬字遂空其落戈令世南足之以示魏徴徴曰戬字戈脚逼真世南後極善飛白置宏文館延學書士漢王元昌張云行能品李云中上品與太宗禇遂良受訣於史陵虞世南伯施餘姚人從智果得書法嘗著筆髓論張云𨽻行草妙品李云上下品蕭散洒落真草唯命如羅綺嬌春鵷鴻戱沼唐評體段遒媚舉止不凡能中更能妙中更妙歐陽詢詢本臨湘人學羲之書峻險勁痩自成一家議者以為真行有獻之法自羊欣薄紹之後無比者獨智永恃其精練欲與相攻而詢猛銳智永亦復避鋒詢嘗見索靖所書碑初唾之而去􅂧觀乃悟其妙卧其下三日晩年筆力尤剛勁張云𨽻行飛白草皆妙品大小篆章能品李云上下品如旱蛟得水饞兎走穴筆勢恨少於鎸勒及飛白諸勢如武庫戈㦸雄劍森森唐評如金剛瞋目力士揮拳宋陳景謂世皆知其體方而不知筆力圓禇遂良登善張云𨽻行俱妙品李云上下品臨冩右軍亦為髙足豐艷雕刻盛為當今所尚但恨乏自然精勁意耳唐評字裏金生行間玉潤法則温雅美麗多方薛稷張云能品唐評多攻禇體意亦新竒又云風驚苑花雪壓山栢張從申唐評遠近稱善獨歩江外李陽氷少温又名潮嘗作筆法論謂於天地山川得其方員流峙之形於日月星辰得其經緯昭回之度近取諸身遠取萬物幽至於􅄦神情狀細至於喜怒舒惨莫不畢載唐評若古釵倚物力有萬夫李斯之後一人而已張旭唐評立性顛逸超越古今顔真卿清臣唐評鋒絶劍摧驚飛逸勢陸羽曰徐吏部不受右軍筆法而體裁似右軍顔太保受右軍筆法而㸃畫不似蓋徐得右軍皮膚眼鼻所以似之顔得右軍筋骨心肺所以不似也釋懷素唐評援筆掣電隨手萬變酒酣興發遇􅉹壁衣器靡不書之貧無紙種芭蕉萬餘株以供揮灑書不及乃一盤書之書至再三盤版皆穿素伯祖惠融善學歐陽詢書世莫能辨至是鄉中呼為大錢師為小錢師嘗受法於金吾兵曺錢塘鄔肜李邕泰和江都人唐評華岳三峰黄河九曲邕初學變右軍行法頓挫起伏既得其妙復乃擺脫舊習筆力一新李陽氷謂之書中仙手文翰俱重於時當時奉金帛求書前後所受鉅萬計自古未有如此之盛也柳公權誠懸穆宗嘗問公權筆何以盡善對曰在心正心正則筆正上改容知其筆諫也公權初學王書徧閱近代筆法體勢勁媚自成一家當時公卿家碑刻不得公權書者以為不孝外夷入貢皆購求柳書上都西眀寺金剛經碑尤為得意下品何曽張云草能品晋元帝霽景文庾云下上品王洽敬和羊祐叔子庾云下上品王恬敬豫張云𨽻能品王薈敬文庾云下上品王脩敬仁庾云中中品張云𨽻行俱能品王珣元琳洽之子珉之兄王濛仲祖張云草能品李云下中品王云上可比庾翼張敞張云古文能品張澄王云當時亦呼有意王裒偉元李云下上品張云能品梁武帝云意深工淺猶未當妙張紘張云小篆能品飛白妙品范􅈌蔚宗庾云下上品張云小篆草能品李云下中品如寒雋之士亦不可棄王云與蕭思話同師羊欣後背叛失故步蕭思話庾云上下品張云行草妙品李云下中品如遁世之夫時或堪采王云全法羊欣風流趣好殆當不減而筆力恨弱謝朓元暉庾云下中品張云草能品李云創得令韻下下品謝静謝敷王云並善寫亦入能品姜翊梁宣右庾云下上品常秀鍾輿問泰羊􅀈識道人庾黔婁朱炳費元瑶孫奉伯陽經諸葛融以上庾云下下品楊潭張炳張輿王􅇤以上庾云下中品劉穆之道和庾云下中品李云下下品張融思先庾云下下品張云草妙品李云要自標舉蓋無足褒下中品朱齡石庾景休禇元眀孔敬通王籍文海右庾云皆下中品衛宣李韞陳基傅廷堅張紹隂光韋熊曺任宋嘉裴邈羊固傅夫人辟閭訓謝誨孔閭顔寶光周仁皓張欣泰張熾僧岳道人法髙道人右數人庾評云皆五味一和五色一采視其雕文非特刻鵠人人下筆寕止追響遺迹見珍餘芳可折誠乃驅馳並駕不逮前鋒而中權後殿各盡其美允為下中品徐幹張云章草能品徐令文張云章草能品王愔張云章草能品}
