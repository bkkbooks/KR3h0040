  - {type: variant, offset: 2357, length: 0, content: '', WYG: 筆至暮書竟首尾如一又無誤字子敬戲之弟書如騎騾駸駸恒欲度驊騮前當代獻之兼中書令故以獻之為大令珉為小令庾云中上品張云行第六并𨽻妙品王云筆力過於子敬荀輿長允庾云上下品張云𨽻草俱妙品王云長允狸骨右軍以為絶倫阮研文機庾云窮古觀今盡窺衆妙之門雖師王祖鍾終成别搆一體上下品張云𨽻行草妙品李云中中品梁武云如貴胄失品不復排斥英賢中品嚴延年張云大篆能品工籀書許慎張云小篆能品班固張云大小篆能品羅暉叔景庾云中下品張云章草能品趙襲元嗣庾云中下品張云章草能品魏武帝曹操孟徳庾云筆墨雄贍中中品張云章草妙品唐云如金花鈿落徧地玲瓏荆玉分輝瑶巖璀璨吳孫皓元宗庾云體裁綿宻中中品李云中下品如齊人酣暢驕其家室雖欲矜豪亦復平矣劉釗張云小篆飛白能品毛宏張云八分能品衛恒云宏乃梁鵠弟子教以秘書今八分皆宏法也衛覬伯儒庾云中中品張云古文𨽻章草能品王云體如傷痩而筆匠精緻衛恒巨山瓘之子庾云中中品張云古文章草妙品𨽻能品李云中上品司馬攸晋武帝弟也王云京師以為楷式張云行草能品陸機士衡庾云中下品李云中下品蚌質珠胎金沙銀礫王曰吳士也無以較其多少劉輿慶孫庾云中下品庾亮元規庾云中下品王云亦能入録庾翼稚恭庾云中上品張云𨽻章草能品李云上下品王云征西翼書少時與右軍齊名右軍後進庾猶不憤其在已上在荆州與都下書曰小兒軰乃賤家雞重野鶩學逸少書湏我下當比之王敦處仲張曰草第四王導茂宏庾云中下品張云真第七行第八并草能品王云甚有楷法以師鍾衛好惡無厭喪亂狼狽猶以鍾繇尚書宣示帖衣帶過江陵右軍得之子恬洽薈亦能書郗氏羲之妻甚工書有七子五子知名長𤣥之次凝之徽之操之獻}
