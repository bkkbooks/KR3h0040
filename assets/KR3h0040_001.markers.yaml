  - {type: variant, offset: 2356, length: 0, content: '', WYG: 筆迹遒潤獨擅一家之美天質自然風神蓋代且其道㣲而味薄固常人莫之能學其理隠而意深固天下寡於知音真第一行第二章第五草第八及飛白俱神品八分妙品庾云工夫不及張天然過之天然不及鍾工夫過之允為上上品李云逸品如隂陽四時寒暑調暢巖廊宏敞簪裾肅穆其聲鳴也則鏗鏘金石其芬郁也則氤氲蘭麝其難徴也則縹緲而已仙其可觀也則昭章而在目可謂真書之聖也若草行襍體如清風出袖眀月入懷瑜瑾爛而五色黼黻摛其五采故使離朱喪眀子期失聼可謂草書之聖也其飛白猶霧縠卷舒烟雲照灼長劍耿介而倚天勁矢超忽而無地可謂飛白之仙也又如松巖㸃黛蓊欎而起朝雲飛泉潄玉洒落而成暮雨既離方以遁圓亦非絲而異帛唐評如壯士㧞劍壅水絶流頭上安㸃如髙峯之墜石作一横畫如千里之陣雲捺一偃波如風雷振駭作一竪畫如萬嵗枯藤立一倚竿若虎卧鳯閣自上掲竿如龍躍天門梁武云字勢雄逸如龍跳天門虎卧鳯閣故歴代寳之永以為訓王云古人之跡計無以過王獻之子敬逸少第七子子敬最知名七八歳學書逸少宻從後掣其筆不得歎曰此子當大有名嘗書壁為方丈大字逸少甚以為能初學父書頃習于張以後改變制度别創其法率爾師心㝠合天矩雄武神蹤靈姿秀出若臧武仲之智卞莊子之勇大鵬摶風長鯨噴沫懸崖墜石驚電送光張云子敬行草之外更開一門非草非真離方遁圓兼真者謂之真行帶草者謂之行草子敬之法非草非行流便於行草之間逸少秉真行之要子敬執行草之權父之靈和子之神俊古今獨絶也真第四行第二草第三并飛白俱神品八分能品庾云上中品梁武云絶衆超羣無人可擬如河朔少年皆充悦舉體㳫拖而不可耐李云子敬草書逸氣過父如丹穴鳯舞清泉龍躍倐忽變化莫知所成或蹴海移山或翻濤簸嶽而正書行書如田野學士越恭朝列非不稽古憲章乃時有失體處瓘說稱其轉妍品鍳踈矣王珉季琰洽之少子也名出珣右時云法護非不佳僧彌難為兄法䕶珣小字也有四疋素自朝}
