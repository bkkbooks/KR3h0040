  - {type: variant, offset: 2469, length: 1865, content: 八分者秦羽人上谷王次仲所作也王愔云次仲以古書方廣少波勢建𥘉中以隷草作楷法字方八分言有模楷蕭子良云靈帝時王次仲飾隷為八分且靈帝之前工八分者非一而云方廣殊非隷書既言古書豈得稱隷若驗方廣則篆籀有之變古為方不知其謂也序仙記云王次仲上谷人少有異志年未弱冠變倉頡書為今八分始皇時官務煩多得次仲文蕳略赴急疾之用甚喜遣使三徴不至始皇大怒制檻車送之扵道化為大鳥翻然長引落二翮今為大翮小翮山山上立祠水旱祈焉蔡邕云次仲𥘉變古體即效程邈隷也小篆古形猶存其半八分巳减小篆之半隸又减八分之半本謂之楷書楷法也式也模也或云後漢亦有王次仲為上谷太守楷隷𥘉制大範幾同故後人惑之時人用冩篇章法令亦謂之章程書故梁鴻云鍾繇善章程書也且二不善扵八分唯伯喈造其極焉訣云本扵篆法學如真書但變隼尾擊石二波也吾衍云八分者漢隷之未有挑法者也比秦隷則易識比漢隷則微似篆若用篆筆作漢隷即得矣八分與隷多不分故言其法又云隷書人謂宜匾殊不知妙不在匾括曰方勁古拙斬釘截鐡備矣挑抜平硬如折刀頭方是漢隷隷法頗寛姑具其略隷書者秦下邽人程邈所造也始為獄吏得罪始王幽繫雲陽獄中覃思十年易大小篆方圓而為隷書三千字奏之始皇善之用為御史以奏事繁多篆書難成乃用隷字以為隷人佐書故曰隷書亦曰佐書案八分乃小篆之㨗隷亦八分之㨗漢陳遵善書後鍾元常王逸少各造其極焉宣和書譜云有人發臨淄塚得齊太公六世孫胡公棺上有字同今隷按胡公先始皇四百餘年何為巳有隷法豈是書原與篆隷相生特未行扵時耶若邈者豈知此體而上之以觧雲陽之難耳字源云隷有秦漢之分秦隷者程邈以文牘緐多難扵用篆因减小篆為便用之法故不為體勢若漢欵識篆字相近非有挑法之隷也即是秦權量上刻字世多以為篆者誤也漢隷者蔡邕石經及漢諸碑上字是也此體為最後出皆有挑法與秦隷同名而實異也姜尭章云真書以平正為善此世俗之論唐人之失也古今真書之妙無出扵鍾元常其次則王羲之二家之書皆蕭洒縱横何拘平正良由唐人以書判取士而士大夫字頗有科舉習氣顔魯公作干禄書是其證也矧歐虞顔栁前後相望故唐人下筆應規入矩無復晉魏飄逸之氣矣竊謂真書又隸之變而以形勢布置采色為度懐瓘論十體而真書不與焉豈以隸為真書耶故以堯章真書之論附云章草者漢元帝時史㳺作急就章觧散隷體麤書之漢書蕳墯漸以行之是已損隷規矩縱任奔逸因草創義謂之草書惟君長告令臣下則可後海北漢劉穆始善書之至建初中杜度善草見稱於章帝上貴其迹詔使草書上事魏文帝亦令劉廣通上事盖因章奏後世謂之章草惟張伯英造其極焉章草即隷書之㨗草亦章草之㨗也訣云章草草具隷字八分謹嚴如真用其一趯二波也行書者後漢頴川劉徳昇所作也即真書之少偽務從簡易相間流行故謂之行書昔鍾元常善行狎書是也爾後羲獻並造其極焉獻之常白父云古之章草不能宏逸頓異真體合窮撝運之理極草縱之致不若扵槀行之間扵徃法固殊也大人冝改體觀其騰煙焬火則回禄䘮精覆海傾河則玄㝠失御天假其魄非學之功若逸氣縱横則羲謝扵獻若簪𥚑禮樂則獻不繼羲雖諸家之法悉殊而子敬朂為遒抜故得之者先本扵天然次資扵功用而善學者乃學之扵造化異類而求之固不取乎似本而各挺之自然訣云行筆而不停著𥿄而不離輕轉而重按如水流雲行無少間㫁永存乎生意也姜堯章云晉魏行書自有一體與草不同大率變真以便揮運而巳草出扵章行出扵真雖曰行書各有體縱復晉代諸賢亦莫不相逺蘭亭記及右軍諸帖第一謝安大令諸帖次之大要以筆老為貴少有失誤亦可暉暎所貴濃纎間出血脉相連筋骨老徤風神洒落姿態具備飛白者漢左中郎将蔡邕所作也王隱王愔竝云飛白變楷製以題署勢勁字輕微不滿名曰飛白王僧􅐚云飛白八分之輕者皆不言所起按靈帝熹平中蔡邕作聖皇篇成待詔鴻都門下見役人方脩飾以堊箒成字心有悦焉歸而為飛白之書漢末魏𥘉並以題署宫闕其體創法扵八分窮微扵小篆可謂勝寄㝠通緲綜神仙之事也爾後羲獻並造其極衛恒祖述飛白而造散隷𨳩張隷體微露其白拘束扵飛白蕭洒扵隷書處其季仲之間也梁武帝謂王獻之書白而不飛蕭子雲書飛而不白宜斟酌令得其衷後子雲以篆文為之雅合帝意雖創法扵八分實窮微扵小篆其後歐陽脩得焉草書之先因起扵草自杜度妙扵章草崔瑗崔寔父子繼能羅暉趙􅊞亦法此藝與張芝相善因而變之以成今草轉精其妙字之體勢一筆而成偶有不連而血脉不斷及其連者氣候通其隔行惟王子敬明其深㫖故行首之字徃徃繼前行之末世稱一筆書首自張伯英也衛恒曰漢興有草書不知作者姓名章帝時齊相杜度號善為草後有崔瑗崔寔亦皆稱工杜氏結字甚安而書體微瘦崔氏甚得筆勢而結字小疎弘農張伯英因而轉精甚巧凡家之衣帛必書而後尺寸𥿄不見遺韋仲将謂之草聖伯英弟文舒者次伯英又有姜孟頴梁孔逹田彦和及韋仲将之徒皆伯英弟子有名扵世殊不及文舒也姜堯章云草聖之體如人坐卧行立揖遜忿爭乗舟躍馬歌舞躃踴一切變態非茍然者又一字之, WYG: ''}
