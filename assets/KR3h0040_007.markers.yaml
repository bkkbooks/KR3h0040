  - {type: variant, offset: 827, length: 0, content: '', WYG: 者不能及矣顔柳結體既異古人用筆復溺一偏書法一變字畫剛勁髙明固不為無助而晋魏之風軌埽地矣僧傳曰政禪師攻書筆法絶如晋宋間人嘗笑學者臨法帖曰彼皆知翰墨為貴者其工皆有意今童子書畫多純筆可法也臨摹筆勢論云始書之時不可盡其形勢一徧正脚手二徧少得形勢三徧㣲㣲似本四徧加其遒潤五徧兼加抽㧞如其生澁筆下不滑兩行一度創臨惟須筆滑不得計其徧數唐太宗云朕少時頻遭陣敵必自指揮即知其强弱毎取吾弱對其强以吾强對其弱敵犯吾弱踰追奔不百數十步吾撃其弱必突過其陣自背而反撃之無不大潰多用此制勝思得其理深也今吾臨古人之書殊不學其形勢惟在求其骨力及得其骨力而形勢自生耳然我之所為皆先作意是以果能成也張懷瓘云夫簡兵則觸目而是擇將則萬不得一固與衆同者俗物與衆異者竒才書亦然然為將之眀不必披圖講法眀在臨陣制勝為書之妙不必應文按本妙在應變無方皆能遇事從宜决之於度内者也虞安吉云未觧書意者一㸃一畫皆求象本乃轉自取拙豈成書耶姜堯章云摹書最易唐太宗云卧王濛於紙上坐徐偃於筆下可以嗤笑子雲惟初學者不得不摹亦以節度其手易於成就}
