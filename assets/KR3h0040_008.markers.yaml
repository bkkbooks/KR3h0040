  - {type: variant, offset: 832, length: 0, content: '', WYG: 印右印記記千百年可為龜鑑别有右皆未詳去處皆識鍳之家印記並可為証又有禇氏書印非禇河南之印也此外更有禇家印署皆非鑒識不足為証故不具録若不識圖畫空騐印記然自古及今家蔵傳玩要知䟦尾印記乃書畫之本耳印譜長秋宮寶用之江休復嘉祐襍志云淘蔡河獲一玉印與篆文不同成隂陽字李昌言處見飛白鳯字印繡衣執法大夫印銅印龜鈕得之淮隂字畫㣲漫大夫字用嶧山篆法奉車都尉銀錯龜鈕徧體塗銀校尉之印章僧賛寕要言曰近獲銅龜印一寸餘其文五字其篆前兩行皆二字第三行單章字伸之令長稱副前二行廷尉之印章軍曲矦丞章馬永年懶真録云今印文榜額有之則秦璽文也子良誤合之李陽氷曰摹印之法有四功侔造化㝠受鬼神謂之神筆畫之外得㣲妙法謂之竒萟精於一規矩方員謂之工煩簡相叅布置不紊謂之巧趙彦衛云古印文作白文蓋用以印泥紫泥封詔是也今之木印及倉厫印近之矣自有紙始用朱字間有為白字者米芾書史云印文須細圏須與文等太宗秘閣圖書之印不滿二寸圏文皆細上閣圖書字印亦然仁宗後印經院賜經用上閣圖書字大印粗文若施於書畫古紙素字畫多有損於書帖近三館秘閣之印文雖細圈乃粗如半紙亦印損書畫也王說見某家印記與唐印相似始換作細圈仍皆求作篆如填篆自有法世填皆無法貞觀開元皆小印便於印縫大者圈刓角一寸已似古篆於鶺鴒頌上見之又云唐印郭如一細如絲髪篆文取稱不必專滿世所收唐告可考也今印文可篆囬環曲折更無餘地郭倍於文吾衍摹印法漢有摹印篆只是方正篆法與𨽻相通後人不識古印妄加盤屈且以為法多見故家蔵得漢印字皆方正近乎𨽻書此即摹印篆也凢屈曲盤回唐始如此今碑刻有顔魯公告尚書省可考白字印皆用漢篆平正方直字下可圜縱有斜筆出當取巧寫過如崔子五寫張平子碑上字及漢器上并碑蓋印章等字最第一其印文必過於邉不可空空且不古朱文印或用雜體篆不可太恠擇其近人情者免費詞說其印文不可逼邊須當以空中空白得中處為相宜庶免印出與邉相倚也字宜細於四傍有出筆皆滯邉邊須細於字字若一體印出時四邊虗紙昻起未免邉肥於字粘邊朱文建業文房之法也三字印一邉一字一邉兩字者以兩字處與一字處相等不可兩字中㫁又不可太相接凢印文中有一二字偶有自然空缺不可映帶者聴其自坐古印多如此又下有空處懸之最佳不可妄意伸屈務欲填滿若寫之得法自不覺空處凢印文中有匾口如子字上口畧須寛使口中見空稍多方混厚漢印皆如此四字印若前二字交果有空後二字無須當空一畫地别之字有脚故言及此不然一邉見分一邊不分非法度也軒齋等印古無此式惟唐相李泌有端居室白文五印或可為法白文終非法不若只朱文唐人雖有號未嘗作印三字扁却有之名印不可妄寫姓名相合或加印字等字或兼用印章字曰姓某印章不若只用印字為正也二名者可回文寫姓下著印字在右二名左是也單名者曰姓某之印却不可回文寫名印内不得著氏字表字印只用二字此為正式近人欲并知姓氏加氏其上曰某氏某若作姓集文古雖有此稱係他人美已却不可入印漢人三字印非複姓及無印字者皆非名印蓋字印不可以印字亂耳漢張安字㓜君有印曰張㓜君右一字左二字唐呂温字化光有印曰呂化光此亦三字表字印式也押署䟦尾前代御府自晋宋至於隋收聚圖書皆末行印記但備列當時鑒識藝人押署宋張則袁倩陸綏齊劉瑱毛惠梁沈熾文唐懐充徐僧權孫子真法象庾於陵徐湯孫達姚懷珍滿騫范允祖顧􅍾江僧寶陳延祖陳杜僧譚黄髙北齊丁道務隋江縂姚察朱昇何妥大業年月日奉勅裝開皇年月日内史薛道衡署名䟦尾亦有開皇年月日叅軍事學士諸葛頴咨議叅軍開府學士柳顧言釋智來又唐武德初秦王府䟦尾薛收禇亮虞世南貞觀中褚河南等監裝背並有當時鑒識人押署貞觀十一年月日樊行整裝李德穎數平儼蘇旭韋挺監十二年月日題署同十一年十三年月日王行直裝褚遂良監臣無忌臣𤣥齡臣士廉臣徴臣君集唐皎臣楊師道李大亮唐儉臣孝恭劉徳威章挺馮長命亦有不署馮長命唐皎者十四年月日張龍裝臣士亷臣徴楊師道褚遂良姜行本亦有蔡揣裝十五年十六年張龍樹裝禇遂良楊師道魏徴房𤣥齡無他人名十七年十八年十九年禇遂良監無他人名是開元中割却開元中𤣥宗購求天下圖書命當時鑒識人押署䟦尾印用之字其來乆矣太初元年夏五月正厯以正月為嵗首色上黄用五注云漢用土數五五謂印文若丞相曰丞相之印章諸守相卿印文不足五字者以之字足右二印皆太初以後五字}
