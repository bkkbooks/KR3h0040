  - {type: variant, offset: 1424, length: 1336, content: 則秦璽文也子良誤合之李陽氷曰摹印之法有四功侔造化冥受鬼神謂之謂之神筆畫之外得微妙法謂之竒藝精扵一謂之規矩方圓謂之工繁簡相參布置不紊謂之巧趙彦衛云古印作白文盖用以泥印紫泥封詔是也今之朱印及倉厫印近之矣自有𥿄始用朱字間有為白字者米芾書史云印文湏細圈湏與文等太宗秘閣圖書之印不滿二寸圈文皆細上閣圖書字印亦然仁宗後印經院賜經用上閣圖書字大印麤若施扵書畫占𥿄素字畫多有損於書帖近三舘私閣之文印雖細圈乃麤如半指亦印損書畫也王詵見其家印記與唐印相似始換作細圈仍皆求其篆如填篆自有法世填皆無法貞觀開元皆小印便扵印縫大者圈刓角一寸已上古篆扵􅜇鴒頌見之又云唐印文郭如一細如毫髪篆文取稱不必專滿世收唐文可考今印文所篆回環曲折更無餘地郭倍扵文吾衍摹印法漢有摹印篆只是方正篆法與隷相通後人不識古印妄皆盤曲且以為法多見故家蔵得漢印字皆方正近似隷書此即摹印篆也凡屈曲盤回唐始如此今碑刻有顔魯公告尚書省印可攷白字印皆用漢篆平方直正字不可圜縱有斜筆亦當取巧冩過如崔子玉冩張平子書碑上字及漢器上并碑盖印章等字最第一其印文必逼扵邊不可有空空即不古朱字印或用雜體篆不可太怪擇其近人情者免費詞説其印文不可逼邊湏當以空中空白得中處為相去庻免印出與邊相倚也字宜細扵四傍有出筆湏帶邊邊湏宜細扵字若一體印出時四邉虗𥿄昻起未免邊肥扵字粘邉朱文建業文房之法也三字印一邊一字一邊両字者以両字處與一字處相等不可两字中㫁又不可太相接凡印文中有一二字偶有自然空缺不可映帯者聼其自空古印多如此文下有空處懸之最佳不可妄意伸屈移欲填滿若冩之得佳自不覺空處凡印文中有匾口如子字上口畧湏寛使口中見空稍多方混厚漢印多如此四字印若前二字交界有空後二字無湏當空畫地别之字有脚故言及此不然一邊見分一邊不分非法度也軒齋等印古無此式惟唐相李泌有端居室白文玉印或可為法白文終非法不若只從朱文唐人雖有號未嘗作印三字屋扁却有之名印不可妄冩姓名相合或加印章等字或兼用印章字曰姓某印章不若只用印字為正也二名者可回文冩姓下著印字在左二名在右是也單名者曰姓某之印却不可回文冩名印内不得著氏字表字印只用二字此為正式近人欲并知姓氏加氏其上曰某氏某若作某父古雖有此稱係他人羙已却不可入印漢人三字印非復姓及無印字者皆非名印盖字印不可以印字亂耳漢張安字㓜君有印曰張㓜君右一字左二字唐吕温字化光有印曰吕化光此亦三字表字印式也押署跋尾前代御府自晉宋至扵隋收聚圖書皆未可印記但備列當時鍳識藝人押署宋張則袁倩陸綏齊劉瑱毛恵逺梁沈熾文唐懐充徐僧權孫子真法象庾於陵徐湯孫逵姚懐珍滿騫范胤祖江僧寳陳延祖顧操陳杜僧譚黄高北齊丁道矜隋江總姚察朱异何妥大業年月日奉勑装開皇年月日内史薛道衡署名跋尾亦有開皇年月日參軍事學士諸葛熲咨議参軍開府學士栁頋言釋智果唐武徳𥘉秦王府䟦尾薛收禇亮虞丗南貞觀中禇河南等監装背並有當時鍳識人押署貞觀十一年月日樊行整装李徳頴數平􅌂曺朂韋挺監十二年月日題署同十一年十三年月日臣行直装禇遂良監臣無忌臣玄齡臣士亷臣徴臣君集臣楊師道臣大亮唐儉臣孝恭劉徳威韋挺馮長命唐皎亦有不署馮長命唐皎者十四年月日張龍樹裝臣士亷徴楊師道禇遂良姜行本亦有蔡撝装十五年十六年張龍樹装禇遂良楊師道魏徴房玄齡無他人姓名十七年十八年十九年禇遂良監無他人名是開元中割却開元中玄宗購求天下圖書命當時鍳識人押署跋, WYG: 縝宻}
