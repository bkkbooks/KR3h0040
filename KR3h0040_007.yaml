front:
  text: 法書考卷之七
  hash: sha256:e8d53bf0bf4b86fc4e9069c1c7784b8743cc8535e986f0a447f729c0c65d05c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_007-1a}
body:
  text: 元盛熙眀著工用王右軍過江觀覽名刻歎學衛夫人書徒費歲月故學書者以當知所終宗尚乃能知所用力至于臨摹之功丹墨之妙皆宜精究也宗學右軍云頃尋諸名書鍾張信為絶倫其餘不足觀張旭云妙在執筆令其圓暢勿使拘攣其次識法須口傳手授勿使無度所謂筆法也其次在布置不慢不迫巧使合宜其次變通適懷縱合規矩其次𥿄墨精佳虞世南云掇筆往來懸管自在但取體勢雄壯不可拘其小節若畏懼生疑否臧不決動用迷于筆前振動于手下師心固乎獨見弟子執其寡聞耻請問于智人忌藝能之勝已若欲造玄未之見也張懷瓘云大物芒芒各歸其根復本謂也書復于本上則法于自然次則歸乎篆籀又其次者師于鍾王夫學鍾王尚不繼虞禇况冗冗者哉又云一點一畫意態縱橫偃亞中間綽有餘𥙿然字峻秀類于生動幽若深逺煥若神明以不測為量者書之妙也是曰無病勤而行之益佳若有方濶齊平支體肥遁布置逼仄有所不容稜角且形神氣昏𪷟以濃墨為華者書之困也是曰病甚稍須毒藥以攻之孫過庭云趍向適時行書為妙要之題勒方富真乃居先草不兼真殆于專謹真不通草殊為翰札真以點畫為形質便轉為性情草以點畫為性情便轉為形質草乖便轉不能成字真虧點畫尢可記文回互雖殊大體相涉故亦旁通二篆俯貫八分包括篇章􅉼泳飛白若毫釐不察則胡越殊風者焉至于鍾繇隸竒張芝草聖此乃專精一體以致絶倫伯英不真而點畫狼籍元常不草而使轉縱橫自兹以降不能兼善者所以不逮非專精也雖篆籀章草工用多變而濟成厥美各有攸冝篆尚婉而通隸欲精而密草貴流而暢章貴險而便然而凛之以風神溫之以好潤鼓之以枯徑和之以間雅故可逹其情性形其哀樂又云貴能古不乖時今不同弊但右軍之書代多稱習良可據為宗匠取立旨歸豈惟會古通今亦乃情深調合致使摹榻日廣研習歲滋先後著名多從散落歷代始終非其效歟夫運用之方雖由已出規撫所設信屬目前差之毫釐失巳千里茍知其術適可兼通心不厭精手不忘熟若運用盡于精熟規矩得于胸襟自然容與徘徊意先筆後瀟灑流利翰逸神飛亦猶弘羊之心預乎無際庖丁之目不見全牛若思通楷則少不如老學成規矩則老不如少思則老而愈妙學則少而可勉勉之不巳抑有三時然一變極其分矣至如𥘉學分布但求平正既知平正務追險絶既追險絶復歸平正初謂未及中則過之會通之際人書俱老李華云大抵字不可拙亦不可巧不可今不可古華質相半可也鍾王之法悉而偹矣近世虞世南深得其體别有婉媚之態徐季海云張伯英臨池學書池水盡墨永禪師登樓不下四十餘年張公精熟號為草聖永師拘滯終著能名以此而言非一朝一夕所能盡美俗云書無百日工蓋悠悠之談也臨池訣云第一用𥿄墨第二認勢第三裹束第四真如立行如走第六上稀第七中勻第八下密張敬玄云初學必先真書便學縱體為宗主真體難成矣宋高宗云士于書法必先學真書以八法俱偹不相附麗至側字亦可正讀不論本體蓋篆籕之遺風若楷法既到則肆筆行草自然臻妙朱文公筆法銘云握管濡毫伸𥿄行墨一于其間點點畫畫放意則荒取妍則惑必有事焉神明其德薑堯章云下筆盡倣古人則少神氣專務遒徑則俗病不除又云或者專喜方正極意歐顔或者專務勻圓留心虞永或謂體須稍匾則自然平正此又徐會稽之病或謂欲其蕭散則自不塵俗此又王子敬之風豈足以盡書法之美哉歐率更雖結體太拘而用筆特偹衆美雖少楷則而翰墨灑落追縱鍾王來者不能及矣顔栁結體雖異用筆復溺一偏書法一變字畫剛徑高明固不為無助而晉魏之風軌掃地矣僧傳曰政禪師工書筆法絶如晉魏間人常笑學者臨法帖曰彼皆知翰墨為貴者其工皆有意令童子書畫多純筆可知也臨摹筆勢論云始書之時不可盡其形勢一遍正手二遍少得形勢三遍微微似本四遍加其遒潤五遍兼加抽拔如其生澀筆下不滑兩行一度創臨惟須筆滑不得計其遍數唐太宗云朕少時頻遭陳敵必自指揮觀行陳即知其強弱每取吾弱對其強以吾強對其弱敵犯吾弱追奔不踰數百數十步吾擊其弱必突過其陳自背而反擊之無不大潰多用此制勝思淂其理深也今吾臨古人之書殊不學其形勢惟在求其骨力及得其骨力而形態自生耳然吾之所為皆先作意是以果能成也張懷瓘云夫蕳兵則觸目而是擇將則萬不得一固與衆同者俗物與衆異者竒材書亦如然為陳之明必不披圖講法明在臨陳制勝為書之妙必不應文按本妙在應變無方皆能遇事從冝決之于度內者也虞安吉云未解書意者一點一畫皆求象本乃轉自取拙豈成書耶薑堯章云摹書最易唐太宗云卧王𪷟於𥿄上坐徐偃于筆下可以嗤笑子雲唯初學者不得不摹亦以節度其手易于成就皆須是古人名筆置之几懸之座右朝夕締觀思其運筆之理然後可以摹臨其次雙鈎本須精意摹榻乃不失位置之美耳臨書易進摹書易忘經意與不經意也夫臨摹之際毫髮失真則神情頻異所貴詳謹又云字書專以風神超邁為主刻之金石其可茍乎摹字之法須墨暈不出字外或填其內或朱其背正得肥瘦之本體雖然猶貴于瘦徑使工刻之又從而刮治之則瘦者亦肥矣雙鈎時須倒置之使無容私意于其間誠使下本明上𥿄薄倒鈎何害若下本晦上𥿄薄却須能書者為之發其筆意可也夫鋒芒者蓋字之精神大抵雙鈎多失又須朱其背時稍致意焉丹墨右軍云𥿄剛用軟筆𥿄柔用硬筆純剛如錐畫石純柔如泥洗泥既不圓暢神格亡矣書石同𥿄剛例蓋其相得也又云用筆著墨不過三分不得深浸毛弱無力墨用松節同研久彌佳矣米元章畫史云古書畫皆圓蓋有助于器唐皆鳯池研中心如瓦凹故曰研瓦一援筆因凹勢巳圓書畫安得不圜今研如心平如砥一援筆則𥚹故字亦𥚹又近有𨫼心凸研援筆即三角安得圜哉薑堯章云欲刻者不失真未有若書丹者然筆浮墨則瘦得朱則肥故書丹先以瘦為竒而圓熟美潤常有餘燥徑古老常不足朱使然也又云作楷欲乾然不可太燥行草則燥潤相雜潤以取妍燥以求險墨濃則筆滯墨燥則筆枯筆欲鋒長徑而圓則含墨可以運動徑則有力圓則妍美蓋𥿄筆墨皆書法之一助也法書考卷之七
