front:
  text: 法書攷卷之一
  hash: sha256:1dff15d54c7d32cddbb48d94d7aecca213bbfc81b82766e6deb570f4afe40a43
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_001-1a}
body:
  text: 元盛熈明著書譜夫學書之要在於師古然去古既逺名跡紛雜不可不詳擇也嘗攷歴代之善書者多矣其聲譽著於時書翰傳於後者皆可歴數至於謬當虗名庸亦有之其餘泯滅無聞者固巳何限况乎好利售竒傳搨亂真自非精鍳鮮能去取也故首著書譜纂集諸家之評論研䆒書刻之精粗以備采摭云集評國家以神武定天下世祖皇帝大興文治至於仁廟典章具備自是列聖萬㡬之暇多能俯事於藝文欽惟皇上生知之聖日新之功非臣管見所能測焉我朝能書之士常不乏人然世俗率多貴耳賤目罕能定其優劣千載之下自有辯者今集倉頡以降自秦迄唐凡若干人會萃諸家之評論成上中下三品焉張懷瓘云先其天性後其習學且以風神骨氣為上妍羙功用者居下上品中品下品倉頡張懷瓘云古文神品史籕張懷瓘云古文妙品李斯字通古上蔡人張云小篆神品大篆妙品李嗣真云小篆之精古今絶妙秦望山及皇帝璽猶千鈞強弩萬石洪鐘豈徒學者宗匠亦是傳國遺寶唐人評云骨氣豐匀方圓絶妙趙高張云大篆妙品程邈李云篆上品首創模範煥於丹青王次仲始作楷法詳見字源嚴延年張云大篆能品工籕書陳遵孟公漢人善隸書與人尺牘主皆蔵之以為榮許慎張云小篆能品史㳺漢黄門令史創章草班固張云大小篆能品杜操漢相或云始變藁法羅暉叔景庾云中下品張云章草能品劉穆後漢北海敬王善草書體甚濃結字工巧張芝學焉杜度伯度韋誕云傑有骨力而結字小踈字畫微瘦庾肩吾云上中品張云章草神品章帝使草書上事劉徳昇君嗣始造行書庾云中上品王僧䖍云鍾胡所師張云行草妙品崔瑗子玉庾云擅名北中迹罕南渡世有得摹者王子敬見之稱以為羙功類伯英上中品張云章草第一神品小篆妙品李云上上品篆效李斯點畫皆如鐵石王云筆勢甚快而結字小踈袁昻云如危峰阻日孤松一枝有絶望之意崔寔瑗之子曹喜扶風人衛恒曰篆法少異扵李斯而亦稱善袁云如經論道士言不可絶張云小篆隸俱妙品嘗見李斯筆法悲嘆不已作筆論一卷邯鄲淳衛恒曰得次仲法善隷書小書師曺喜篆韋誕師淳不及也袁云應規入矩方圓乃成張云古文大小篆分隷書俱妙品師宜官衞云善隸書靈帝時為最大則一字徑丈小則方寸千言或時不持錢徃酒家因書其壁雇觀者以酬酒錢足而㓕之每書輒削其柎而焚之梁鴻乃益為板而飲之酒候其醉而窃其柎庾云鴻都為最能大能小上中品王云致酒蕳多梁武云如鵬羽未息舉翮而自逰張云分妙品衛弘張云古文妙品蔡邕伯喈篆采斯喜之法為古今雜形然精密簡理不如淳也張云八分飛白俱神品大小篆隸妙品李云上中品惟范巨卿碑風神麗艷古今絶冠梁武云骨氣洞逹爽爽如有神力張芝伯英少好筆札臨池學書池水盡墨自謂上比崔杜不足下方羅趙有餘見蔡邕筆勢論遂作筆心論五篇衛云弘農張伯英下筆必為楷則號匆匆不暇草書寸紙不見遺至今寳其書張云草第一章草第二行草第三俱神品隸妙品庾云衣帛先書稱為草聖鍾繇元常許昌人師胡昭十六年不窺戸見昭筆心論驚嘆無已作筆骨論又云盗發韋誕塚得蔡邕筆法晝夜不輒睡則以手畫𬒳𬒳為之穿庾云天然第一妙盡許昌之碑窮極鄴下之牘為上上品張云真毛弘張云八分能品衛恒云弘乃梁鵠子弟教於秘書今第一行第三俱神品八分草妙品王云謂之盡妙鍾八分皆弘之所立法也有三體一曰銘石書最妙者也二曰章程書教小學者也三曰行狎書行書是也三法皆世人所善李云正體猶郊廟既陳爼豆斯在又比寒澗閎􅊤秋山嵳峩梁武云雲鵠逰天羣鳧戲海行間茂密實亦難過鍾會士季庾云上下品張云真第五章草第六草第七并行四體俱妙品李云上中品小鍾有正書洛神賦梁武云有十二意意外巧妙絶倫多竒皇象休明庾云胡肥鍾瘦休明斟酌二家驅駕八絶上下品張云章草第八神品小篆能品袁云如歌聲繞梁琴人拾徽梁鵠伯鸞以書至選部尚書魏武帝懸鵠書著帳中以為聖勝庾云上下品張云八分妙品李云上中品衛云衛覬伯儒庾云中中品張云古文隷草章能品王云體如隸書用筆盡其勢矣梁武云如太祖忘寢觀之䘮目傷瘦而筆精殺迹衛瓘伯玉㓜為魏尚書郎與索靖俱善書時謂一臺二妙衛恒巨山瓘之子庾云中中品張云古文章草妙品隸能庾云上下品張云行第五并小篆隷書俱妙品古文品李云中上品梁武云如挿花羙女舞笑鏡臺大篆能品章第四神品王云衛覬子也為晉司空採司馬攸晉武帝弟也王云京師以為楷式張云行草能品張芝草法取父書参之更為草藁子巨山亦善書故云伯玉得筋巨山得骨索靖㓜安庾云上下品衛云瓘有楷法然逺不及靖又云陸機士衡庾云中下品李云中上品蚌質珠胎金河銀礫何曾張云草能品靖得伯英肉黨作草書状張云章草第三神品八分王曰吴士也無以較其多少芉祜叔子庾云下上品并草妙品趣向遒勁無媿珪璋梁武帝云如飄風忽劉輿慶孫庾云中下品晉元帝睿景文庾云下上品舉鷙鳥乍飛王云靖張芝姊之孫也傳張芝之草庾亮元規庾云中下品王云亦入能録而形異其字畫之勢曰銀鈎蠆尾庾翼稚恭庾云中上品張云隸草章能品李云上下品王張華張云章草妙品云征西翼書少時與逸少齊名右軍後進庾猶不憤嵇康叔夜張云草第二妙品叔夜身長七尺六寸羙聲音在巳上在荆州與都下書云小児輩乃賤家鷄重野偉容色雖土木形體而龍章鳯姿天質自然加以孝鶩學逸少書湏吾還當比之友温恭常草書絶交書一紙唐評如抱琴半醉詠物緩行又若孤鶴歸林羣鳥乍散謝安安石庾云上品張云行第九隸草妙品李云上中品王敦處仲張云草第四縱任自然螭盤虎踞王云亦能入流殊亦自重常為王導茂弘庾云中下品張去真第七行第八并書能品王王恬敬豫張云隸能品子敬書嵇中散詩得子猷書有時裂作紙校云甚有楷法以師鍾衛好惡無厭䘮亂狼狽以鍾王洽敬和衛夫人茂猗庾云中上品張云隸妙品李云上下品唐評如繇尚書宣示帖衣帯過江後右軍得之子恬洽薈亦王薈敬文挿花羙女低昻有容乂如羙女登臺仙娥弄影紅蓮能書王脩敬仁庾云中中品張云隸行俱能品暎水碧落浮霞王珣元琳洽之子珉之兄王廙世将庾云中中品張云真第三草第五俱能品飛白妙品李云上下品王云王是右軍叔自過江來右軍之前惟廙為最畫為晉明帝師書為右軍法王羲之逸少曠之子琅琊臨沂人㓜學書及年十三見前代㕁氏羲之妻甚工書有七子筆論於父枕中竊而讀之學功日進衛夫人一見語徽之子猷太常王榮曰此子必見用筆訣也必䔩吾書名晉成玄之帝祀北郊更祝版工人削之羲之墨入木七分𥘉學凝之衛夫人書過江見古碑嘆學衛夫人徒費年月張云操之皆羲之子並工草隸筆跡遒潤獨擅一家之羙天質自然風神盖代且其謝道藴凝之妻也有才華善書李云中下品雍容和雅芬馥王濛仲祖張云草能品李云下中品王云上可比庾廙道微而味薄固常人莫之能學其理隱而意深固天可玩張敞張云古文能品下寡於知音真第一行第二章第五草第八及飛白㕁愔方回庾云中上品張云章草妙品草隷能品李云上張澄王云當時亦呼有意俱神品八分妙品庾云工夫不及張天然過之天然下品梁武云意趣甚熟而取妙特難故蕭散風氣王裒偉元李云下上品張云能品梁武云意深工淺猶未不及鍾工夫過之允為上上品李云逸品如隂陽四一無雅素王云章草亞於右軍當妙時寒暑調暢巖廊宏敞簮𥚑肅其聲鳴也則鏗㕁超景與又云嘉賓庾云中下品王云草亞二王緊媚過張綋張云小篆能品飛白妙品鏘金石其芬郁也則氤氲蘭麝其難徴也則縹緲而其父骨力不及也李云中上品若仙其可觀也則昭彰而在目可謂真書之聖也若桓玄敬道庾云中上品李云中中品如驚蛇入草銛鋒出范曄蔚宗庾云上下品張云小篆草能品李云下中品如草行雜體如清風出䄂明月入懷瑜瑾爛而五色黼匣王云玄自比右軍議者未之許可比孔琳之寒雋之士亦不可棄王云與蕭思話同師羊欣後叛黻摛其五采故使離朱䘮明子期失聼可謂草之聖杜預元凱庾云中中品張云章草能品李云中下品背失故歩也其飛白猶縠卷舒煙霞炤灼長劍耿介而倚夭勁李式景則庾云中上品張云隸草能品李云上下品縱邁蕭思話庾云下上品張云行草能品李云下中品如遁世之矢超忽而堕地可謂飛白之聖也又如松巖點黛蓊過羊欣可比庾翼夫時或堪采王云全法羊欣風流趣好殆當不减而欝而起朝雲飛泉潄玉灑落而成暮雨既離方以遁張翼君祖庾云中下品李云中上品王云右軍自書表晉獨筆力恨弱圓亦非絲而異帛唐評如壯士㧞劒壅水絶流頭上穆帝令翼冩題後答右軍右軍當時不别乆乃方覺謝眺玄暉庾云中下品張云草能品李云創得今韻下下安點如高峯之墜石作一横畫如千里陣雲撩一偃云小子幾欲亂真品波如風雷震駭作一𥪡如萬歳枯藤立一倚竿如虎羊欣敬元庾云隨子敬妙得其體中上品張云隷行草謝靜卧鳳閣自上掲竿如龍躣天門梁武云字勢雄逸如妙品李云上下品梁武云如婢作夫人雖知過位舉謝敷王云並善冩經亦能境龍跳天門虎卧鳳閣故歴代寳之永以為訓王云古人止羞澁終不似真王云受訣於子敬書見重於一時姜詡之迹計無以過行草猶善正乃不稱梁宣右庾云上下王獻之子敬逸少第七子子敬最知名七八歲學書逸少密薄紹之敬和庾云下上品張云隸行草俱妙品梁武云如㳺韋秀從後掣筆不得曰此子當有大名嘗書壁為方丈龍在霄繾綣可愛鍾輿大字逸少甚以為能𥘉學父書頃習於張後改變制孔琳之彦琳庾云中上品張云隸行草俱妙唐評放縱快徤向㤗度别創其法率爾師心冥合天矩雄武神蹤靈姿秀筆勢流利二王以後難與比肩但功虧少故當劣於芉出若臧武仲之智卞荘子之勇大鵬搏風長鯨噴沫羊欣王云天然縱逸極有筆力規矩但工夫少自在識道人懸崖墜石驚電遺光張云子敬行草之外更開一門張超子並庾云子並崔家州里頗相倣效可謂氷寒於水庾黔婁非草非真離方遁圓兼真者謂之真行帶草者謂之中上品張云章草能品梁評如高麗人抗浪乃不宋炳行草子敬之法非草非行流便於行草之間逸少秉有意氣而姿媚自足精神李云中下品如郢中少費元瑶真行之要子敬執行草之權父之靈和子之神駿古年乍入京輦縱有才辨盖亦可知孫奉伯今獨絶也真第四行第二章草第一草第三并飛白殷鈞庾云頗耽著愛好終得肩隨中上品陽經俱神品八分能品庾云上中品梁武云絶衆超羣謝靈運庾云下上品張云隸草妙品李云中下品王云昔子諸葛融以上庾云下下品無人可擬如河朔少年皆悉充恱舉體㳫拖而不敬上表多於中書雜事中皆自書竊易真本相與可耐李云子敬草書逸氣過父如丹穴鳯舞清泉龍不疑永嘉𥘉方就索還上謝太傅殊禮表亦是其例躍焂忽變化莫知所成或蹴海移山或翻波簸嶽而謝綜王云書法緊絜羊欣惮之書法有力恨少媚好正書行書如田野學士越参朝列非不稽古憲章乃陶弘景通明隱君庾云中下品李云中中品得書之筋髓如時失體處舊説稱其轉妍鍳疎矣麗景霜空鷹隼𥘉擊梁武云如吴興小児形狀雖王珉季琰洽之少子也名出珣右時云法䕶非不隹僧彌未長成而骨氣峭甚難為兄法䕶小字也有四匹素自朝操筆至暮書竟首尾如一又無誤字子敬戲云弟書如騎驢駸駸恒欲渡驊騮前嘗代獻之為大令珉為小令庾云中朱齡石上品張云行第六并隷妙品王云筆力過於子敬郭伯道庾云俯門朝廷逺封其跡庾景休荀輿長胤庾云上下品張云隸草俱妙品王云長狸骨李鎮東梁武云如芙蓉出水文彩鏤金禇元明右軍以為絶倫左伯子邑庾云分鑣梁邯中中品孔敬通阮妍文機庾云窮古觀今盡窺衆妙之門雖師王祖鍾終張彭祖庾云中中品張云隸能品王籍文海庾云以上皆中品别搆一體上下品張云其隸行草妙品李云中任靖庾云中中品衛宣中品梁武云如貴胄失品不能排斤英賢韋昶庾云中中品文體題柱張云古文大篆能品李韞張永庾云中中品陳基范懷約梁武云真書有力而草行無功庾云中下品張范傅庭堅俱東南之羙張紹吴休尚庾云中中品梁武云如新亭傖父一徃似掦州共語隂光語便態生韋熊施方㤗庾云施吾鄴下同年抜萃中中品張暢康昕庾云中下品張云中中品巧密精勤有翰飛鶯弄曹任之體王云學右軍書亦欲亂真嘗與南州識道人宋嘉作右軍書賛裴邈王崇素庾云中下品李云下中品羊固張昭傅夫人朱誕辟閭訓徐希秀謝晦劉繪庾云以皆中下品孔閭王知敬張云行草能品李云中中品碎玉殘金雲間孤鶴顔寳光丘道護王云授訣於子敬殊在羊欣前李云謬當高品迹周仁皓乃浮華中中品張欣㤗許文静張云真第七李云中中品張熾宋文帝劉義隆庾云中下品張云隸行草妙品李云有僧岳道人子敬風骨超縱狼籍翕煥為羙中下品唐評如葉法高道人右數人庾評云五味一和五色一采視裏紅花雲間白日王云帝自謂不减羊欣時議謂其雕文非特刻鵠人人下筆寜止追響遺跡見珍天然勝羊欣工夫不及也餘芳可折誠乃驅馳並駕不遠前鋒而中權後殿各王僧􅐚庾云雄發齊代中上品梁評猶如王謝家子弟縱復其羙允為下下品不端正奕奕皆有一種風氣宋文帝問曰朕書與卿徐幹書孰優僧䖍曰帝書帝中第一臣書臣中第一徐令文張云草能品上笑曰卿可謂善自謀矣王愔張云草能品蕭子雲張云隸飛白妙品小篆能品章行俱能品梁評如顔倩梁武云如貧家果實無妨可愛少乏珍羞危峰阻日孤樹一枝荆軻負劍壮士彎弓獵人王彬之梁評放縱快利筆道流便射虎心胸猛列鋒刃難當唐評如上林春花逺栁惲梁評縱横廊落大意不凡而徳體未備近瞻望無處不發徐淮南梁評如南崗士夫徒尚風軌而不免寒乞智永隷草章俱妙品行能品李云精熟過人惜無衛態中張斯梁云如辨士對敡獨語不回得心理會中品王逸少之七代孫妙傳家法住吴興永欣寺積齊高帝庾云下上品李云中下品張云行草能品字退筆頭置大竹簏受一石餘而五簏皆滿广之號筆紹伯塜求書者如市所居户限為之穿穴乃用鐵葉褁之劉珉李云頽波赴􅊤狂澗争流人謂之鐡門限蕭特梁評雖有家風而風流勢薄猶如羲獻安得相似庾肩吾張云隸草能品李云下上品梁評畏懼收歛少得自充効未能精去蕭蔡逺矣袁崧李云下上品梁評如深山道士見人便欲退縮梁武帝張云草能品李云下下品梁簡文帝李云下中品梁元帝陳文帝禇淵沈君理張正見李云右數君亦稱筆札多類效顰猶枯林之青一枝衆石之孤生片琰為下下品於中彦回輕快練倩有力孝先風流君理方逹智果張云隸行草章能品蕭綸李云下下品唐太宗李世民好羲之書師虞世南嘗患戈脚不工偶書斛斯彦明李云筆勢咸有由來下上品戬字遂空其落戈令世南足之以示魏徴徴曰戬字房彦謙戈脚逼真世南後極善飛白置弘文館延學書張大隱李云房司隸張益州參小令之體下上士品漢王元昌張云行能品李云中上品與太宗禇遂良殷令名李云下上品擅名題柱受訣於史陵藺静文李云下上品正真甚為鮮㓗殊有軌則虞世南伯施餘姚人從智果而得書法常著筆髓論張云隸錢毅李云下上品小篆飛白寛博敏麗太宗貴之行草妙品李云上下品蕭散灑落真草惟命如羅劉逖綺嬌春鵷鴻戯沼唐評體叚遒媚舉止不凡能中更王晏能妙中更妙周顒歐陽詢信本臨湘人學羲之書後險勁瘦硬自成一家議者虞綽李云劉黄門落花從風王中玉竒石當逕彦倫意以為真行有獻之法自羊欣薄紹之後無與比者獨則甚高迹少俊鋭虞綽鋒穎迅健並為下中品智永持兵精練欲與相攻而詢猛智永亦復避魏徴玄成庾云下上品鋒詢嘗見索靖所書碑𥘉唾之而去後復觀始悟其徐浩季海唐評固多精熟無有異趣黄魯直云唐自妙卧其下三日晚年筆力尤剛勁張云隷行飛白草虞禇後能備八法徐會稽與大師耳然會稽多肉太皆妙品大小篆章能品李云上下品如旱蛟得水饞兔師多骨又云徃時觀怒猊抉石渴驥奔泉之論茫走穴筆勢恨少於鐫勒及飛白諸勢如武庫矛戈雄然不知何語乃於季海書中見之劎森森唐評如金剛暝目力士揮拳宋陳景元謂世房玄齡李云雕文抱質又云海上䨇鳬皆知其體方而莫知其筆圎陸柬之其如馬之齊髦人不櫛沐張云隷行妙品章草書禇遂良登善張云隷行俱妙品李云上下品臨冩右軍亦為能品學虞草體用筆則青出於藍唐評彷彿可高足豊艷高刻盛為當今所尚但恨乏自然精勤觀依稀堪擬意耳唐評字裏金生行間玉潤法則温雅羙麗鄔肜唐評寒鴉棲林平岡走兎多方盧蔵用張云行隷草能品唐評露潤妍花煙凝脩竹薛稷張云能品唐云多攻禇體意亦新竒又云風驚苑花裵行險張云行隸草能品雪壓山柏王承烈張云隷草行能品張從申唐評逺近稱善獨歩江外高正臣張云隸草行能品李陽氷少温又名潮嘗作筆法論謂天地山川得其方圓流峙傅玄張云隸能品之形於日月星辰得其經緯昭回之度近處諸身逺楊肇張隷草能品取萬物幽至於鬼神之情狀細至於喜怒舒惨莫不釋崇簡唐評臨冩逸少時有亂真畢載唐評若古釵倚物力有萬夫李斯之後一人而巳蔡隱丘以下古質放意自成一家張旭唐評立性顛逸超越古今韓擇木龜開萍葉鳥散芳洲顔真卿清臣唐評鋒絶劒摧驚飛逸勢陸羽曰徐吏梁升卿驚波徃來巨石前却部不受右軍筆法而書體裁似右軍顔太保受右張庭珪古木崩沙閒花映竹軍筆法而點畫不似盖徐得右軍皮膺眼鼻所史惟則鴈足印沙深淵魚躍右四人皆善八分以似之顔得右軍筋骨心肺所以不似也孫過庭隷行草能品丹崖絶􅊤筆勢堅勁釋懷素唐評援筆掣電隨手萬變酒酣興發遇墻壁張懷瓘繼以章草生意頗多衣服器皿靡不書之貧無𥿄種芭蕉萬餘株以供揮史麟逸氣雄鎮超然不羣洒書不足乃􅃮一盤書之書至再三盤板皆穿素伯梁耿錯落魚文縱横鳥迹祖恵融善學歐陽詢書世莫能辨至是鄉中呼為張芬孤松聳身弱草垂露大錢師為小錢嘗受法於金吾兵曹錢唐鄔形房廣婉羙芬靄春鶯欲嬌李邕㤗和江都人唐評華嶽三峯黄河九曲邕𥘉學變右沈益春鷺窺魚秋蛇赴穴軍行法相伏挫起既得其妙復乃擺脱舊習筆力一張彪孤峰削出蔵筋露節新李陽氷謂之書中仙手文翰俱重於時當時奉金陸曽驚波魚躍深水龍潛帛求書前後所受鉅萬計自古未有如此之盛也桓夫人如快馬入陣屈伸隨人栁公權誠懸穆宗嘗問筆法何以盡善對曰在心正心正則傅玉項羽抜戈荆軻持㦸筆正上改容知其以筆諌也公權初學王書徧閲近王紹宗筆下流利快徤難方熟看轉増羙妙代筆法勁媚自成一家當時公卿家刻不得公權書程廣鴻鵠㺯翅翺翔頡頏以為不孝外夷入貢皆購求栁書上都西明寺金剛張越蓮花出水明月開天霧散金峰雲低玉嶺經碑尤為得意蕭誠舞鶴交影騰猿在空韋陟蟲穿古木鳥踏花枝暮春花發春柳枝低沈千運饑鷹殺心忍疲筋骨關操淵月沉珠露花濯錦鄭䖍家貧於青龍寺拾柿葉學書評云如風送雲收霞催月上李璆垂藤著地枯木如折吴郁字體綿密不謝當時頼文雅騰沙欝霧翻浪掦鷗賀知章縱筆如飛酌而不竭何昌裔子敬餘波時時可玩宋之問天性卓絶而功未深李清變化自逸代有斯人玄悟骨氣無䨇迥出時軰湛然子雲之後難與比肩書學纂要云慶暦以來唯君謨持守法度眉山豫章一掃故常米薛二蔡大出新竒雖皆有所祖襲而古風蕩然南渡而後思陵大萃衆羙筋力過婉吴傳朋規倣孫過庭姿媚傷妍姜尭章逈脱脂粉一洗塵俗有如山人隠者難登廊廟右所集評皆據古人之論始於倉頡終扵唐人尚多遺逸博雅君子幸其葺正焉辯古石鼓十史籀書今在京文廟薛尚功法帖所載字完於真本鄭樵音不可信延陵君子碑在鎮江人謂孔子書文曰嗚呼有吴延陵君子之墓按古帖上云嗚呼君子而巳篆法敦古今此碑妄増延陵之墓四字除之字外三字是漢方篆不與前六字合借夫子以欺後人耳又音君作季漢器蜀郡字半邊正與此君字同法比千墓有漢篆亦此法詛楚文有巫咸大沈乆音故湫亞音洿駞三種辭則一乃後人偽作先秦文以先秦古器比較全不似秦山碑李斯書石皆剥落惟二世詔一靣僅存嶧山碑李斯書直長者真横倒者摹本有新刻尤謬秦望山碑李斯書在會稽今無張平子碑崔瑗篆多用隸法不合説文却可入印全是漢篆法故也許慎説文十五卷徐鉉校定本始一終亥者正分韻者非古意倉頡十五篇即説文目録五百四十字許氏分為每部之首人多不知謂乆已㓕此字之原豈得不在後世又併字目為十四卷以五十卷著序表人益不意其存矣新泉銘李陽氷書最佳碧落碑在絳州字雖多不合法然布置羙茂自有神氣當以唐碑觀之古三墳書乃偽書言詞俗謬字法非古尚書無也字此書有之必字合從八戈此從心加一筆走之合從辵音綽此隨俗作之字引脚其謬甚多古文尚書乃後人不知篆者以夏竦韻集成不合古古文孝經内一篇大謬後人妄欲作古以古文字集成觀者當取其字泉志間有泉文近於道者可以廣見聞有近作三皇幣及禹幣不可信卍此字人謂萬字乃出古錢不見此書終不知也六書攵戴衕以鍾鼎文編此書不知喜其字皆有古字今雜亂無法鍾鼎偏傍不能全有却以小篆足之或一字两法音睘加山為寰乃音為官村字不從寸木今乃從書此為村鎊鏟鋫鋸屎尿等字皆從俗作鍾鼎文各有詳証夘字所觧尤不雅編首以門類為次第古法掃地矣薛尚功欵識法帖二十卷碑在江州蜀有翻本字肥後多一虺鼎薛尚功重廣鍾鼎韻七卷在江州版内一卷象形竒字一卷器物召目五卷韻王楚鍾鼎韻两册衡州本字少所出在薛字前石經遺字韻碑會稽蓬萊閣翻本磨滅不異真古碑徐鍇通釋四十卷當與許氏本相参首尾分六書其詳末卷辨陽氷差誤張有復古篇戴古今異文字不可以為字少張有五聲韻譜五卷無誤夏竦古文四聲韻五卷前有序并全銜者佳别有僧翻本字多無據且不與欵識合不可用高氏五書韻總五卷篆隸真行草五體俱備可助𥘉學間有差處林罕偏傍小説三卷言隷與篆相通亦自可採但有數説與説文悖却係陽氷變法是字上從目巴字從已加點之類續千文葛剛正雖近人然字法極好有两續本不可無别有偽本不佳漢隸字源六卷字法最好洪氏本有碑目在前隸韻二删閩中刻本字體不佳碑文隷韻十卷劉球編外一卷紀源隸釋二十七卷并隸續十卷通作一部皆漢碑釋文隸續畫諸碑形及墓壁畫像其碑多圭角盛笏首上有垂虹盛題處偏壁畫則如象形渾黒佐書韻姑蘇顔氏本字多而無法嘯堂集古録一百𥿄王俅集也中有古印文數十其一曰夏禹係漢巫厭水災法印世傳度水佩禹字此印乃漢篆所以知之又一印曰孔夫誤音作孫兹二字又有滕公墓銘欝欝作两字書且妄為剥落状然攷之古法疊字只作作小書附其下卷時大夫猶以夫字加二小畫况此疊文乎偽無疑矣右古文篆隷力命尅揵宣示帖鍾繇樂毅畫讃黄庭霜寒王羲之洛神賦王羲之曹娥遺教羊叔子碑六朝瘞鶴舊館壇陶弘景千字文智永書梁武帝得羲之千字令周興嗣次之自爾書家每以是為程課智永嘗冩八百本謂以千字經心則手自應手和心得可與入道孔子廟虞世南醴泉化度虞􅚿公皇甫碑歐陽詢哀册聖教禇遂良郎官張旭麻姑壇放生池中興頌顔真卿陀羅尼栁公權右真書丙舍吴人羸頓雪寒長風鍾繇蘭亭極寒毒熱慈䕃官奴晚雪來禽奉橘快雪羲之地黄歲終衛軍阿姨鵞羣歲盡夏日奉對思戀天寳吴興山隂黄門東家轉勝相過鵞還觸事夏節恨深黄耆礐石絡繹月内尊體獻之八月五日謝安枯樹賦星霜禇遂良嶽麓娑羅樹雲麾東林寺李邕玄静先生碑張從申右行書十七帖羲之千文張旭自叙千字懐素右草書以上並舉其要必所當䆒者若欲名家尤以博覧為貴也絳帖評姜尭章作審訂深妙禊帖偏傍攷尭章作法帖譜系翰墨志
