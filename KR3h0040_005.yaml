body:
  text: 肥瘠韋誕云多力豐筋者聖無力無筋者病衛夫人曰善筆力者多骨不善筆力者多肉多骨微肉者謂之筋書微骨多病者謂之墨猪梁武帝云純骨無媚純肉無力少墨浮澀多墨莾鈍此皆自然之理也皆抑掦得所趣舍自違值筆亷斷觸勢峰鬱掦波折節中規合矩分間下注濃纎著力肥瘦相和骨力相稱婉婉娩娩視之不足稜稜凛凛常有生氣適眼合心便為甲科訣曰書以骨氣為體以主其內以肉色為用以彰其外氣宜清色宜溫骨宜豐肉宜潤不失其所虞世南云側管則鈍慢而多肉直鋒則乾枯而露骨終其悟也粗而不鈍細而能壯長而不為有餘短而不為不足歐陽詢云不可瘦瘦則形枯復不可肥肥則質濁張懷瓘云夫馬筋多肉少為上而肉多筋少為下書亦如之皆欲骨肉相稱神貌恰然若筋骨不任其脂肉在馬為駑胎在人為肉疾在書為墨猪凖其病狀未即已也惟題署及八分則肥密可也自此之外皆宜蕭散恣其運動徐浩云宜先立筋骨筋骨不立肉何所附用筆特須藏鋒不然字則有病夫鷹隼乏彩而翰飛戾天骨徑而氣猛也翬翟備色而翺翔于百步肉豐而力沉也若華藻而高翔書之鳯皇矣歐虞為鷹隼陸禇為翬翟焉黃魯直云作字須茟中有畫肥不露肉瘦不露骨政如詩句中有句亦猶禪家句中有眼須參透乃悟耳姜堯章云用筆不欲太肥太肥則形濁又不欲太瘦太瘦則形枯多露鋒芒則意不持重深藏圭角則體不精神然其太肥不若瘦硬也法書考卷之五
