seq: 5
front:
  text: 下左右畫之大小多少取其停均審其疏密以下承上以右應左以大包小以少附多多以少為體少以多為用空則𥙷就孤則扶持剛縱其柔柔縱其剛自然可觀蔡雍云勢來不可止勢去不可遏惟筆軟則竒怪生焉凡落筆結字上皆覆下下皆承上使其形勢遞相映帶無使勢背右軍云夫欲書先凝神靜想字形大小偃仰平直振動令筋骨相連意在筆前然後作字又云夫書字四方南高北下東闢西闔為形上平下端左輕右重為勢凡字處其中畫之法皆不冝倒其左右相顧右宜粗於左畔橫貴乎纎豎貴乎粗分間布白逺近冝均上下得所自然平穩腹不宜促短也腳不宜賖長也又不宜斜重不宜長單不宜小復不宜太傷密則似痾瘵纏身不舒展也傷疏則似溺水之禽慢也陶隱居云近左虗右分間不同視之不足學之難工智果成心頌回展左肩頭項長者向又展宣一尚字等是也長舒左足有腳者向左傍舒實其等是也峻拔一角字方者擡右角國用周字是也潛虗半腹畫稍粗於左亦要逺近均勻遽相覆蓋令左實右虗用見罔月字是也隔仰隔覆並字是隔二薑字是隔三仰覆用之間開間合無字等四點四畫為綜上閈則下合之回互留放謂字有磔掠重者爻字上住下放茶字上放下住不可並放變換垂縮并字右縮左垂斤右垂左縮上下亦然繁則减除王書懸字虞書字張盡盛字改血為皿疏則𥙷續字加點􅉝字加畫之類分若仰背為綜也州册之類皆須自立向背合如並目八字州字皆須潛相矚視孤單必太一點一畫成其獨立也重並乃促謂昌吕爻棗等字之上小林棘羽字左促以側附邪為邪點為側交缺以人等是也如邪附曲謂為曲女晏必在等是也覃精一字功歸自得盈虗向背仰覆縮垂回互不失也統視連行妙在相承起伏梁武帝觀鍾繇書十二意顔真卿張旭問答夫平為橫子知之乎真卿曰長史每令作一畫皆縱橫有象其此之謂乎曰然夫直為縱子知之乎曰豈不謂直者必縱之不令邪曲之謂乎曰然夫均為間子知之乎曰嘗䝉示以間不容光之謂乎曰然密謂際子知之乎曰豈不謂築鋒下筆皆令宛成不令其疏之謂乎曰然鋒謂末子知之乎曰豈不謂末以成畫使其鋒健之謂乎曰然力為骨體子知之乎曰豈不謂躍筆則點畫皆有筋骨字體自然雄媚乎曰然輕為曲折子知之乎曰豈不謂鈎筆轉角折鋒輕過亦謂暗過角之謂乎曰然决謂牽掣子歐陽詢云每秉筆必在圓正氣力縱橫重輕凝神靜慮當審字勢四靣停勻八邊俱偹短長合度粗細折中心眼凖程疏密欹正筋骨精神隨其大小不可頭輕尾重無令左短右長斜正如人上稱下載張懷瓘十法偃仰向背謂兩字并為一字須求點畫上下偃仰離合之勢隂陽相應謂隂為內陽為外斂心為隂展筆為陽右右亦然鱗羽參差謂點畫編次無使齊平如鱗羽之狀峰巒起伏謂起筆蹙衄如峰巒之狀殺筆筆須存結真草偏枯謂兩字或三字不得真草合成一字謂之偏枯須求映帶邪正失則謂落筆結字分付點畫之法須依位次遲澀飛動謂勒磔皆須飛動無凝滯之勢射空玲瓏謂煙盛識行草字用筆不依先後尺寸規度謂不可長有餘而短不足須引筆至盡處則字有凝重之態隨字轉變謂蘭亭年字一筆作懸針嵗字即變垂露其間字各有體姜堯章云疏欲風神密欲老蒼如佳之四橫川之三直魚之四點畫之九畫必須下筆徑净疏密得勻乃佳當疏不疏反成寒乞當密不密必至凋疏且字之長短小大斜正疏密天然不齊孰能一之晉魏書法之高良由各盡字之真態不以私意參之耳向背者如人之顧盻指畫相揖相背發于左者應于右起于上者伏于下大要點畫之間施設各有情理求之古人右軍蓋為獨步蔡希綜云每字皆須骨力雄強奕奕有飛動之勢屈折之狀如鋼鐡為鈎牽掣之蹤若徑針直下主客勝負皆須姑息先作者主也後為者客也既搆筋力然後裝束必須舉止合則起伏相承
