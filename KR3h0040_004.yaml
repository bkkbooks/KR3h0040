front:
  text: 法書考卷之四
  hash: sha256:4b3b8095a456b604c12f68fbcca7367065c5c59a59721019027cb6ab95565d63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_004-1a}
body:
  text: 元盛熙明著圓訣每觀古人遺墨存世點畫精妙振動若生蓋其用功有自來矣世傳衛夫人之筆陳圖王逸少之永字八法猶可考也舍此而欲求全美于成體之後固亦難矣今採八法并偏傍之訣列為圖于左八法翰林禁經云八法起于隸字之始自崔張鍾王傳授所用該于萬字墨道之最不可不明也隋智永發其論曰勒者躍筆而行承其虗畫取其徑澀則功成矣今止言畫者慮在不躍一出便畫則鋒拳而怯薄也夫勒者藉于豎躍豎躍則筆徑澀亡其流滑微可稱工矣訣云䇿筆須勒仰筆覆收又云用中指鈎筆澀進覆筆以中指頓筆然後以大指遣至盡處丨弩過直而力敗如萬歲枯藤問曰中心豎畫謂之弩何也論曰勢微弩曰弩在乎躍筆下行若直其畫則形圓勢質書之病也訣云鋒須先發管逐勢行緊收澀進如錐畫沙又曰弩彎環而勢曲如深林之喬木丨躍冝蹲而勢生峻快以如飛問曰凡字之出鋒謂其筆或藏鋒或出鋒由心所好也須飛動無凝滯又云波法微直曰磔橫過曰波作一波當三過折筆仰而後曵不冝遲又云抽筆法在罨掠須峻利右潛躍而戰行持勢卷而機駐揭摘而暗收若便拋之必流滑凡淺側起平發緊殺按波為抽筆從腹內起又謂平磔法不遲不疾戰筆側去勢卷不可便出須駐筆而後放如生蛇渡水庾肩吾云將放更駐唐太宗云為波必磔當三磔折而遣毫磔者不徐不疾而去欲復駐而去之筆訣云磔筆須飛動無凝滯草書以一拂代磔如桞葉擊石波者乀缺波也章草用之又八分更有隼尾波即鍾公泰山銘及魏文帝受禪碑中巳有此體薑堯章云乀者字之手足伸縮異處變化多端要知無翼鳥翅翩翩自得黃伯思云昔人運筆側掠弩躍皆有成規造微洞玄則出沒飛動神會意得然所謂成規者初未嘗失也偏傍孫過庭云一畫之間變起伏於鋒杪一點之內殊衄挫於毫芒精其點畫乃能成字勒法一偃蹲鋒自駐力到疾提力滿微捺力盡回鋒訣云用筆若錐畫沙橫畫放手盡力瘦硬方直沉著徑健無變為度縱畫硬如屈鐡一縱一橫可方可圓千形萬狀皆如一畫作畫成熟就瘦硬之鐡畫變溫和之玉畫又云橫畫似八分唐太宗云為畫必勒貴澀而遲薑白石云畫者字之體骨欲其堅正勻淨有起有止所貴長短合宜結束堅實士兩畫者上仰下偃三上潛鋒平勒中背筆仰䇿下緊躍覆收唐太宗三須解磔上平中仰下覆春生是也禁經云黃庭三關字用草法上衄側中䇿下奮筆橫飛凡橫畫多用此法隔仰隔覆見智果頌鄉背法鄉筆宜和􅕶背筆冝峻垂縮法丨頻筆又云垂露欲垂而復縮丨自王右軍始筆欲正自上而下如長針垂丨偏拂自張長史始張敬玄云申字中畫宜卓筆疾抽唐太宗云為豎必弩貴戰而雄點法八點之變無窮皆帶側勢蹲之首尾相顧自成三過筆有偃仰向背等勢著點皆磊磊落落如大石之當衢或如蹲鴟或如科斗或如爪瓣或如栗子或蹲若鶚口尖如鼠矢如斯之類各稟其儀薑堯章云點者字之眉目全賴顧盻精神有向有背隨字異形散水法水互相顯異水潛相屬視水行書借勢訣云上􅗮側中偃下潛挫躍鋒或藏或露狀類不同意要遞相顯異若頻有則兩點相近而上點當高此名潛相屬視外雖解摘內相屬附為上中潛鋒暗衄下峻躍潛遣之此鍾法也行書勢微按以輕利為美冰訣云上側覆收下築而躍之須相承揖若並連衄側輕揭則率字左右用之烈火法古法火各自立勢聨飛火布碁俗訣云衄鋒暗接須各立勢抵背潛衄所謂視之不見考之彌彰聯飛者暗衄微駐輕揭潛躍筆鋒連綿相顧不絶禁經云聯飛如鴈陳當秋樂毅論燕然等字用之薑堯章云四點者一點起兩點帶一點應曾頭其腳對合貴從上開下合八相背貴從上合下開訣云左潛揭而右啄曾頭左啄右側其腳長舒左足謂有腳者向左舒寶其等字是也頁腳法頁上畫平勒頁斗折衮筆法令訣云須按鋒上下蹙衄之令今等字是也謂下一點烏字法馬焉字同切宜緊收右軍云字有緩急如烏字下手一點須急橫直即須遲欲烏之腳乃取形勢也宀頭法宀若􅢶宀各相顯異宀行法宀章草訣云上點駐鋒左右挫鋒橫畫按筆勢須相順又云上點側橫畫勒左􅝫筆擺鋒擡筆豎䇿謂􅝫右峻啄輕揭出虞永興常用之法以圓峻飛動為美薑堯章云宀頭須覆其下容寶等字上點須正畫須圓的不冝相著上長下短暗築法訣云馭鋒直衝有點連橫則名暗築月其字兩點是也𥪡􅝫法丨訣云擡筆𥪡䇿挫鋒上下𥪡直尚常等字中竪用川􅙍􅝫垂露懸針鄉背弩等法皆有之肥瘠以字分為稱長短隨偏傍所冝奮筆法小訣云左側而獨立中衄折而右鉤禁經法云鍾書宣示字用若中𥪡則左右潛暗衄而潛躍又簇鋒健進為系字三畫也戈法戈如百鈞之弩發論曰夫斫戈之法落筆峩峩如長松之倚溪谷似欲倒也筆訣云悉以中指遣至盡處以名指拒而躍之潛鋒暗勒勢盡然後躍之右軍背躍戈法上則俯而過下則曲而就蓋失之于前正之於後也智永禪師澀出戈法下以名指築上借勢以中指遣之至下以名指衄鋒潛躍此云秃出張旭折芒法潛鋒緊走意盡乃收章草法潛按微進輕揭暗躍夫揭欲利按欲輕輕則骨徑神清重則質滯鈍俗又有斫戈又戈飛戈唐太宗云為戈必潤貴遲凝而右顧張敬玄云戈腳宜斜筆直抽直者緣上實下自成也上實為藏鋒抽筆也背拋法乙蠆尾如壯士之屈臂乙外略訣云蹲鋒緊掠徐擲之連則失勢遲則緩怯又謂外擘法左峻掠中潛鋒衄挫右蹲鋒外擲右軍云腕腳幹上捺下撚鋒始折轉緩毫挫鋒即輕重有凖庾肩吾云欲拋還置為駐鋒而後躍之撇法背撇首圓蹲過作背懸針法左出鄉撇首側蹲右顧作鄉左筆尾懸針左出如手之前後撇物提鋒空中打下如步少之屬衫法彡上平中仰下偃上橫下從或反之唐太宗云彡乃形影字右邊不可一向為之須背下撇之人入等法人交爭勢訣云凡又人第一筆云攙引抑拽也人章草王𪷟云躍之欲利按之欲輕人立人如烏之在柱薑堯章云如立人由王依示一切偏傍皆須令狹長則右有餘地矣匚法匚上平傍向下平匸上仰傍背下平匸上飛平傍飛鄉下飛偃飛者空中飛筆謂緊提轉腕疾出也勾弩法􅗵勒弩躍訣云圓角躍鋒作弩法勢未盡而躍之右軍云作右邊折角疾牽下微開左略幹轉令取登對勿使腰中傷緩視筆取勢宜截而下轉為曲折鉤筆轉角折鋒􅠌過亦謂轉角為暗角唐太宗云為環必郁貴蹙鋒而急轉書勢論云急牽急引如雲中掣電日月因目是巳張敬玄云固字轉角之弩𥘉不冝稜角弩張即字體俗非特固字但有轉筆一切貴其圓潤蘭亭瘞鶴銘固字妙勾裹法􅗵偃勒鄉􅝫躍􅗵仰勒背􅝫躍訣云圓角激鋒待筋骨而成如武人之屈臂又如徑弩筋節右軍云回角不用峻及有稜顔真卿云用筆如𥿄行重復法戔上磔衄鋒下磔出之訣云上縮鋒作下出鋒作躍唐太宗云多字四撇一縮二少三亦縮四須出鋒丁字腳勢丁打宜疾不宜遲寺守亦宜疾挑不宜遲鳯字飛勢凡兩邊悉宜圓緊用筆之時左邊勢冝疾背筆時意中如電疾急也凡風等同挑勢乙右背􅝫左衄仰勒反躍貴抱腹而清口字勢嗚呼咽嚨等字口在左者冝上和扣如知等字口在右者冝下法書考卷之四
