front:
  text: 法書考卷之八
  hash: sha256:0c8170fd36b8f7b879911fe0c38a2917398fd1df16e9e83367cb445891239f0e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3h0040_SBCK_008-1a}
body:
  text: 元盛熙眀著附録印章印制周禮璽節鄭氏注云璽節者今之印章也許氏說文云印執政所持信也徐鍇曰從爪手爪以持信也衛弘曰秦以前民皆以金玉為印龍虎鈕惟其所好然則秦以來天子獨以印稱璽又獨以玉羣臣莫敢用也七雄之時臣下璽始稱曰印漢制漢侯王金璽之言信也古者印璽通名漢舊儀云諸侯王黃金璽槖駝鈕文曰璽謂刻曰某王之璽列侯黃金印龜鈕文曰某侯之章丞相與太尉三公前後左右將軍黃金印龜鈕文曰章中二千石銀印龜鈕文曰章千石六百石四百石至二百石以上皆銅印鼻鈕文曰印建武元年詔諸侯王金印綟綬公侯金印紫綬中二千石以上銀印青綬千石至四百石以下銅印墨綬及黃綬陳制金章或龜鈕貔鈕獸鈕豹鈕銀章或龜鈕熊鈕羆鈕羔鈕銀印或圭鈕兔鈕銅印率鐶鈕吾衍曰漢晉諸印皆大不踰寸惟異其鈕以别主守之上下諸侯王印以槖駝列侯以龜將軍以虎于蠻夷則蛇虺駝兔之屬亦周禮六節之義也其字皆白文常職印多瓦鈕令長印止作鼻鈕可綰而已其印文惟侯印就範中鑄字極精緻是擇日封拜非急遽為之也虗爵者填其文以金銀當時未有署僉以印為信故軍中印皆鑿官重者兩鑿成文官卑者或一鑿或字有疏密不一則密文細而疏文肥人名私印其文靣多鑿餘亦皆鑄率多龜或一印為一龜身首藏合謂之子母印間有三級壇鈕及天祿辟邪者或大小為兩靣晉印猶有漢印惟私印間用朱文字體與漢不異唐人用朱文故古法漸廢也印記唐太宗自書貞觀二字作二小印玄宗自書開元二字作一小印集賢印祕閣印翰林印各以判司所收掌圖書定印弘文之印恐是東觀舊印書者其至小元和之印恐是官印多印榻本書畫東晉僕射周顗印古小䳄字梁徐僧權印唐魏王恭印太平公主駙馬武延秀玉印胡書四字梵音云三藐母䭾今多墨䭾潤州刺史徐嶠印嶠之子吏部侍郎㑹稽郡公徐浩浩之子璹印議郎竇䝉印蒙弟范陽功曺竇臮印延王友竇永二小字印金部郎中劉繹印鄂州司馬張懷瓘弟盛王府司馬懷環印劒州司馬劉知章印光祿大夫中書令趙國公鍾紹京印張彥逺高祖中書令河東公印曾祖相國魏公印祖高平公二小印司徒汧國公李勉印子兵部員外郎李約印趙國公李吉甫印御史大夫黎幹印桂州觀察使蕭祐印晉公韓滉印鄴侯李泌印宣州長史周昉印張敬蕳印劒州刺史王朏印也後世不然印文榜額有三字者足成四字有五字者足成六字但取端正耳非字之本意也倉印銅印甚薄分其長而三之隆其中一假比印身倍厚于鈕色如碧玉鈕左一錢竅不透右按太倉令丞漢制主受郡國漕榖督攝萬幾通典云北齊有木印長一尺廣二寸五分背上為鼻鈕長九寸厚一寸廣七分腹下隱起篆文曰督攝萬幾惟以印籍縫今齪合縫條印蓋原于此南徐司馬之印銅印鈕桓溫常引袁高為南徐司馬即此是也印制與漢不類並晉物也乃楷書順字或謂古者官印皆佩于身既作楷書須順文讀之所貴一見易讀若是反字雖可印用但擾攘時印賜臣下貴順忌反非若篆文反順皆可讀也賈山銅印兩靣山于漢文時言治亂曰賈山至言邯鄲淳子叔銅印兩靣文曰子叔史云淳字子叔當以印為正劉勝私印銅印瓦鈕上作鈕中穿一小印鈕上見一珠下覆盆可轉不可出勝姓名見東漢杜密傳中金關封完銅印輪鈕兩靣上皆有文如漢鏡銘武琦六靣印內有印著臣字者王應先曰秦漢前人相語往往稱臣不必君前然後稱臣也王寀曰武琦六印如言事言疏等文自有序則稱臣者當君前其制度字畫纎巧不類秦漢疑六朝物右擇其制度之異者録之餘見各家印譜宣和印譜四卷楊克一圖書譜一卷又名集古印格張文潜之甥其父𥙷之王厚之復齊印譜字順伯臨川人顔叔夜古印譜二卷字景周吳人姜䕫集古印譜一卷字堯章番陽人自號白石生吾衍古印文一卷字子行泰和人精篆籀趙孟俯印文一卷字子昻吳興人善書印法秦有八體書三曰刻符書古所謂謬篆五曰摹印蕭子良以刻符摹印合為一體徐鍇謂符者以而中刻之字形半分理應别為一體摹印屈曲則秦璽文也子良誤合之李陽氷曰摹印之法有四功侔造化冥受鬼神謂之謂之神筆畫之外得微妙法謂之竒藝精于一謂之規矩方圓謂之工繁簡相參布置不紊謂之巧趙彥衛云古印作白文蓋用以泥印紫泥封詔是也今之朱印及倉厫印近之矣自有𥿄始用朱字間有為白字者米芾書史云印文須細圈須與文等太宗祕閣圖書之印不滿二寸圈文皆細上閣圖書字印亦然仁宗後印經院賜經用上閣圖書字大印粗若施于書畫占𥿄素字畫多有損於書帖近三館私閣之文印雖細圈乃粗如半指亦印損書畫也王詵見其家印記與唐印相似始換作細圈仍皆求其篆如填篆自有法世填皆無法貞觀開元皆小印便于印縫大者圈刓角一寸已上古篆于􅜇鴒頌見之又云唐印文郭如一細如毫髮篆文取稱不必專滿世收唐文可考今印文所篆回環曲折更無餘地郭倍于文吾衍摹印法漢有摹印篆只是方正篆法與隸相通後人不識古印妄皆盤曲且以為法多見故家藏得漢印字皆方正近似隸書此即摹印篆也凡屈曲盤回唐始如此今碑刻有顔魯公告尚書省印可考白字印皆用漢篆平方直正字不可圜縱有斜筆亦當取巧寫過如崔子玉寫張平子書碑上字及漢器上并碑蓋印章等字最第一其印文必逼于邊不可有空空即不古朱字印或用雜體篆不可太怪擇其近人情者免費詞說其印文不可逼邊須當以空中空白得中處為相去庶免印出與邊相倚也字宜細于四傍有出筆須帶邊邊須宜細于字若一體印出時四邉虗𥿄昻起未免邊肥于字粘邉朱文建業文房之法也三字印一邊一字一邊兩字者以兩字處與一字處相等不可兩字中斷又不可太相接凡印文中有一二字偶有自然空缺不可映帶者聼其自空古印多如此文下有空處懸之最佳不可妄意伸屈移欲填滿若寫之得佳自不覺空處凡印文中有匾口如子字上口略須寬使口中見空稍多方混厚漢印多如此四字印若前二字交界有空後二字無須當空畫地别之字有腳故言及此不然一邊見分一邊不分非法度也軒齊等印古無此式惟唐相李泌有端居室白文玉印或可為法白文終非法不若只從朱文唐人雖有號未嘗作印三字屋扁却有之名印不可妄寫姓名相合或加印章等字或兼用印章字曰姓某印章不若只用印字為正也二名者可回文寫姓下著印字在左二名在右是也單名者曰姓某之印却不可回文寫名印內不得著氏字表字印只用二字此為正式近人欲并知姓氏加氏其上曰某氏某若作某父古雖有此稱係他人美已却不可入印漢人三字印非復姓及無印字者皆非名印蓋字印不可以印字亂耳漢張安字幼君有印曰張幼君右一字左二字唐吕溫字化光有印曰吕化光此亦三字表字印式也押署跋尾前代御府自晉宋至于隋收聚圖書皆未可印記但備列當時鍳識藝人押署宋張則袁倩陸綏齊劉瑱毛惠逺梁沈熾文唐懷充徐僧權孫子真法象庾於陵徐湯孫逵姚懷珍滿騫范胤祖江僧寶陳延祖顧操陳杜僧談黃高北齊丁道矜隋江總姚察朱异何妥大業年月日奉勑裝開皇年月日內史薛道衡署名跋尾亦有開皇年月日參軍事學士諸葛熲咨議參軍開府學士栁顧言釋智果唐武德𥘉秦王府跋尾薛收禇亮虞丗南貞觀中禇河南等監裝背並有當時鍳識人押署貞觀十一年月日樊行整裝李德頴數平􅌂曺朂韋挺監十二年月日題署同十一年十三年月日臣行直裝禇遂良監臣無忌臣玄齡臣士亷臣徴臣君集臣楊師道臣大亮唐儉臣孝恭劉德威韋挺馮長命唐皎亦有不署馮長命唐皎者十四年月日張龍樹裝臣士亷徴楊師道禇遂良姜行本亦有蔡撝裝十五年十六年張龍樹裝禇遂良楊師道魏徴房玄齡無他人姓名十七年十八年十九年禇遂良監無他人名是開元中割却開元中玄宗購求天下圖書命當時鍳識人押署跋尾劉懷信等亦或割去前代名氏以已名氏代之開元五年王思忠裝亦有張龍樹裝王行直裝王知逸監劉懷信賜名矜陸元悌賜名堅直魏哲禇無亮姚崇馬懷素蘇頲宋璟十年王思忠裝馮紹陳義十五年李仙舟裝背尹奉祥建中十年賀遂竒劉逸江茹蘭芳宋逰瓌已上略舉大例法書考卷之八終
